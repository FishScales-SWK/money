    function TransactionChart({ transactions }) {
      const chartRef = useRef(null);
      const yAxisRef = useRef(null);
      const chartInstance = useRef(null);
      const yAxisInstance = useRef(null);
      const containerRef = useRef(null);

      const [chartFilter, setChartFilter] = useState('daily');
      const [chartTypeFilter, setChartTypeFilter] = useState('all');

      const chartData = useMemo(() => {
        const grouped = {};
        // กรอง memo ออกจากกราฟ
        transactions.filter(t => t.type !== 'memo').forEach(t => {
          const dObj = parseDate(t.date);
          let dateStr = '';
          let sortKey = 0;

          const day = String(dObj.getDate()).padStart(2, '0');
          const month = String(dObj.getMonth() + 1).padStart(2, '0');
          const thaiYearStr = String(dObj.getFullYear() + 543);
          const shortYearStr = thaiYearStr.slice(-2);
          const thaiMonthsShort = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

          if (chartFilter === 'daily') {
            dateStr = `${day}-${month}-${shortYearStr}`;
            sortKey = new Date(dObj.getFullYear(), dObj.getMonth(), dObj.getDate()).getTime();
          } else if (chartFilter === 'monthly') {
            dateStr = `${thaiMonthsShort[dObj.getMonth()]} ${shortYearStr}`;
            sortKey = new Date(dObj.getFullYear(), dObj.getMonth(), 1).getTime();
          } else if (chartFilter === 'yearly') {
            dateStr = `${thaiYearStr}`;
            sortKey = new Date(dObj.getFullYear(), 0, 1).getTime();
          }

          if (!grouped[sortKey]) {
            grouped[sortKey] = { sortKey, date: dateStr, income: 0, expense: 0, saving: 0, investment: 0, withdraw: 0, hasData: false };
          }
          
          if (t.type === 'income') { grouped[sortKey].income += t.amount; grouped[sortKey].hasData = true; }
          else if (t.type === 'expense') { grouped[sortKey].expense += t.amount; grouped[sortKey].hasData = true; }
          else if (t.type === 'saving') {
             if (t.category === 'investment') { grouped[sortKey].investment += t.amount; grouped[sortKey].hasData = true; }
             else { grouped[sortKey].saving += t.amount; grouped[sortKey].hasData = true; }
          }
          else if (t.type === 'withdraw') { grouped[sortKey].withdraw += t.amount; grouped[sortKey].hasData = true; }
        });

        return Object.values(grouped).filter(d => d.hasData).sort((a, b) => a.sortKey - b.sortKey);
      }, [transactions, chartFilter]);

      const calculateYAxis = useCallback((data) => {
        if (!data || data.length === 0) return 100;
        
        let maxValues = [];
        data.forEach(d => {
            if (chartTypeFilter === 'all' || chartTypeFilter === 'income') maxValues.push(d.income);
            if (chartTypeFilter === 'all' || chartTypeFilter === 'expense') maxValues.push(d.expense);
            if (chartTypeFilter === 'all' || chartTypeFilter === 'saving') { maxValues.push(d.saving); maxValues.push(d.investment); }
            if (chartTypeFilter === 'all' || chartTypeFilter === 'withdraw') maxValues.push(d.withdraw);
        });

        // 1. หาค่าสูงสุด และเผื่อพื้นที่ด้านบนกราฟ 15% เพื่อไม่ให้กราฟชนขอบบน
        const absoluteMax = Math.max(10, ...maxValues);
        const targetMax = absoluteMax * 1.15; 
        
        const rawStep = targetMax / 4;
        const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
        const normalizedStep = rawStep / magnitude;
        
        const niceSteps = [1, 1.25, 1.5, 2, 2.5, 3, 4, 5, 6, 7.5, 8, 10];
        const niceStep = niceSteps.find(step => step >= normalizedStep) || 10;

        return niceStep * magnitude * 4;
      }, [chartTypeFilter]);

      const handleScroll = useCallback(() => {
        if (!containerRef.current || !chartInstance.current || !yAxisInstance.current || chartData.length === 0) return;

        const { scrollLeft, clientWidth, scrollWidth } = containerRef.current;
        const visibleBars = chartFilter === 'daily' ? 5 : chartFilter === 'monthly' ? 6 : 4;

        // 2. คำนวณช่วงข้อมูล (Slice) เฉพาะที่มองเห็น 5 (หรือตามที่กำหนด) แท่งเป๊ะๆ จากเปอร์เซ็นต์การเลื่อน
        if (chartData.length <= visibleBars) {
            const yAxisMax = calculateYAxis(chartData);
            if (yAxisInstance.current.options.scales.y.max !== yAxisMax) {
                yAxisInstance.current.options.scales.y.max = yAxisMax;
                chartInstance.current.options.scales.y.max = yAxisMax;
                yAxisInstance.current.update();
                chartInstance.current.update();
            }
            return;
        }

        const maxScrollLeft = scrollWidth - clientWidth;
        const scrollRatio = maxScrollLeft > 0 ? Math.max(0, Math.min(1, scrollLeft / maxScrollLeft)) : 0;
        
        const maxStartIndex = chartData.length - visibleBars;
        const startIndex = Math.round(scrollRatio * maxStartIndex);
        const endIndex = startIndex + visibleBars;

        const visibleData = chartData.slice(startIndex, endIndex);

        if (visibleData.length === 0) return;

        const yAxisMax = calculateYAxis(visibleData);

        if (yAxisInstance.current.options.scales.y.max !== yAxisMax) {
          yAxisInstance.current.options.scales.y.max = yAxisMax;
          chartInstance.current.options.scales.y.max = yAxisMax;
          // นำ 'none' ออก เพื่อให้กราฟค่อยๆ เลื่อนเปลี่ยนขนาด (Smooth Animation) 
          yAxisInstance.current.update(); 
          chartInstance.current.update();
        }
      }, [chartData, calculateYAxis, chartFilter]);

      useEffect(() => {
        if (!chartRef.current || !yAxisRef.current || chartData.length === 0) return;

        const visibleBars = chartFilter === 'daily' ? 5 : chartFilter === 'monthly' ? 6 : 4;
        // 3. ตอนโหลดครั้งแรก ก็ต้องดึงข้อมูลให้จำนวนแท่งตรงกับที่เราต้องการโชว์
        const initialVisible = chartData.slice(-visibleBars);
        const initialYAxisMax = calculateYAxis(initialVisible);

        if (chartInstance.current) chartInstance.current.destroy();
        if (yAxisInstance.current) yAxisInstance.current.destroy();

        const sysFontFamily = 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif';

        const commonOptions = {
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            duration: 400, // ปรับความเร็วให้พอดี ไม่ช้าหรือเร็วจนเกินไปเวลาเลื่อนเปลี่ยนช่วง
            easing: 'easeOutQuart' 
          }, 
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          clip: false 
        };

        yAxisInstance.current = new window.Chart(yAxisRef.current.getContext('2d'), {
          type: 'bar',
          data: { labels: ['00-00-00'], datasets: [{ data: [0] }] },
          options: {
            ...commonOptions,
            layout: { padding: { top: 20, bottom: 5, right: 0, left: 0 } }, 
            scales: {
              x: { 
                 border: { display: false }, 
                 grid: { display: false, drawBorder: false },
                 ticks: { display: true, color: 'transparent', font: { size: 10, family: sysFontFamily, weight: 'normal' }, padding: 8, maxRotation: 0, minRotation: 0 } 
              },
              y: { 
                type: 'linear', position: 'right', 
                min: 0, max: initialYAxisMax,
                border: { display: false }, grid: { display: false },
                ticks: {
                  mirror: true, padding: 4, 
                  callback: function(value) { 
                    if (value === 0) return '0';
                    if (value >= 1000000) return (value / 1000000).toFixed(1).replace('.0', '') + 'M';
                    if (value >= 100000) return (value / 1000).toFixed(0) + 'k';
                    return new Intl.NumberFormat('th-TH').format(value); 
                  },
                  font: { size: 9, family: sysFontFamily, weight: 'bold' }, color: '#64748b', count: 5 
                }
              }
            }
          },
          plugins: [{
            id: 'drawPerfectCorner',
            afterDraw: (chart) => {
              const ctx = chart.ctx;
              const yAxis = chart.scales.y;
              if (!yAxis) return;
              const zeroY = Math.round(yAxis.getPixelForValue(0));
              const width = chart.width;
              ctx.save();
              ctx.beginPath();
              ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2; 
              ctx.moveTo(width - 1, chart.chartArea.top);
              ctx.lineTo(width - 1, zeroY + 8); 
              ctx.moveTo(width - 2, zeroY);
              ctx.lineTo(width + 10, zeroY); 
              ctx.stroke();
              ctx.restore();
            }
          }]
        });

        const activeDatasets = [];
        const baseDatasetOptions = { borderRadius: 4, barPercentage: 0.9, categoryPercentage: 0.9, minBarLength: 5 };

        if (chartTypeFilter === 'all' || chartTypeFilter === 'income') {
            activeDatasets.push({ label: 'รายรับ', data: chartData.map(d => d.income === 0 ? null : d.income), backgroundColor: '#10b981', ...baseDatasetOptions });
        }
        if (chartTypeFilter === 'all' || chartTypeFilter === 'expense') {
            activeDatasets.push({ label: 'รายจ่าย', data: chartData.map(d => d.expense === 0 ? null : d.expense), backgroundColor: '#ef4444', ...baseDatasetOptions });
        }
        if (chartTypeFilter === 'all' || chartTypeFilter === 'saving') {
            activeDatasets.push({ label: 'เงินเก็บ', data: chartData.map(d => d.saving === 0 ? null : d.saving), backgroundColor: '#3b82f6', ...baseDatasetOptions });
            activeDatasets.push({ label: 'ลงทุน', data: chartData.map(d => d.investment === 0 ? null : d.investment), backgroundColor: '#6366f1', ...baseDatasetOptions });
        }
        if (chartTypeFilter === 'all' || chartTypeFilter === 'withdraw') {
            activeDatasets.push({ label: 'ถอนเงิน', data: chartData.map(d => d.withdraw === 0 ? null : d.withdraw), backgroundColor: '#8b5cf6', ...baseDatasetOptions });
        }

        chartInstance.current = new window.Chart(chartRef.current.getContext('2d'), {
          type: 'bar',
          data: {
            labels: chartData.map(d => d.date),
            datasets: activeDatasets
          },
          options: {
            ...commonOptions,
            layout: { padding: { top: 20, bottom: 5, left: 0, right: 15 } }, 
            plugins: {
              legend: { display: false },
              tooltip: {
                enabled: true,
                callbacks: {
                  title: () => null, 
                  label: function(context) {
                    let label = context.dataset.label || '';
                    if (label) label += ': ';
                    if (context.parsed.y !== null) {
                      label += new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(context.parsed.y);
                    }
                    return label;
                  }
                }
              }
            },
            interaction: { mode: 'nearest', intersect: true }, 
            scales: {
              x: {
                border: { display: true, color: '#94a3b8', width: 2, z: 10 }, 
                grid: { display: true, drawOnChartArea: true, drawBorder: false, color: '#f1f5f9', borderDash: [4, 4], drawTicks: false }, 
                ticks: { font: { size: 10, family: sysFontFamily, weight: 'normal' }, color: '#64748b', padding: 8, maxRotation: 0, minRotation: 0, autoSkip: true } 
              },
              y: { 
                position: 'right', 
                min: 0, max: initialYAxisMax,
                display: true, border: { display: false }, 
                grid: { display: true, drawBorder: false, color: '#e2e8f0', borderDash: [4, 4], drawTicks: false }, 
                ticks: { display: false, count: 5 } 
              }
            }
          }
        });

        setTimeout(() => {
          if (containerRef.current) {
            containerRef.current.scrollLeft = containerRef.current.scrollWidth;
            handleScroll();
          }
        }, 100);

        return () => {
          if (chartInstance.current) chartInstance.current.destroy();
          if (yAxisInstance.current) yAxisInstance.current.destroy();
        };
      }, [chartData, handleScroll, calculateYAxis, chartTypeFilter]);

      if (chartData.length === 0) return null;

      const visibleBars = chartFilter === 'daily' ? 5 : chartFilter === 'monthly' ? 6 : 4;
      const calculatedWidth = chartData.length > visibleBars ? `${(chartData.length / visibleBars) * 100}%` : '100%';

      return (
        <div className="bg-white rounded-2xl p-4 sm:p-5 shadow-sm border border-gray-100 flex flex-col relative overflow-hidden animate-in fade-in">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-3">
            <div className="flex items-center gap-2">
               <h3 className="text-lg font-bold text-gray-800 flex-shrink-0">สถิติรายการ</h3>
            </div>
            <div className="flex bg-gray-100 p-1 rounded-lg self-end sm:self-auto w-full sm:w-auto">
              <button onClick={() => setChartFilter('daily')} className={`flex-1 sm:flex-none px-3 py-1.5 text-[11px] sm:text-xs font-medium rounded-md transition-colors ${chartFilter === 'daily' ? 'bg-white shadow-sm text-indigo-600 font-bold' : 'text-gray-500 hover:text-gray-700'}`}>รายวัน</button>
              <button onClick={() => setChartFilter('monthly')} className={`flex-1 sm:flex-none px-3 py-1.5 text-[11px] sm:text-xs font-medium rounded-md transition-colors ${chartFilter === 'monthly' ? 'bg-white shadow-sm text-indigo-600 font-bold' : 'text-gray-500 hover:text-gray-700'}`}>รายเดือน</button>
              <button onClick={() => setChartFilter('yearly')} className={`flex-1 sm:flex-none px-3 py-1.5 text-[11px] sm:text-xs font-medium rounded-md transition-colors ${chartFilter === 'yearly' ? 'bg-white shadow-sm text-indigo-600 font-bold' : 'text-gray-500 hover:text-gray-700'}`}>รายปี</button>
            </div>
          </div>

          {/* แถบปุ่มตัวกรองประเภทรายการสำหรับกราฟ */}
          <div className="flex gap-2 mb-4 overflow-x-auto custom-scrollbar pb-2 pt-1 px-1 -mx-1">
            <button onClick={() => setChartTypeFilter('all')} className={`px-4 py-1.5 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex-shrink-0 ${chartTypeFilter === 'all' ? 'bg-gray-800 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>ทั้งหมด</button>
            <button onClick={() => setChartTypeFilter('income')} className={`px-4 py-1.5 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${chartTypeFilter === 'income' ? 'bg-green-500 text-white shadow-md shadow-green-500/30' : 'bg-green-50 text-green-700 hover:bg-green-100 border border-green-100'}`}><Icon name="arrow_circle_down" className="text-[14px]" /> รายรับ</button>
            <button onClick={() => setChartTypeFilter('expense')} className={`px-4 py-1.5 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${chartTypeFilter === 'expense' ? 'bg-red-500 text-white shadow-md shadow-red-500/30' : 'bg-red-50 text-red-700 hover:bg-red-100 border border-red-100'}`}><Icon name="arrow_circle_up" className="text-[14px]" /> รายจ่าย</button>
            <button onClick={() => setChartTypeFilter('saving')} className={`px-4 py-1.5 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${chartTypeFilter === 'saving' ? 'bg-blue-500 text-white shadow-md shadow-blue-500/30' : 'bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-100'}`}><Icon name="savings" className="text-[14px]" /> เงินเก็บ</button>
            <button onClick={() => setChartTypeFilter('withdraw')} className={`px-4 py-1.5 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${chartTypeFilter === 'withdraw' ? 'bg-purple-500 text-white shadow-md shadow-purple-500/30' : 'bg-purple-50 text-purple-700 hover:bg-purple-100 border border-purple-100'}`}><Icon name="price_change" className="text-[14px]" /> ถอนเงิน</button>
          </div>
          
          <div className="flex items-start w-full relative">
            <div className="w-[38px] sm:w-[48px] flex-shrink-0 z-20 relative">
              <div style={{ height: '220px' }}>
                <canvas ref={yAxisRef}></canvas>
              </div>
            </div>
            
            <div className="flex-1 overflow-x-auto chart-scrollbar pb-2 relative z-10 -ml-[2px]" ref={containerRef} onScroll={handleScroll}>
              <div style={{ width: calculatedWidth, minWidth: '100%', height: '220px' }}>
                <canvas ref={chartRef}></canvas>
              </div>
            </div>
          </div>

          <div className="flex justify-center flex-wrap gap-3 sm:gap-5 mt-3 mb-1 pt-3 border-t border-slate-50">
            {(chartTypeFilter === 'all' || chartTypeFilter === 'income') && <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-[#10b981]"></div><span className="text-xs font-medium text-slate-600">รายรับ</span></div>}
            {(chartTypeFilter === 'all' || chartTypeFilter === 'expense') && <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-[#ef4444]"></div><span className="text-xs font-medium text-slate-600">รายจ่าย</span></div>}
            {(chartTypeFilter === 'all' || chartTypeFilter === 'saving') && (
               <>
                 <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-[#3b82f6]"></div><span className="text-xs font-medium text-slate-600">เงินเก็บ</span></div>
                 <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-[#6366f1]"></div><span className="text-xs font-medium text-slate-600">ลงทุน</span></div>
               </>
            )}
            {(chartTypeFilter === 'all' || chartTypeFilter === 'withdraw') && <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-[#8b5cf6]"></div><span className="text-xs font-medium text-slate-600">ถอนเงิน</span></div>}
          </div>
        </div>
      );
    }

    // ==========================================
    // PORTFOLIO MODULE
    // ==========================================
    
    function PortfolioDashboard({ trades, setTrades, marketPrices, setMarketPrices, portNames, activeUser, mainSubAccount, transactions, setTransactions, usdRate, showConfirm, showAlert, sendDataToSheet }) {
      const [activePort, setActivePort] = useState('all');
      const [viewTab, setViewTab] = useState('assets');
      const [showTradeModal, setShowTradeModal] = useState(false);
      const [editingTrade, setEditingTrade] = useState(null);

      const [timeFilter, setTimeFilter] = useState('all'); 
      const [typeFilter, setTypeFilter] = useState('ALL'); 
      const [sortConfig, setSortConfig] = useState({ key: 'symbol', direction: 'asc' });
      const [searchQuery, setSearchQuery] = useState(''); 
      const [historySortConfig, setHistorySortConfig] = useState({ key: 'date', direction: 'desc' }); 

      const ledger = useMemo(() => {
        let holdings = {}; 
        let realized = []; 
        let enrichedTrades = []; 
        let cash = {};
        let lastTradedPrice = {}; 

        const sortedTrades = [...trades].sort((a,b) => {
          const dateDiff = parseDate(a.date) - parseDate(b.date);
          if (dateDiff !== 0) return dateDiff;
          return String(a.id).localeCompare(String(b.id));
        });

        sortedTrades.forEach(t => {
          if (!holdings[t.portId]) holdings[t.portId] = {};
          if (!cash[t.portId]) cash[t.portId] = 0;

          let h = holdings[t.portId][t.symbol] || { units: 0, avgCost: 0, sheetPrice: 0, totalAmount: 0 };
          let enrichedTrade = { ...t }; 

          if (t.price_now && t.price_now > 0) {
             h.sheetPrice = Number(t.price_now);
          }

          if (t.type === 'BUY') {
            const baseCost = t.amount > 0 ? t.amount : (t.units * t.price);
            const prevBaseCost = h.units * h.avgCost; 
            h.units += t.units;
            h.avgCost = (prevBaseCost + baseCost) / h.units; 
            
            cash[t.portId] -= baseCost; 
            holdings[t.portId][t.symbol] = h;
            lastTradedPrice[t.symbol] = t.price;
          } else if (t.type === 'SELL') {
            const netRevenue = t.amount > 0 ? t.amount : (t.units * t.price); 
            const costOfSold = t.units * h.avgCost; 
            const profit = netRevenue - costOfSold; 
            
            enrichedTrade.profit = profit;
            enrichedTrade.avgCostAtSell = h.avgCost;
            
            realized.push(enrichedTrade);
            h.units -= t.units;
            if (h.units <= 0) { h.units = 0; h.avgCost = 0; }
            cash[t.portId] += netRevenue;
            holdings[t.portId][t.symbol] = h;
            lastTradedPrice[t.symbol] = t.price;
          } else if (t.type === 'DIVIDEND') {
            const dividendValue = t.amount > 0 ? t.amount : ((t.units || h.units) * t.price);
            enrichedTrade.profit = dividendValue;
            enrichedTrade.units = t.units || h.units; 
            realized.push(enrichedTrade);
            cash[t.portId] += dividendValue;
          } else if (t.type === 'DEPOSIT') {
            cash[t.portId] += t.price;
          } else if (t.type === 'WITHDRAW') {
            cash[t.portId] -= t.price;
          }
          enrichedTrades.push(enrichedTrade);
        });

        return { holdings, realized, enrichedTrades, cash, lastTradedPrice };
      }, [trades]);

      const profitStats = useMemo(() => {
        const todayStr = getLocalISODate();
        const today = new Date();
        const currentMonth = today.getMonth();
        const currentYear = today.getFullYear();

        let todayP = 0, monthP = 0, yearP = 0, dividendYear = 0;

        ledger.realized.forEach(r => {
          if (activePort !== 'all' && r.portId !== activePort) return;
          const d = parseDate(r.date);
          const isCurrentYear = d.getFullYear() === currentYear;

          let profit = r.profit;
          if (r.portId === 'lib_us') {
            profit = profit * usdRate;
          }

          if (r.type === 'SELL') {
            const isToday = d.getDate() === today.getDate() && d.getMonth() === currentMonth && isCurrentYear;
            if (isToday) todayP += profit;
            if (d.getMonth() === currentMonth && isCurrentYear) monthP += profit;
            if (isCurrentYear) yearP += profit;
          } else if (r.type === 'DIVIDEND') {
            if (isCurrentYear) dividendYear += profit;
          }
        });

        return { today: todayP, month: monthP, year: yearP, dividendYear };
      }, [ledger.realized, activePort, usdRate]);

      const portSummary = useMemo(() => {
        let totalValueTHB = 0;
        let totalCostTHB = 0;
        let totalValueUSD = 0; 
        let totalCashTHB = 0;
        let assetsList = [];

        Object.keys(ledger.holdings).forEach(portId => {
          if (activePort !== 'all' && portId !== activePort) return;
          
          Object.keys(ledger.holdings[portId]).forEach(symbol => {
            const h = ledger.holdings[portId][symbol];
            if (h.units > 0) {
              let currentPrice = h.sheetPrice > 0 ? h.sheetPrice : (marketPrices[symbol] || ledger.lastTradedPrice[symbol] || h.avgCost);

              const value = h.units * currentPrice;
              const cost = h.units * h.avgCost; 
              
              if (portId === 'lib_us') {
                totalValueUSD += value;
                totalValueTHB += value * usdRate;
                totalCostTHB += cost * usdRate;
              } else {
                totalValueTHB += value;
                totalCostTHB += cost;
              }

              assetsList.push({ portId, symbol, units: h.units, avgCost: h.avgCost, currentPrice, value, cost, isCash: false });
            }
          });
        });

        // คำนวณกำไร/ขาดทุน (Unrealized Profit) เฉพาะส่วนของสินทรัพย์ (หุ้น) เท่านั้น
        const unrealizedProfitTHB = totalValueTHB - totalCostTHB;
        // ✅ คำนวณเปอร์เซ็นต์กำไร/ขาดทุน
        const unrealizedProfitPercent = totalCostTHB > 0 ? (unrealizedProfitTHB / totalCostTHB) * 100 : 0;

        // นำเงินสดมารวมในมูลค่าพอร์ต
        Object.keys(ledger.cash).forEach(portId => {
          if (activePort !== 'all' && portId !== activePort) return;
          const portCash = ledger.cash[portId];
          if (portCash !== 0) {
            if (portId === 'lib_us') {
              totalCashTHB += portCash * usdRate;
              totalValueUSD += portCash; // นำเงินสด USD มาบวกเข้ากับมูลค่าพอร์ต USD รวม
            } else {
              totalCashTHB += portCash;
            }
          }
        });

        // นำเงินสด (THB) มาบวกเข้ากับมูลค่าพอร์ต THB รวม
        totalValueTHB += totalCashTHB;

        return { totalValue: totalValueTHB, totalCost: totalCostTHB, unrealizedProfit: unrealizedProfitTHB, unrealizedProfitPercent, totalValueUSD, totalCash: totalCashTHB, assetsList };
      }, [ledger.holdings, ledger.cash, marketPrices, activePort, usdRate]);

      const sortedAssets = useMemo(() => {
        let sortableItems = [...portSummary.assetsList];
        if (sortConfig !== null) {
          sortableItems.sort((a, b) => {
            let aValue = a[sortConfig.key];
            let bValue = b[sortConfig.key];

            if (sortConfig.key === 'pl') {
              const aPL = a.value - a.cost;
              const bPL = b.value - b.cost;
              aValue = a.portId === 'lib_us' ? aPL * usdRate : aPL;
              bValue = b.portId === 'lib_us' ? bPL * usdRate : bPL;
            } else if (sortConfig.key === 'symbol') {
              return sortConfig.direction === 'asc' 
                ? a.symbol.localeCompare(b.symbol)
                : b.symbol.localeCompare(a.symbol);
            } else if (sortConfig.key === 'avgCost' || sortConfig.key === 'currentPrice') {
              aValue = a.portId === 'lib_us' ? a[sortConfig.key] * usdRate : a[sortConfig.key];
              bValue = b.portId === 'lib_us' ? b[sortConfig.key] * usdRate : b[sortConfig.key];
            }

            if (aValue < bValue) {
              return sortConfig.direction === 'asc' ? -1 : 1;
            }
            if (aValue > bValue) {
              return sortConfig.direction === 'asc' ? 1 : -1;
            }
            return 0;
          });
        }
        return sortableItems;
      }, [portSummary.assetsList, sortConfig, usdRate]);

      const filteredAssets = useMemo(() => {
        return sortedAssets.filter(a => a.symbol.toLowerCase().includes(searchQuery.toLowerCase()));
      }, [sortedAssets, searchQuery]);

      const requestSort = (key) => {
        let direction = 'asc';
        if (sortConfig && sortConfig.key === key && sortConfig.direction === 'asc') {
          direction = 'desc';
        }
        setSortConfig({ key, direction });
      };

      const requestHistorySort = (key) => {
        let direction = 'asc';
        if (historySortConfig && historySortConfig.key === key && historySortConfig.direction === 'asc') {
          direction = 'desc';
        }
        setHistorySortConfig({ key, direction });
      };

      const getSortIcon = (key) => {
        if (!sortConfig || sortConfig.key !== key) {
          return <Icon name="unfold_more" className="text-[10px] sm:text-[14px] text-slate-300 ml-0.5 sm:ml-1" />;
        }
        return sortConfig.direction === 'asc' 
          ? <Icon name="keyboard_arrow_up" className="text-[10px] sm:text-[14px] text-indigo-600 ml-0.5 sm:ml-1" />
          : <Icon name="keyboard_arrow_down" className="text-[10px] sm:text-[14px] text-indigo-600 ml-0.5 sm:ml-1" />;
      };

      const getHistorySortIcon = (key) => {
        if (!historySortConfig || historySortConfig.key !== key) {
          return <Icon name="unfold_more" className="text-[10px] sm:text-[14px] text-slate-300 ml-0.5 sm:ml-1" />;
        }
        return historySortConfig.direction === 'asc' 
          ? <Icon name="keyboard_arrow_up" className="text-[10px] sm:text-[14px] text-indigo-600 ml-0.5 sm:ml-1" />
          : <Icon name="keyboard_arrow_down" className="text-[10px] sm:text-[14px] text-indigo-600 ml-0.5 sm:ml-1" />;
      };

      const filteredHistory = useMemo(() => {
        let items = ledger.enrichedTrades.filter(t => {
          if (activePort !== 'all' && t.portId !== activePort) return false;
          
          // ✅ กรองเอา MEMO ออกจากหน้าประวัติเทรด เพื่อไปโชว์ในแท็บโน้ตแทน
          if (t.type === 'MEMO') return false;
          
          if (typeFilter === 'BS' && (t.type !== 'BUY' && t.type !== 'SELL')) return false;
          if (typeFilter === 'DIVIDEND' && t.type !== 'DIVIDEND') return false;
          if (typeFilter === 'TRANSFER' && t.type !== 'DEPOSIT' && t.type !== 'WITHDRAW') return false;
          
          if (timeFilter !== 'all') {
            const d = parseDate(t.date);
            const today = new Date();
            if (timeFilter === 'daily') return d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
            if (timeFilter === 'monthly') return d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
            if (timeFilter === 'yearly') return d.getFullYear() === today.getFullYear();
          }
          
          if (searchQuery && t.symbol && t.symbol.toLowerCase().indexOf(searchQuery.toLowerCase()) === -1) {
            if (t.symbol !== 'รายการฝากเงิน' && t.symbol !== 'รายการถอนเงิน') {
               return false;
            }
          }
          
          return true;
        });

        if (historySortConfig !== null) {
          items.sort((a, b) => {
            if (historySortConfig.key === 'symbol') {
              const symDiff = historySortConfig.direction === 'asc' 
                ? a.symbol.localeCompare(b.symbol)
                : b.symbol.localeCompare(a.symbol);
              if (symDiff !== 0) return symDiff;
              return String(b.id).localeCompare(String(a.id));
            } else if (historySortConfig.key === 'date') {
               const dateDiff = historySortConfig.direction === 'asc' 
                 ? parseDate(a.date) - parseDate(b.date)
                 : parseDate(b.date) - parseDate(a.date);
               if (dateDiff !== 0) return dateDiff;
               return historySortConfig.direction === 'asc'
                 ? String(a.id).localeCompare(String(b.id))
                 : String(b.id).localeCompare(String(a.id));
            } else if (historySortConfig.key === 'units') {
               const aVal = a.units || 0;
               const bVal = b.units || 0;
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            } else if (historySortConfig.key === 'price') {
               const aVal = a.portId === 'lib_us' ? a.price * usdRate : a.price;
               const bVal = b.portId === 'lib_us' ? b.price * usdRate : b.price;
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            } else if (historySortConfig.key === 'value') {
               const getVal = (t) => {
                 if (t.type === 'DIVIDEND') return t.profit || 0;
                 if (t.type === 'DEPOSIT' || t.type === 'WITHDRAW') return t.price || 0;
                 return (t.price || 0) * (t.units || 0);
               };
               const aVal = a.portId === 'lib_us' ? getVal(a) * usdRate : getVal(a);
               const bVal = b.portId === 'lib_us' ? getVal(b) * usdRate : getVal(b);
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            } else if (historySortConfig.key === 'pl') {
               const aVal = a.profit !== undefined ? (a.portId === 'lib_us' ? a.profit * usdRate : a.profit) : -Infinity;
               const bVal = b.profit !== undefined ? (b.portId === 'lib_us' ? b.profit * usdRate : b.profit) : -Infinity;
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            }
            return 0;
          });
        }
        return items;
      }, [ledger.enrichedTrades, activePort, timeFilter, typeFilter, searchQuery, historySortConfig]);

      const historySummaryData = useMemo(() => {

        const grouped = {};

            key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            label = `${thaiMonthsFull[d.getMonth()]} ${thaiYear}`;
          } else if (timeFilter === 'yearly') {
            key = `${d.getFullYear()}`;
            label = `ปี ${thaiYear}`;
          } else {
            key = 'all';
            label = 'รวมทุกช่วงเวลา';
          }

          if (!grouped[key]) {
            grouped[key] = { key, label, profit: 0, dividend: 0 };
          }

          let profit = t.profit || 0;
          if (activePort === 'all' && t.portId === 'lib_us') {
             profit = profit * usdRate;
          }

          if (t.type === 'SELL' && t.profit !== undefined) {
            grouped[key].profit += profit;
          } else if (t.type === 'DIVIDEND' && t.profit !== undefined) {
            grouped[key].dividend += profit;
          }
        });

        return Object.values(grouped).sort((a, b) => {
           if (a.key === 'all') return 0;
           return b.key.localeCompare(a.key); 
        });

        let currentUnits = currentAsset.units;
        let avgCost = currentAsset.avgCost;

        if (editingTrade && editingTrade.type !== 'MEMO') {

            if (editingTrade.type === 'SELL') currentUnits += editingTrade.units;

        // ✅ จัดการแยกกรณีถ้าเป็น MEMO
        if (newTrade.type === 'MEMO') {

            realized_pl = 0;
        } else {

            } else if (newTrade.type === 'SELL') {

                status = remaining_units > 0 ? "ยังคงเหลือ" : "ขายหมดแล้ว";
            } else if (newTrade.type === 'DIVIDEND') {
                remaining_units = currentUnits;
                realized_pl = (newTrade.units || currentUnits) * newTrade.price;
                status = remaining_units > 0 ? "ยังคงเหลือ" : "ขายหมดแล้ว";

        const nowStr = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

          {/* Trade Modal */}

              cashMap={ledger.cash}

              showAlert={showAlert}

    }

    function TradeModal({ activePortId, portNames, currentPriceMap, holdings, cashMap, onClose, onSave, initialData, showAlert }) {
      const [type, setType] = useState(initialData?.type || 'BUY'); 
      const portId = initialData?.portId || activePortId; 
      const [symbol, setSymbol] = useState(initialData?.symbol === 'รายการถอนเงิน' || initialData?.symbol === 'รายการฝากเงิน' ? '' : (initialData?.symbol || ''));
      const [units, setUnits] = useState(initialData != null && initialData.type !== 'MEMO' ? initialData.units : '');
      const [price, setPrice] = useState(initialData != null && initialData.type !== 'MEMO' ? initialData.price : '');
      const [note, setNote] = useState(initialData?.type === 'MEMO' ? (initialData?.status || initialData?.note || '') : ''); // ✅ เพิ่ม State สำหรับ Note
      const [date, setDate] = useState(initialData?.date ? toISODateString(initialData.date) : getLocalISODate());
      
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [suggestionList, setSuggestionList] = useState([]);
      const [isSearching, setIsSearching] = useState(false);
      const autocompleteWrapperRef = useRef(null);

      // ซ่อน Dropdown แนะนำชื่อหุ้นเมื่อคลิกที่อื่น
      useEffect(() => {
        function handleClickOutside(event) {
          if (autocompleteWrapperRef.current && !autocompleteWrapperRef.current.contains(event.target)) {
            setShowSuggestions(false);
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, [autocompleteWrapperRef]);

      const availableAssets = useMemo(() => {
        let assetsMap = new Map();
        if (holdings[portId]) {
          Object.entries(holdings[portId]).forEach(([sym, data]) => {
            if (data.units > 0) assetsMap.set(sym, data.units);
          });
        }
        if (initialData && initialData.type === 'SELL') {
           const sym = initialData.symbol;
           assetsMap.set(sym, (assetsMap.get(sym) || 0) + initialData.units);
        } else if (initialData && initialData.type === 'DIVIDEND') {
           const sym = initialData.symbol;
           if (!assetsMap.has(sym)) assetsMap.set(sym, 0);
        }
        return Array.from(assetsMap.entries()).map(([sym, u]) => ({ symbol: sym, units: u }));
      }, [holdings, portId, initialData]);

      // ระบบค้นหาและแนะนำชื่อหุ้น (API Mock)
      useEffect(() => {
        if ((type !== 'BUY' && type !== 'MEMO') || !symbol.trim()) { // ✅ เปิดให้ค้นหาตอนใช้ MEMO ได้ด้วย
           setSuggestionList([]);
           return;
        }

        const delayFn = setTimeout(async () => {
           setIsSearching(true);
           try {
              await new Promise(r => setTimeout(r, 150)); 
              
              let baseList = portId === 'lib_us' ? US_STOCKS : portId === 'finan' ? FUND_STOCKS : THAI_STOCKS;
              const owned = holdings && holdings[portId] ? Object.keys(holdings[portId]).filter(sym => sym !== 'รายการฝากเงิน' && sym !== 'รายการถอนเงิน' && sym !== 'ภาพรวมตลาด') : [];
              
              const combinedList = Array.from(new Set([...owned, ...baseList])).sort();
              const results = combinedList.filter(s => s.toLowerCase().includes(symbol.toLowerCase()));
              
              setSuggestionList(results.slice(0, 15)); 
           } catch (error) {
              console.error(error);
           } finally {
              setIsSearching(false);
           }
        }, 300);

        return () => clearTimeout(delayFn);
      }, [symbol, type, portId, holdings]);

      const isFirstMount = useRef(true);
      useEffect(() => {
        if (isFirstMount.current) {
          isFirstMount.current = false;
          return;
        }
        if (!initialData) {
          setSymbol('');
          setUnits('');
          setPrice('');
          setNote(''); // ✅ Clear note 
          if ((type === 'SELL' || type === 'DIVIDEND') && availableAssets.length > 0) {
             setSymbol(availableAssets[0].symbol); 
          }
        }
      }, [type, portId, availableAssets, initialData]);

      useEffect(() => {
        if (['BUY', 'SELL'].includes(type) && symbol.trim().toUpperCase() && !price && !initialData) {
          const sym = symbol.trim().toUpperCase();
          const holding = holdings[portId]?.[sym];
          if (holding && holding.sheetPrice) {
             setPrice(holding.sheetPrice);
          } else if (currentPriceMap[sym]) {
             setPrice(currentPriceMap[sym]);
          }
        }
      }, [symbol, type, currentPriceMap, holdings, portId, price, initialData]);

      const effectiveCash = useMemo(() => {
          let cash = cashMap[portId] || 0;
          if (initialData && initialData.portId === portId) {
              if (initialData.type === 'BUY') cash += (initialData.units * initialData.price);
              if (initialData.type === 'SELL') cash -= (initialData.units * initialData.price);
          }
          return cash;
      }, [cashMap, portId, initialData]);

      const handleSubmit = (e) => {
        e.preventDefault();
        
        // ✅ จัดการกรณีที่บันทึกเป็น MEMO (โน้ต)
        if (type === 'MEMO') {
            if (!note.trim()) return showAlert('กรุณาพิมพ์ข้อความที่ต้องการบันทึก');
            const formattedDate = toThaiDateString(date);
            onSave({ 
              type: 'MEMO', 
              portId, 
              symbol: symbol.trim().toUpperCase() || 'ภาพรวมตลาด', 
              units: 0, 
              price: 0, 
              date: formattedDate, 
              note: note.trim() 
            });
            return;
        }

        // กรณีเป็นรายการเทรดปกติ
        const parsedUnits = parseFloat(units) || 0;
        const parsedPrice = parseFloat(price);
        
        if (!parsedPrice || parsedPrice <= 0) return showAlert('กรุณากรอกจำนวนเงิน/Cost ให้มากกว่า 0');

        if (['BUY', 'SELL'].includes(type)) {
          if (!symbol || !parsedUnits || parsedUnits <= 0) return showAlert('กรุณากรอกชื่อหุ้นและจำนวนให้ถูกต้อง');
          if (type === 'SELL') {
            let assetHolding = holdings[portId]?.[symbol.toUpperCase().trim()]?.units || 0;
            if (initialData && initialData.type === 'SELL' && initialData.symbol === symbol.toUpperCase().trim()) {
               assetHolding += initialData.units;
            }
            if (parsedUnits > assetHolding) {
               return showAlert(`ไม่สามารถขายได้! คุณมีหุ้น ${symbol.toUpperCase().trim()} เพียง ${formatNumber(assetHolding)} หุ้น`);
            }
          } else if (type === 'BUY') {
            const totalCost = parsedUnits * parsedPrice;
            if (totalCost > effectiveCash) {
                const formattedCash = portId === 'lib_us' ? formatUSD(effectiveCash) : formatCurrency(effectiveCash);
                return showAlert(`เงินสดในพอร์ตไม่พอ! พอร์ตนี้มีเงินสดให้เทรดเพียง ${formattedCash}`);
            }
          }
          const formattedDate = toThaiDateString(date);
          onSave({ type, portId, symbol: symbol.toUpperCase().trim(), units: parsedUnits, price: parsedPrice, date: formattedDate });
        } else if (type === 'DIVIDEND') {
          if (!symbol) return showAlert('กรุณาเลือกหุ้นที่ต้องการรับปันผล');
          const formattedDate = toThaiDateString(date);
          onSave({ type, portId, symbol: symbol.toUpperCase().trim(), units: parsedUnits, price: parsedPrice, date: formattedDate });
        } else if (type === 'DEPOSIT') {
          const formattedDate = toThaiDateString(date);
          onSave({ type, portId, symbol: 'รายการฝากเงิน', units: 0, price: parsedPrice, date: formattedDate });
        } else {
          const formattedDate = toThaiDateString(date);
          onSave({ type, portId, symbol: 'รายการถอนเงิน', units: 0, price: parsedPrice, date: formattedDate });
        }
      };

      const selectedAssetHolding = useMemo(() => {
        if ((type !== 'SELL' && type !== 'DIVIDEND') || !symbol) return 0;
        let currentUnits = holdings[portId]?.[symbol.toUpperCase().trim()]?.units || 0;
        if (initialData && initialData.type === 'SELL' && initialData.symbol === symbol.toUpperCase().trim()) {
           currentUnits += initialData.units;
        }
        return currentUnits;
      }, [type, portId, symbol, holdings, initialData]);

      const btnLabels = {
        BUY: 'ซื้อหุ้น',
        SELL: 'ขายหุ้น',
        DIVIDEND: 'รับปันผล',
        DEPOSIT: 'ฝากเงินเข้า',
        WITHDRAW: 'ถอนเงินออก',
        MEMO: 'บันทึกข้อความ' // ✅ ป้ายปุ่มของ Memo
      };

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/50 backdrop-blur-sm animate-in fade-in">
          <div className="bg-white w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl shadow-2xl p-6 animate-in slide-in-from-bottom-8">
            <div className="flex justify-between items-center mb-6">
              <div>
                <h2 className="text-xl font-black text-slate-800">{initialData ? 'แก้ไขรายการ' : 'บันทึกรายการเทรด'}</h2>
                <p className="text-xs text-indigo-600 font-bold mt-1">พอร์ต: {portNames[portId]}</p>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full"><Icon name="close" /></button>
            </div>

            <form onSubmit={handleSubmit} className="space-y-5">
              
              {/* ✅ เพิ่มปุ่มเลือกประเภท โน้ต (MEMO) ให้เต็ม 2 แถว แถวละ 3 ปุ่ม */}
              <div className="grid grid-cols-3 gap-2 bg-slate-100 p-1.5 rounded-xl">
                <button type="button" onClick={() => setType('BUY')} className={`py-1.5 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'BUY' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>ซื้อ</button>
                <button type="button" onClick={() => setType('SELL')} className={`py-1.5 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'SELL' ? 'bg-white shadow-sm text-rose-600' : 'text-slate-500'}`}>ขาย</button>
                <button type="button" onClick={() => setType('DIVIDEND')} className={`py-1.5 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'DIVIDEND' ? 'bg-white shadow-sm text-amber-600' : 'text-slate-500'}`}>ปันผล</button>
                <button type="button" onClick={() => setType('DEPOSIT')} className={`py-1.5 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'DEPOSIT' ? 'bg-white shadow-sm text-teal-600' : 'text-slate-500'}`}>ฝาก</button>
                <button type="button" onClick={() => setType('WITHDRAW')} className={`py-1.5 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'WITHDRAW' ? 'bg-white shadow-sm text-orange-600' : 'text-slate-500'}`}>ถอน</button>
                <button type="button" onClick={() => setType('MEMO')} className={`py-1.5 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'MEMO' ? 'bg-white shadow-sm text-amber-500' : 'text-slate-500'}`}>โน้ต</button>
              </div>

              {type !== 'WITHDRAW' && type !== 'DEPOSIT' && (
                <div>
                  <div className="flex justify-between items-end mb-1">
                     <label className="block text-xs font-bold text-slate-500">ชื่อหุ้น (Symbol)</label>
                     {(type === 'SELL' || type === 'DIVIDEND') && symbol && (
                        <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">
                          มีในพอร์ต: {formatNumber(selectedAssetHolding)} หุ้น
                        </span>
                     )}
                     {type === 'BUY' && (
                        <span className="text-[10px] font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded">
                          เงินสด: {portId === 'lib_us' ? formatUSD(effectiveCash) : formatCurrency(effectiveCash)}
                        </span>
                     )}
                  </div>

                  {type === 'BUY' || type === 'MEMO' ? (
                    <div className="relative" ref={autocompleteWrapperRef}>
                      <input 
                        type="text" 
                        value={symbol} 
                        onChange={e => {
                          setSymbol(e.target.value);
                          setShowSuggestions(true);
                        }} 
                        onFocus={() => setShowSuggestions(true)}
                        placeholder={type === 'MEMO' ? 'พิมพ์ชื่อหุ้น หรือเว้นว่างหากเป็นภาพรวมตลาด' : 'เช่น PTT, AAPL'}
                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold uppercase text-slate-800 outline-none focus:border-indigo-500" 
                        required={type !== 'MEMO'}
                        autoComplete="off" 
                      />
                      
                      {showSuggestions && symbol && (type === 'BUY' || type === 'MEMO') && (
                        <ul className="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg max-h-48 overflow-y-auto custom-scrollbar">
                          {isSearching ? (
                            <li className="p-3 text-xs text-slate-400 text-center font-semibold">กำลังค้นหา...</li>
                          ) : suggestionList.length > 0 ? (
                            suggestionList.map(s => (
                              <li 
                                key={s} 
                                onClick={() => {
                                  setSymbol(s);
                                  setShowSuggestions(false);
                                }}
                                className="p-3 hover:bg-indigo-50 cursor-pointer font-bold text-slate-700 text-sm border-b border-slate-50 last:border-0 transition-colors"
                              >
                                {s}
                              </li>
                            ))
                          ) : (
                            <li className="p-3 text-xs text-slate-400 text-center font-semibold">ไม่พบรายชื่อหุ้น</li>
                          )}
                        </ul>
                      )}
                    </div>
                  ) : (
                    <select 
                      value={symbol} 
                      onChange={e => setSymbol(e.target.value)} 
                      className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold uppercase text-slate-800 outline-none focus:border-indigo-500" 
                      required
                    >
                      {availableAssets.length === 0 ? (
                         <option value="">-- ไม่มีหุ้นในพอร์ตนี้ --</option>
                      ) : (
                         availableAssets.map(a => (
                           <option key={a.symbol} value={a.symbol}>{a.symbol} (ลิมิต {formatNumber(a.units)} หุ้น)</option>
                         ))
                      )}
                    </select>
                  )}
                </div>
              )}

              {/* ✅ กรณีเป็น MEMO จะแสดงแค่กล่องข้อความ */}
              {type === 'MEMO' && (
                <div className="animate-in fade-in slide-in-from-top-2">
                  <label className="block text-xs font-bold text-slate-500 mb-1 text-amber-600 flex items-center gap-1"><Icon name="edit_note" className="text-[16px]"/> ข้อความโน้ต / อารมณ์ตลาด</label>
                  <textarea rows="4" value={note} onChange={(e) => setNote(e.target.value)} className="w-full p-3 bg-amber-50/50 border border-amber-200 rounded-xl font-medium outline-none focus:border-amber-500 custom-scrollbar transition-colors" placeholder="พิมพ์มุมมองการลงทุน, ข่าวสาร, หรือแผนการเทรด..." required></textarea>
                </div>
              )}

              {['BUY', 'SELL', 'DIVIDEND'].includes(type) && (
                <div className="flex gap-3">
                  <div className="flex-1">
                    <div className="flex justify-between items-end mb-1 gap-1">
                      <label className="block text-xs font-bold text-slate-500">จำนวนหุ้น</label>
                      {(type === 'SELL' || type === 'DIVIDEND') && symbol && (
                        <button 
                          type="button" 
                          onClick={() => setUnits(selectedAssetHolding)} 
                          className="text-[9px] font-bold text-indigo-700 bg-indigo-100 hover:bg-indigo-200 px-1.5 py-0.5 rounded whitespace-nowrap transition-colors"
                        >
                          ทั้งหมดในพอร์ต
                        </button>
                      )}
                    </div>
                    <input 
                      type="number" min="0" step="0.000001" 
                      max={type === 'SELL' ? selectedAssetHolding : undefined}
                      value={units} 
                      onChange={e => {
                        let val = e.target.value;
                        if (type === 'SELL' && parseFloat(val) > selectedAssetHolding) val = selectedAssetHolding;
                        setUnits(val);
                      }} 
                      className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-indigo-500" 
                      placeholder="0" required 
                    />
                  </div>
                  <div className="flex-1">
                    <label className="block text-xs font-bold text-slate-500 mb-1">{type === 'DIVIDEND' ? 'ปันผล/หุ้น' : 'Cost/หุ้น'} ({portId === 'lib_us' ? '$' : '฿'})</label>
                    <input type="number" min="0" step="0.00001" value={price} onChange={e => setPrice(e.target.value)} className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-${type === 'DIVIDEND' ? 'amber' : 'indigo'}-500`} placeholder="0.00000" required />
                  </div>
                </div>
              )}

              {['WITHDRAW', 'DEPOSIT'].includes(type) && (
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">
                    จำนวนเงิน ({portId === 'lib_us' ? 'USD' : 'บาท'})
                  </label>
                  <input 
                    type="number" min="0" step="0.00001" value={price} onChange={e => setPrice(e.target.value)} 
                    className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-${type === 'DEPOSIT' ? 'teal' : 'orange'}-500`} 
                    placeholder="0.00000" required 
                  />
                </div>
              )}

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">วันที่ทำรายการ</label>
                <CustomBeDatePicker value={date} onChange={setDate} className="bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800" />
              </div>

              <div className="pt-2">
                {['BUY', 'SELL', 'DIVIDEND'].includes(type) && (
                  <div className="flex justify-between items-center mb-4 p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <span className="text-sm font-bold text-slate-500">
                      {type === 'DIVIDEND' ? 'เงินปันผลรวม' : 'มูลค่ารวม'}
                    </span>
                    <span className="text-lg font-black text-slate-800">
                      {portId === 'lib_us' 
                        ? formatUSD(parseFloat(units||0) * parseFloat(price||0)) 
                        : formatCurrency(parseFloat(units||0) * parseFloat(price||0))}
                    </span>
                  </div>
                )}
                <button 
                  type="submit" 
                  disabled={(type === 'SELL' || type === 'DIVIDEND') && availableAssets.length === 0}
                  className={`w-full py-4 rounded-xl font-black text-white shadow-lg transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100 ${
                    type === 'BUY' ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-600/30' : 
                    type === 'SELL' ? 'bg-rose-500 hover:bg-rose-600 shadow-rose-500/30' : 
                    type === 'DIVIDEND' ? 'bg-amber-500 hover:bg-amber-600 shadow-amber-500/30' : 
                    type === 'MEMO' ? 'bg-amber-500 hover:bg-amber-600 shadow-amber-500/30' : 
                    'bg-orange-500 hover:bg-orange-600 shadow-orange-500/30'
                  }`}
                >
                  ยืนยันการ{btnLabels[type]}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function AdminPanel({ accounts, setAccounts, onExit, showConfirm, showAlert, setIsLoading }) {
      const [selectedMainAcc, setSelectedMainAcc] = useState('B');
      const [newSubAccName, setNewSubAccName] = useState('');
      
      const [editingAccId, setEditingAccId] = useState(null);
      const [editAccName, setEditAccName] = useState('');
      
      const [isCreating, setIsCreating] = useState(false);
      const [deletingId, setDeletingId] = useState(null);

      const handleAddSubAccount = async (e) => {
        e.preventDefault();
        const rawName = newSubAccName.trim().toUpperCase();
        if (!rawName) return;

        // บังคับให้ชื่อชีทขึ้นต้นด้วยชื่อบัญชีหลัก (B หรือ M) เพื่อให้ตอนรีเฟรชระบบดึงมาจัดกลุ่มถูก
        let finalSheetName = rawName;
        if (!finalSheetName.startsWith(selectedMainAcc)) {
            finalSheetName = `${selectedMainAcc}-${finalSheetName}`;
        }

        if (finalSheetName === 'B' || finalSheetName === 'M') {
            showAlert('ชื่อบัญชีต้องเป็นบัญชีย่อย (เช่น B1, M-Saving) ไม่สามารถใช้ชื่อบัญชีหลักได้');
            return;
        }

        const acc = accounts.find(a => a.id === selectedMainAcc);
        if (acc && acc.subAccounts.includes(finalSheetName)) {
            showAlert(`ไม่สามารถสร้างได้: มีบัญชีย่อยชื่อ "${finalSheetName}" อยู่ในบัญชีนี้แล้ว`);
            return;
        }

        setIsCreating(true); // เปิด Loading ที่ปุ่ม
        try {
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'createSheet', sheetName: finalSheetName })
          });
          const result = await response.json();
          
          if (result.status === 'success') {
            setAccounts(prev => prev.map(a => {
              if (a.id === selectedMainAcc) {
                return { ...a, subAccounts: [...a.subAccounts, finalSheetName].sort((a,b) => {
                      const numA = parseInt(a.replace(/\D/g, ''));
                      const numB = parseInt(b.replace(/\D/g, ''));
                      if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                      if (!isNaN(numA)) return -1;
                      if (!isNaN(numB)) return 1;
                      return a.localeCompare(b);
                  }) };
              }
              return a;
            }));
            setNewSubAccName('');
            showAlert(`สร้างบัญชีย่อย "${finalSheetName}" ใน Google Sheet เรียบร้อยแล้ว`);
          } else {
            showAlert(`เกิดข้อผิดพลาดในการสร้างแผ่นงาน: ${result.message}`);
          }
        } catch (error) {
          console.error("Create Sheet Error:", error);
          showAlert('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ โปรดลองอีกครั้ง');
        } finally {
          setIsCreating(false); // ปิด Loading ที่ปุ่ม
        }
      };

      const handleDeleteSubAccount = (mainId, subId) => {
        const acc = accounts.find(a => a.id === mainId);
        if (acc && acc.subAccounts.length <= 1) {
          showAlert('ไม่สามารถนำออกได้! ต้องมีบัญชีย่อยอย่างน้อย 1 บัญชีในแต่ละบัญชีหลัก');
          return;
        }

        showConfirm(`ยืนยันการนำบัญชีย่อย "${subId}" ออกจากหน้าจอหรือไม่? (ระบบจะเปลี่ยนชื่อแผ่นงานใน Google Sheet โดยตัด M หรือ B ออกเพื่อซ่อนข้อมูล)`, async () => {
          setDeletingId(subId); // เปิด Loading ที่ปุ่มลบ
          try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
              method: 'POST',
              body: JSON.stringify({ action: 'renameSheet', sheetName: subId })
            });
            const result = await response.json();
            
            if (result.status === 'success' || result.message === 'ไม่พบแผ่นงาน') {
              setAccounts(prev => prev.map(a => {
                if (a.id === mainId) {
                  return { ...a, subAccounts: a.subAccounts.filter(s => s !== subId).sort((a,b) => {
                      const numA = parseInt(a.replace(/\D/g, ''));
                      const numB = parseInt(b.replace(/\D/g, ''));
                      if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                      if (!isNaN(numA)) return -1;
                      if (!isNaN(numB)) return 1;
                      return a.localeCompare(b);
                  }) };
                }
                return a;
              }));
              showAlert('นำบัญชีย่อยออกจากหน้าจอเรียบร้อยแล้ว (เปลี่ยนชื่อชีทใน Google Sheet แล้ว)');
            } else {
              showAlert(`เกิดข้อผิดพลาดในการซ่อนแผ่นงาน: ${result.message}`);
            }
          } catch (error) {
            console.error("Rename Sheet Error:", error);
            showAlert('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ โปรดลองอีกครั้ง');
          } finally {
            setDeletingId(null); // ปิด Loading ที่ปุ่มลบ
          }
        });
      };

      const handleSaveEditName = (id) => {
        setAccounts(accounts.map(a => a.id === id ? { ...a, name: editAccName } : a));
        setEditingAccId(null);
      };

      return (
        <div className="min-h-[100dvh] bg-slate-50 p-6 flex flex-col items-center overflow-y-auto">
          <div className="w-full max-w-lg bg-white rounded-3xl shadow-xl p-6 md:p-8 animate-in slide-in-from-bottom-8 my-auto">
            <div className="flex justify-between items-center mb-8 border-b border-slate-100 pb-4">
              <div>
                <h2 className="text-2xl font-black text-slate-800">ระบบจัดการแอดมิน</h2>
                <p className="text-sm text-slate-500 font-medium mt-1">จัดการชื่อและบัญชีย่อย</p>
              </div>
              <button onClick={onExit} className="bg-slate-100 hover:bg-slate-200 text-slate-600 p-2 rounded-xl transition-colors"><Icon name="close" /></button>
            </div>
            
            <div className="mb-8">
              <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">รายชื่อบัญชีปัจจุบัน</h3>
              <div className="space-y-4">
                {accounts.map(acc => (
                  <div key={acc.id} className="bg-slate-50 rounded-2xl border border-slate-100 p-4">
                    
                    <h4 className="font-bold text-slate-800 mb-3 flex items-center justify-between gap-2">
                      <div className="flex items-center gap-2">
                        <div className="w-8 h-8 bg-indigo-100 text-indigo-700 font-black rounded-lg flex items-center justify-center text-sm">{acc.id}</div>
                        {editingAccId === acc.id ? (
                          <input 
                            type="text" value={editAccName} onChange={e => setEditAccName(e.target.value)} 
                            className="border border-indigo-300 px-2 py-1 rounded-md w-32 outline-none focus:ring-2 focus:ring-indigo-200" 
                            autoFocus
                          />
                        ) : (
                          <span>{acc.name}</span>
                        )}
                      </div>
                      {editingAccId === acc.id ? (
                        <button onClick={() => handleSaveEditName(acc.id)} className="text-emerald-600 hover:bg-emerald-100 p-1.5 rounded-lg"><Icon name="check" className="text-[18px]" /></button>
                      ) : (
                        <button onClick={() => { setEditingAccId(acc.id); setEditAccName(acc.name); }} className="text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 p-1.5 rounded-lg"><Icon name="edit" className="text-[18px]" /></button>
                      )}
                    </h4>

                    <div className="space-y-2 pl-2 border-l-2 border-slate-200 ml-4">
                      {acc.subAccounts.map(sub => (
                        <div key={sub} className="flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border border-slate-50">
                          <span className="text-sm font-bold text-slate-600 pl-2">บัญชี {sub}</span>
                          <button 
                            onClick={() => handleDeleteSubAccount(acc.id, sub)} 
                            disabled={deletingId === sub}
                            className={`p-1.5 rounded-lg transition-colors ${deletingId === sub ? 'text-rose-400 cursor-not-allowed' : 'text-rose-400 hover:text-rose-600 hover:bg-rose-50'}`}
                            title="ลบบัญชีย่อยนี้ออกจากหน้าจอ"
                          >
                            {deletingId === sub ? (
                              <div className="w-[18px] h-[18px] border-2 border-rose-400 border-t-transparent rounded-full animate-spin"></div>
                            ) : (
                              <Icon name="delete" className="text-[18px]" />
                            )}
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <form onSubmit={handleAddSubAccount} className="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100">
              <h3 className="text-sm font-bold text-indigo-800 mb-4 flex items-center gap-2"><Icon name="add_circle" className="text-[18px]" /> เพิ่มบัญชีย่อยใหม่</h3>
              <div className="grid grid-cols-2 gap-4 mb-4">
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1">เลือกบัญชีหลัก</label>
                  <select 
                    value={selectedMainAcc} 
                    onChange={e => setSelectedMainAcc(e.target.value)} 
                    disabled={isCreating}

    function ExpenseCategoryDetailModal({ category, transactions, onClose, onEdit, onDelete }) {
      const groupedData = useMemo(() => {
        const expenses = transactions.filter(t => t.type === 'expense' && t.category === category.id);
        const groups = {};
        
        expenses.forEach(t => {
          const d = parseDate(t.date);
          const month = String(d.getMonth() + 1).padStart(2, '0');
          const year = d.getFullYear() + 543;
          const sortKey = `${d.getFullYear()}-${month}`;
          const label = `${['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'][d.getMonth()]} ${year}`;
          
          if (!groups[sortKey]) groups[sortKey] = { label, total: 0, items: [], sortKey };
          groups[sortKey].items.push(t);
          groups[sortKey].total += t.amount;
        });
        
        return Object.values(groups).sort((a, b) => b.sortKey.localeCompare(a.sortKey)).map(g => ({
          ...g,
          items: g.items.sort((a,b) => parseDate(b.date) - parseDate(a.date) || String(b.id).localeCompare(String(a.id)))
        }));
      }, [transactions, category.id]);

      return (
         <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in" onClick={onClose}>
           <div className="bg-white rounded-3xl shadow-2xl p-0 w-full max-w-md relative animate-in zoom-in-95 max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
             <div className="p-5 border-b border-slate-100 flex justify-between items-center flex-shrink-0">
                <div className="flex items-center gap-3">
                   <div className={`p-2.5 rounded-xl ${category.color} text-white shadow-sm`}><Icon name={category.icon} /></div>
                   <div>
                     <h3 className="font-black text-lg text-slate-800 leading-tight">{category.name}</h3>
                     <p className="text-xs text-slate-500 mt-0.5">สรุปรายจ่ายแต่ละเดือน</p>
                   </div>
                </div>
                <button onClick={onClose} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full transition-colors"><Icon name="close" /></button>
             </div>
             
             <div className="overflow-y-auto p-5 custom-scrollbar flex-1 bg-slate-50/50 rounded-b-3xl">
               {groupedData.length === 0 ? <p className="text-center text-slate-400 py-10 font-medium text-sm">ไม่มีข้อมูลรายการ</p> :
                groupedData.map(g => (
                  <div key={g.sortKey} className="mb-6 last:mb-0">
                     <div className="flex justify-between items-center mb-3">
                        <h4 className="font-bold text-slate-700 bg-white px-3 py-1 rounded-lg border border-slate-200 shadow-sm text-sm">{g.label}</h4>
                        <span className="font-black text-rose-500 bg-rose-50 px-3 py-1 rounded-lg text-sm border border-rose-100">-{formatCurrency(g.total)}</span>
                     </div>
                     <div className="bg-white rounded-2xl p-2 border border-slate-100 shadow-sm">
                       {g.items.map(t => <TransactionItem key={t.id} transaction={t} showDate={true} />)}
                     </div>
                  </div>
                ))
               }
             </div>
           </div>
         </div>
      )
    }

    function Dashboard({ balance, totalIncome, totalExpense, totalSaving, expensesByCategory, transactions, onEditTransaction, onDeleteTransaction }) {

      const { displayTransactions, summary } = useMemo(() => {
        const today = new Date();
        const currentMonth = today.getMonth();
        const currentYear = today.getFullYear();

        const timeFiltered = transactions.filter(t => {
          const d = parseDate(t.date);
          if (transactionFilter === 'daily') return d.getDate() === today.getDate() && d.getMonth() === currentMonth && d.getFullYear() === currentYear;
          if (transactionFilter === 'monthly') return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
          if (transactionFilter === 'yearly') return d.getFullYear() === currentYear;
          return true;
        });

        const sums = timeFiltered.reduce((acc, curr) => {
          if (curr.type === 'income') acc.income += curr.amount;
          if (curr.type === 'expense') acc.expense += curr.amount;
          return acc;
        }, { income: 0, expense: 0 });

        const finalFiltered = timeFiltered.filter(t => typeFilter === 'all' ? true : t.type === typeFilter);
        
        finalFiltered.sort((a, b) => {
          const dateDiff = parseDate(b.date) - parseDate(a.date);
          if (dateDiff !== 0) return dateDiff;
          return String(b.id).localeCompare(String(a.id));
        });

        return { displayTransactions: finalFiltered, summary: sums };
