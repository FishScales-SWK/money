                </div>
              </div>

              <div className="flex gap-2 sm:gap-4 mb-4 sm:mb-6">
                <div className="bg-white/10 backdrop-blur-md px-3 py-2 sm:px-4 sm:py-3 rounded-xl sm:rounded-2xl border border-white/5 flex-1">
                  <p className="text-[9px] sm:text-[10px] text-slate-400 uppercase font-bold mb-1">ต้นทุนรวม</p>
                  <p className="text-sm sm:text-lg font-bold">{formatCurrency(portSummary.totalCost)}</p>
                </div>
                <div className="bg-white/10 backdrop-blur-md px-3 py-2 sm:px-4 sm:py-3 rounded-xl sm:rounded-2xl border border-white/5 flex-1">
                  <p className="text-[9px] sm:text-[10px] text-slate-400 uppercase font-bold mb-1">กำไร/ขาดทุน (ยังไม่ขาย)</p>
                  <p className={`text-sm sm:text-lg font-bold ${portSummary.unrealizedProfit >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    {portSummary.unrealizedProfit > 0 ? '+' : (portSummary.unrealizedProfit < 0 ? '-' : '')}{formatCurrency(Math.abs(portSummary.unrealizedProfit))}
                  </p>
                </div>
              </div>

              <div className="grid grid-cols-4 gap-1.5 sm:gap-2 w-full">
                <div className="bg-white/5 backdrop-blur-md py-1.5 sm:py-2 rounded-lg sm:rounded-xl border border-white/5 text-center px-1">
                  <p className="text-[8px] sm:text-[10px] text-slate-400 uppercase font-bold mb-0.5">ขายวันนี้</p>
                  <p className={`text-[10px] sm:text-sm font-black ${profitStats.today >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    {profitStats.today > 0 ? '+' : (profitStats.today < 0 ? '-' : '')}{activePort === 'lib_us' ? formatUSD(Math.abs(profitStats.today)) : formatNumber(Math.abs(profitStats.today))}
                  </p>
                </div>
                <div className="bg-white/5 backdrop-blur-md py-1.5 sm:py-2 rounded-lg sm:rounded-xl border border-white/5 text-center px-1">
                  <p className="text-[8px] sm:text-[10px] text-slate-400 uppercase font-bold mb-0.5">กำไรเดือนนี้</p>
                  <p className={`text-[10px] sm:text-sm font-black ${profitStats.month >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    {profitStats.month > 0 ? '+' : (profitStats.month < 0 ? '-' : '')}{activePort === 'lib_us' ? formatUSD(Math.abs(profitStats.month)) : formatNumber(Math.abs(profitStats.month))}
                  </p>
                </div>
                <div className="bg-white/5 backdrop-blur-md py-1.5 sm:py-2 rounded-lg sm:rounded-xl border border-white/5 text-center px-1">
                  <p className="text-[8px] sm:text-[10px] text-slate-400 uppercase font-bold mb-0.5">กำไรปีนี้</p>
                  <p className={`text-[10px] sm:text-sm font-black ${profitStats.year >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    {profitStats.year > 0 ? '+' : (profitStats.year < 0 ? '-' : '')}{activePort === 'lib_us' ? formatUSD(Math.abs(profitStats.year)) : formatNumber(Math.abs(profitStats.year))}
                  </p>
                </div>
                <div className="bg-white/5 backdrop-blur-md py-1.5 sm:py-2 rounded-lg sm:rounded-xl border border-white/5 text-center px-1">
                  <p className="text-[8px] sm:text-[10px] text-slate-400 uppercase font-bold mb-0.5">ปันผลปีนี้</p>
                  <p className="text-[10px] sm:text-sm font-black text-amber-400">
                    +{activePort === 'lib_us' ? formatUSD(profitStats.dividendYear) : formatNumber(profitStats.dividendYear)}
                  </p>
                </div>
              </div>
            </div>
          </div>

          <div className="flex flex-col gap-4">
            <div className="relative w-full">
              <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
              <input 
                type="text" 
                placeholder="ค้นหาชื่อหุ้น / กองทุน..." 
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                className="w-full bg-white border border-slate-200 rounded-xl py-3 pl-12 pr-4 outline-none focus:border-indigo-500 shadow-sm"
              />
            </div>
          </div>

          {viewTab === 'history' && (
            <div className="flex flex-col sm:flex-row justify-between items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
              <div className="flex bg-slate-100 p-1 rounded-lg w-full sm:w-auto">
                {['all', 'daily', 'monthly', 'yearly'].map(tf => (
                  <button key={tf} onClick={() => setTimeFilter(tf)} className={`flex-1 px-2 py-1.5 text-[11px] sm:text-xs font-bold rounded-md transition-colors ${timeFilter === tf ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}>
                    {tf === 'all' ? 'ทุกเวลา' : tf === 'daily' ? 'รายวัน' : tf === 'monthly' ? 'รายเดือน' : 'รายปี'}

              <div className="flex bg-slate-100 p-1 rounded-lg w-full sm:w-auto">
                {[
                  { id: 'ALL', label: 'ภาพรวม' },

                ].map(tf => (
                  <button key={tf.id} onClick={() => setTypeFilter(tf.id)} className={`flex-1 px-2 py-1.5 text-[10px] sm:text-xs font-bold rounded-md transition-colors ${typeFilter === tf.id ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}>
                    {tf.label}
                  </button>
                ))}
              </div>
            </div>
          )}

          {viewTab === 'assets' && (
            <div className="bg-white rounded-xl sm:rounded-3xl p-1 sm:p-5 shadow-sm border border-slate-100">
              {filteredAssets.length === 0 ? (
                <p className="text-center text-slate-400 py-10 text-sm font-medium">ไม่พบสินทรัพย์ที่ค้นหา</p>
              ) : (
                <div className="overflow-x-auto custom-scrollbar">
                  <table className="w-full text-center border-collapse">
                    <thead>
                      <tr className="border-b-2 border-slate-100">

                          <div className="flex items-center justify-center">Symbol {getSortIcon('symbol')}</div>

                        <th className="p-1 sm:p-3 text-[9px] sm:text-xs text-slate-700 font-bold uppercase text-center cursor-pointer hover:bg-slate-50 transition-colors select-none" onClick={() => requestSort('units')}>
                          <div className="flex items-center justify-center">In Port {getSortIcon('units')}</div>
                        </th>
                        <th className="p-1 sm:p-3 text-[9px] sm:text-xs text-slate-700 font-bold uppercase text-center cursor-pointer hover:bg-slate-50 transition-colors select-none" onClick={() => requestSort('avgCost')}>
                          <div className="flex items-center justify-center">Avg {getSortIcon('avgCost')}</div>
                        </th>
                        <th className="p-1 sm:p-3 text-[9px] sm:text-xs text-slate-700 font-bold uppercase text-center cursor-pointer hover:bg-slate-50 transition-colors select-none" onClick={() => requestSort('currentPrice')}>
                          <div className="flex items-center justify-center">Market {getSortIcon('currentPrice')}</div>
                        </th>
                        <th className="p-1 sm:p-3 text-[9px] sm:text-xs text-slate-700 font-bold uppercase text-center cursor-pointer hover:bg-slate-50 transition-colors select-none" title="คลิกเพื่อเรียงจาก P/L กำไร/ขาดทุน" onClick={() => requestSort('pl')}>
                          <div className="flex items-center justify-center"> Unrealized P/L {getSortIcon('pl')}</div>
                        </th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredAssets.map((asset, idx) => {

                        return (
                          <tr key={idx} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                            <td className="p-1 sm:p-3 text-center">
                              <div 
                                onClick={() => { if(activePort === 'all') setActivePort(asset.portId); }}
                                className={`font-bold text-[11px] sm:text-base inline-flex items-center gap-1 ${activePort === 'all' ? 'text-indigo-600 hover:text-indigo-800 cursor-pointer group' : 'text-slate-800'}`}

    function TradeModal({ activePortId, portNames, currentPriceMap, holdings, cashMap, onClose, onSave, initialData, showAlert }) {
      const [type, setType] = useState(initialData?.type || 'BUY'); 
      const portId = initialData?.portId || activePortId; 
      const [symbol, setSymbol] = useState(initialData?.symbol === 'รายการถอนเงิน' || initialData?.symbol === 'รายการฝากเงิน' ? '' : (initialData?.symbol || ''));
      const [units, setUnits] = useState(initialData != null ? initialData.units : '');
      const [price, setPrice] = useState(initialData != null ? initialData.price : '');
      const [date, setDate] = useState(initialData?.date ? toISODateString(initialData.date) : getLocalISODate());
      
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [suggestionList, setSuggestionList] = useState([]);
      const [isSearching, setIsSearching] = useState(false);
      const autocompleteWrapperRef = useRef(null);

      // ซ่อน Dropdown แนะนำชื่อหุ้นเมื่อคลิกที่อื่น
      useEffect(() => {
        function handleClickOutside(event) {
          if (autocompleteWrapperRef.current && !autocompleteWrapperRef.current.contains(event.target)) {
            setShowSuggestions(false);
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, [autocompleteWrapperRef]);

      const availableAssets = useMemo(() => {
        let assetsMap = new Map();
        if (holdings[portId]) {
          Object.entries(holdings[portId]).forEach(([sym, data]) => {
            if (data.units > 0) assetsMap.set(sym, data.units);
          });
        }
        if (initialData && initialData.type === 'SELL') {
           const sym = initialData.symbol;
           assetsMap.set(sym, (assetsMap.get(sym) || 0) + initialData.units);
        } else if (initialData && initialData.type === 'DIVIDEND') {
           const sym = initialData.symbol;
           if (!assetsMap.has(sym)) assetsMap.set(sym, 0);
        }
        return Array.from(assetsMap.entries()).map(([sym, u]) => ({ symbol: sym, units: u }));
      }, [holdings, portId, initialData]);

      // ระบบค้นหาและแนะนำชื่อหุ้น (API Mock)
      useEffect(() => {
        if (type !== 'BUY' || !symbol.trim()) {
           setSuggestionList([]);
           return;
        }

        const delayFn = setTimeout(async () => {
           setIsSearching(true);
           try {
              // ตัวอย่างการเรียก API (เปิดใช้งานหากมี Endpoint ที่ไม่ติด CORS)
              // const res = await fetch(`https://query2.finance.yahoo.com/v1/finance/search?q=${symbol}`);
              // if(!res.ok) throw new Error('API Fallback');
              
              // จำลอง API ด้วยฐานข้อมูลท้องถิ่นที่ครอบคลุม เพื่อความรวดเร็วและป้องกัน CORS Blocking
              await new Promise(r => setTimeout(r, 150)); 
              
              let baseList = portId === 'lib_us' ? US_STOCKS : portId === 'finan' ? FUND_STOCKS : THAI_STOCKS;
              const owned = holdings && holdings[portId] ? Object.keys(holdings[portId]).filter(sym => sym !== 'รายการฝากเงิน' && sym !== 'รายการถอนเงิน') : [];
              
              const combinedList = Array.from(new Set([...owned, ...baseList])).sort();
              const results = combinedList.filter(s => s.toLowerCase().includes(symbol.toLowerCase()));
              
              setSuggestionList(results.slice(0, 15)); 
           } catch (error) {
              console.error(error);
           } finally {
              setIsSearching(false);
           }
        }, 300);

        return () => clearTimeout(delayFn);
      }, [symbol, type, portId, holdings]);

      const isFirstMount = useRef(true);
      useEffect(() => {
        if (isFirstMount.current) {
          isFirstMount.current = false;
          return;
        }
        if (!initialData) {
          setSymbol('');
          setUnits('');
          setPrice('');
          if ((type === 'SELL' || type === 'DIVIDEND') && availableAssets.length > 0) {
             setSymbol(availableAssets[0].symbol); 
          }
        }
      }, [type, portId, availableAssets, initialData]);

      useEffect(() => {
        if (['BUY', 'SELL'].includes(type) && symbol.trim().toUpperCase() && !price && !initialData) {
          const sym = symbol.trim().toUpperCase();
          const holding = holdings[portId]?.[sym];
          if (holding && holding.sheetPrice) {
             setPrice(holding.sheetPrice);
          } else if (currentPriceMap[sym]) {
             setPrice(currentPriceMap[sym]);
          }
        }
      }, [symbol, type, currentPriceMap, holdings, portId, price, initialData]);

      const effectiveCash = useMemo(() => {
          let cash = cashMap[portId] || 0;
          if (initialData && initialData.portId === portId) {
              if (initialData.type === 'BUY') cash += (initialData.units * initialData.price);
              if (initialData.type === 'SELL') cash -= (initialData.units * initialData.price);
          }
          return cash;
      }, [cashMap, portId, initialData]);

      const handleSubmit = (e) => {
        e.preventDefault();
        const parsedUnits = parseFloat(units) || 0;
        const parsedPrice = parseFloat(price);
        
        if (!parsedPrice || parsedPrice <= 0) return showAlert('กรุณากรอกจำนวนเงิน/Cost ให้มากกว่า 0');

        if (['BUY', 'SELL'].includes(type)) {
          if (!symbol || !parsedUnits || parsedUnits <= 0) return showAlert('กรุณากรอกชื่อหุ้นและจำนวนให้ถูกต้อง');
          if (type === 'SELL') {
            let assetHolding = holdings[portId]?.[symbol.toUpperCase().trim()]?.units || 0;
            if (initialData && initialData.type === 'SELL' && initialData.symbol === symbol.toUpperCase().trim()) {
               assetHolding += initialData.units;
            }
            if (parsedUnits > assetHolding) {
               return showAlert(`ไม่สามารถขายได้! คุณมีหุ้น ${symbol.toUpperCase().trim()} เพียง ${formatNumber(assetHolding)} หุ้น`);
            }
          } else if (type === 'BUY') {
            const totalCost = parsedUnits * parsedPrice;
            if (totalCost > effectiveCash) {
                const formattedCash = portId === 'lib_us' ? formatUSD(effectiveCash) : formatCurrency(effectiveCash);
                return showAlert(`เงินสดในพอร์ตไม่พอ! พอร์ตนี้มีเงินสดให้เทรดเพียง ${formattedCash}`);
            }
          }
          const formattedDate = toThaiDateString(date);
          onSave({ type, portId, symbol: symbol.toUpperCase().trim(), units: parsedUnits, price: parsedPrice, date: formattedDate });
        } else if (type === 'DIVIDEND') {
          if (!symbol) return showAlert('กรุณาเลือกหุ้นที่ต้องการรับปันผล');
          const formattedDate = toThaiDateString(date);
          onSave({ type, portId, symbol: symbol.toUpperCase().trim(), units: parsedUnits, price: parsedPrice, date: formattedDate });
        } else if (type === 'DEPOSIT') {
          const formattedDate = toThaiDateString(date);
          onSave({ type, portId, symbol: 'รายการฝากเงิน', units: 0, price: parsedPrice, date: formattedDate });
        } else {
          const formattedDate = toThaiDateString(date);
          onSave({ type, portId, symbol: 'รายการถอนเงิน', units: 0, price: parsedPrice, date: formattedDate });
        }
      };

      const selectedAssetHolding = useMemo(() => {
        if ((type !== 'SELL' && type !== 'DIVIDEND') || !symbol) return 0;
        let currentUnits = holdings[portId]?.[symbol.toUpperCase().trim()]?.units || 0;
        if (initialData && initialData.type === 'SELL' && initialData.symbol === symbol.toUpperCase().trim()) {
           currentUnits += initialData.units;
        }
        return currentUnits;
      }, [type, portId, symbol, holdings, initialData]);

      const btnLabels = {
        BUY: 'ซื้อหุ้น',
        SELL: 'ขายหุ้น',
        DIVIDEND: 'รับปันผล',
        DEPOSIT: 'ฝากเงินเข้า',
        WITHDRAW: 'ถอนเงินออก'
      };

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/50 backdrop-blur-sm animate-in fade-in">
          <div className="bg-white w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl shadow-2xl p-6 animate-in slide-in-from-bottom-8">
            <div className="flex justify-between items-center mb-6">
              <div>
                <h2 className="text-xl font-black text-slate-800">บันทึกรายการเทรด</h2>
                <p className="text-xs text-indigo-600 font-bold mt-1">พอร์ต: {portNames[portId]}</p>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full"><Icon name="close" /></button>
            </div>

            <form onSubmit={handleSubmit} className="space-y-5">
              
              <div className="grid grid-cols-5 gap-1 bg-slate-100 p-1 rounded-xl">
                <button type="button" onClick={() => setType('BUY')} className={`py-2 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'BUY' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>ซื้อ</button>
                <button type="button" onClick={() => setType('SELL')} className={`py-2 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'SELL' ? 'bg-white shadow-sm text-rose-600' : 'text-slate-500'}`}>ขาย</button>
                <button type="button" onClick={() => setType('DIVIDEND')} className={`py-2 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'DIVIDEND' ? 'bg-white shadow-sm text-amber-600' : 'text-slate-500'}`}>ปันผล</button>
                <button type="button" onClick={() => setType('DEPOSIT')} className={`py-2 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'DEPOSIT' ? 'bg-white shadow-sm text-teal-600' : 'text-slate-500'}`}>ฝาก</button>
                <button type="button" onClick={() => setType('WITHDRAW')} className={`py-2 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'WITHDRAW' ? 'bg-white shadow-sm text-orange-600' : 'text-slate-500'}`}>ถอน</button>
              </div>

              {type !== 'WITHDRAW' && type !== 'DEPOSIT' && (
                <div>
                  <div className="flex justify-between items-end mb-1">
                     <label className="block text-xs font-bold text-slate-500">ชื่อหุ้น (Symbol)</label>
                     {(type === 'SELL' || type === 'DIVIDEND') && symbol && (
                        <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">
                          มีในพอร์ต: {formatNumber(selectedAssetHolding)} หุ้น
                        </span>
                     )}
                     {type === 'BUY' && (
                        <span className="text-[10px] font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded">
                          เงินสด: {portId === 'lib_us' ? formatUSD(effectiveCash) : formatCurrency(effectiveCash)}
                        </span>
                     )}
                  </div>

                  {type === 'BUY' ? (
                    <div className="relative" ref={autocompleteWrapperRef}>
                      <input 
                        type="text" 
                        value={symbol} 
                        onChange={e => {
                          setSymbol(e.target.value);
                          setShowSuggestions(true);
                        }} 
                        onFocus={() => setShowSuggestions(true)}
                        placeholder="เช่น PTT, AAPL" 
                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold uppercase text-slate-800 outline-none focus:border-indigo-500" 
                        required 
                        autoComplete="off" 
                      />
                      
                      {showSuggestions && symbol && type === 'BUY' && (
                        <ul className="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg max-h-48 overflow-y-auto custom-scrollbar">
                          {isSearching ? (
                            <li className="p-3 text-xs text-slate-400 text-center font-semibold">กำลังค้นหา...</li>
                          ) : suggestionList.length > 0 ? (
                            suggestionList.map(s => (
                              <li 
                                key={s} 
                                onClick={() => {
                                  setSymbol(s);
                                  setShowSuggestions(false);
                                }}
                                className="p-3 hover:bg-indigo-50 cursor-pointer font-bold text-slate-700 text-sm border-b border-slate-50 last:border-0 transition-colors"
                              >
                                {s}
                              </li>
                            ))
                          ) : (
                            <li className="p-3 text-xs text-slate-400 text-center font-semibold">ไม่พบรายชื่อหุ้น</li>
                          )}
                        </ul>
                      )}
                    </div>
                  ) : (
                    <select 
                      value={symbol} 
                      onChange={e => setSymbol(e.target.value)} 
                      className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold uppercase text-slate-800 outline-none focus:border-indigo-500" 
                      required
                    >
                      {availableAssets.length === 0 ? (
                         <option value="">-- ไม่มีหุ้นในพอร์ตนี้ --</option>
                      ) : (
                         availableAssets.map(a => (
                           <option key={a.symbol} value={a.symbol}>{a.symbol} (ลิมิต {formatNumber(a.units)} หุ้น)</option>
                         ))
                      )}
                    </select>
                  )}
                </div>
              )}

              {['BUY', 'SELL', 'DIVIDEND'].includes(type) && (
                <div className="flex gap-3">
                  <div className="flex-1">
                    <div className="flex justify-between items-end mb-1 gap-1">
                      <label className="block text-xs font-bold text-slate-500">จำนวนหุ้น</label>
                      {(type === 'SELL' || type === 'DIVIDEND') && symbol && (
                        <button 
                          type="button" 
                          onClick={() => setUnits(selectedAssetHolding)} 
                          className="text-[9px] font-bold text-indigo-700 bg-indigo-100 hover:bg-indigo-200 px-1.5 py-0.5 rounded whitespace-nowrap transition-colors"
                        >
                          ทั้งหมดในพอร์ต
                        </button>
                      )}
                    </div>
                    <input 
                      type="number" min="0" step="0.000001" 
                      max={type === 'SELL' ? selectedAssetHolding : undefined}
                      value={units} 
                      onChange={e => {
                        let val = e.target.value;
                        if (type === 'SELL' && parseFloat(val) > selectedAssetHolding) val = selectedAssetHolding;
                        setUnits(val);
                      }} 
                      className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-indigo-500" 
                      placeholder="0" required 
                    />
                  </div>
                  <div className="flex-1">
                    <label className="block text-xs font-bold text-slate-500 mb-1">{type === 'DIVIDEND' ? 'ปันผล/หุ้น' : 'Cost/หุ้น'} ({portId === 'lib_us' ? '$' : '฿'})</label>
                    <input type="number" min="0" step="0.00001" value={price} onChange={e => setPrice(e.target.value)} className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-${type === 'DIVIDEND' ? 'amber' : 'indigo'}-500`} placeholder="0.00000" required />
                  </div>
                </div>
              )}

              {['WITHDRAW', 'DEPOSIT'].includes(type) && (
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">
                    จำนวนเงิน ({portId === 'lib_us' ? 'USD' : 'บาท'})
                  </label>
                  <input 
                    type="number" min="0" step="0.00001" value={price} onChange={e => setPrice(e.target.value)} 
                    className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-${type === 'DEPOSIT' ? 'teal' : 'orange'}-500`} 
                    placeholder="0.00000" required 
                  />
                </div>
              )}

              <div>
                <label className="block text-xs font-bold text-slate-500 mb-1">วันที่ทำรายการ</label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-indigo-500" required />
              </div>

              <div className="pt-2">
                {['BUY', 'SELL', 'DIVIDEND'].includes(type) && (
                  <div className="flex justify-between items-center mb-4 p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <span className="text-sm font-bold text-slate-500">
                      {type === 'DIVIDEND' ? 'เงินปันผลรวม' : 'มูลค่ารวม'}
                    </span>
                    <span className="text-lg font-black text-slate-800">
                      {portId === 'lib_us' 
                        ? formatUSD(parseFloat(units||0) * parseFloat(price||0)) 
                        : formatCurrency(parseFloat(units||0) * parseFloat(price||0))}
                    </span>
                  </div>
                )}
                <button 
                  type="submit" 
                  disabled={(type === 'SELL' || type === 'DIVIDEND') && availableAssets.length === 0}
                  className={`w-full py-4 rounded-xl font-black text-white shadow-lg transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100 ${
                    type === 'BUY' ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-600/30' : 
                    type === 'SELL' ? 'bg-rose-500 hover:bg-rose-600 shadow-rose-500/30' : 
                    type === 'DIVIDEND' ? 'bg-amber-500 hover:bg-amber-600 shadow-amber-500/30' : 
                    'bg-orange-500 hover:bg-orange-600 shadow-orange-500/30'
                  }`}
                >
                  ยืนยันการ{btnLabels[type]}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function AdminPanel({ accounts, setAccounts, onExit, showConfirm, showAlert, setIsLoading }) {
      const [selectedMainAcc, setSelectedMainAcc] = useState('B');
      const [newSubAccName, setNewSubAccName] = useState('');
      
      const [editingAccId, setEditingAccId] = useState(null);
      const [editAccName, setEditAccName] = useState('');
      
      const [isCreating, setIsCreating] = useState(false);
      const [deletingId, setDeletingId] = useState(null);

      const handleAddSubAccount = async (e) => {
        e.preventDefault();
        const rawName = newSubAccName.trim().toUpperCase();
        if (!rawName) return;

        // บังคับให้ชื่อชีทขึ้นต้นด้วยชื่อบัญชีหลัก (B หรือ M) เพื่อให้ตอนรีเฟรชระบบดึงมาจัดกลุ่มถูก
        let finalSheetName = rawName;
        if (!finalSheetName.startsWith(selectedMainAcc)) {
            finalSheetName = `${selectedMainAcc}-${finalSheetName}`;
        }

        if (finalSheetName === 'B' || finalSheetName === 'M') {
            showAlert('ชื่อบัญชีต้องเป็นบัญชีย่อย (เช่น B1, M-Saving) ไม่สามารถใช้ชื่อบัญชีหลักได้');
            return;
        }

        const acc = accounts.find(a => a.id === selectedMainAcc);
        if (acc && acc.subAccounts.includes(finalSheetName)) {
            showAlert(`ไม่สามารถสร้างได้: มีบัญชีย่อยชื่อ "${finalSheetName}" อยู่ในบัญชีนี้แล้ว`);
            return;
        }

        setIsCreating(true); // เปิด Loading ที่ปุ่ม
        try {
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'createSheet', sheetName: finalSheetName })
          });
          const result = await response.json();
          
          if (result.status === 'success') {
            setAccounts(prev => prev.map(a => {
              if (a.id === selectedMainAcc) {
                return { ...a, subAccounts: [...a.subAccounts, finalSheetName].sort((a,b) => {
                      const numA = parseInt(a.replace(/\D/g, ''));
                      const numB = parseInt(b.replace(/\D/g, ''));
                      if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                      if (!isNaN(numA)) return -1;
                      if (!isNaN(numB)) return 1;
                      return a.localeCompare(b);
                  }) };
              }
              return a;
            }));
            setNewSubAccName('');
            showAlert(`สร้างบัญชีย่อย "${finalSheetName}" ใน Google Sheet เรียบร้อยแล้ว`);
          } else {
            showAlert(`เกิดข้อผิดพลาดในการสร้างแผ่นงาน: ${result.message}`);
          }
        } catch (error) {
          console.error("Create Sheet Error:", error);
          showAlert('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ โปรดลองอีกครั้ง');
        } finally {
          setIsCreating(false); // ปิด Loading ที่ปุ่ม
        }
      };

      const handleDeleteSubAccount = (mainId, subId) => {
        const acc = accounts.find(a => a.id === mainId);
        if (acc && acc.subAccounts.length <= 1) {
          showAlert('ไม่สามารถนำออกได้! ต้องมีบัญชีย่อยอย่างน้อย 1 บัญชีในแต่ละบัญชีหลัก');
          return;
        }

        showConfirm(`ยืนยันการนำบัญชีย่อย "${subId}" ออกจากหน้าจอหรือไม่? (ระบบจะเปลี่ยนชื่อแผ่นงานใน Google Sheet โดยตัด M หรือ B ออกเพื่อซ่อนข้อมูล)`, async () => {
          setDeletingId(subId); // เปิด Loading ที่ปุ่มลบ
          try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
              method: 'POST',
              body: JSON.stringify({ action: 'renameSheet', sheetName: subId })
            });
            const result = await response.json();
            
            if (result.status === 'success' || result.message === 'ไม่พบแผ่นงาน') {
              setAccounts(prev => prev.map(a => {
                if (a.id === mainId) {
                  return { ...a, subAccounts: a.subAccounts.filter(s => s !== subId).sort((a,b) => {
                      const numA = parseInt(a.replace(/\D/g, ''));
                      const numB = parseInt(b.replace(/\D/g, ''));
                      if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                      if (!isNaN(numA)) return -1;
                      if (!isNaN(numB)) return 1;
                      return a.localeCompare(b);
                  }) };
                }
                return a;
              }));
              showAlert('นำบัญชีย่อยออกจากหน้าจอเรียบร้อยแล้ว (เปลี่ยนชื่อชีทใน Google Sheet แล้ว)');
            } else {
              showAlert(`เกิดข้อผิดพลาดในการซ่อนแผ่นงาน: ${result.message}`);
            }
          } catch (error) {
            console.error("Rename Sheet Error:", error);
            showAlert('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ โปรดลองอีกครั้ง');
          } finally {
            setDeletingId(null); // ปิด Loading ที่ปุ่มลบ
          }
        });
      };

      const handleSaveEditName = (id) => {
        setAccounts(accounts.map(a => a.id === id ? { ...a, name: editAccName } : a));
        setEditingAccId(null);
      };

      return (
        <div className="min-h-[100dvh] bg-slate-50 p-6 flex flex-col items-center overflow-y-auto">
          <div className="w-full max-w-lg bg-white rounded-3xl shadow-xl p-6 md:p-8 animate-in slide-in-from-bottom-8 my-auto">
            <div className="flex justify-between items-center mb-8 border-b border-slate-100 pb-4">
              <div>
                <h2 className="text-2xl font-black text-slate-800">ระบบจัดการแอดมิน</h2>
                <p className="text-sm text-slate-500 font-medium mt-1">จัดการชื่อและบัญชีย่อย</p>
              </div>
              <button onClick={onExit} className="bg-slate-100 hover:bg-slate-200 text-slate-600 p-2 rounded-xl transition-colors"><Icon name="close" /></button>
            </div>
            
            <div className="mb-8">
              <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">รายชื่อบัญชีปัจจุบัน</h3>
              <div className="space-y-4">
                {accounts.map(acc => (
                  <div key={acc.id} className="bg-slate-50 rounded-2xl border border-slate-100 p-4">
                    
                    <h4 className="font-bold text-slate-800 mb-3 flex items-center justify-between gap-2">
                      <div className="flex items-center gap-2">
                        <div className="w-8 h-8 bg-indigo-100 text-indigo-700 font-black rounded-lg flex items-center justify-center text-sm">{acc.id}</div>
                        {editingAccId === acc.id ? (
                          <input 
                            type="text" value={editAccName} onChange={e => setEditAccName(e.target.value)} 
                            className="border border-indigo-300 px-2 py-1 rounded-md w-32 outline-none focus:ring-2 focus:ring-indigo-200" 
                            autoFocus
                          />
                        ) : (
                          <span>{acc.name}</span>
                        )}
                      </div>
                      {editingAccId === acc.id ? (
                        <button onClick={() => handleSaveEditName(acc.id)} className="text-emerald-600 hover:bg-emerald-100 p-1.5 rounded-lg"><Icon name="check" className="text-[18px]" /></button>
                      ) : (
                        <button onClick={() => { setEditingAccId(acc.id); setEditAccName(acc.name); }} className="text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 p-1.5 rounded-lg"><Icon name="edit" className="text-[18px]" /></button>
                      )}
                    </h4>

                    <div className="space-y-2 pl-2 border-l-2 border-slate-200 ml-4">
                      {acc.subAccounts.map(sub => (
                        <div key={sub} className="flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border border-slate-50">
                          <span className="text-sm font-bold text-slate-600 pl-2">บัญชี {sub}</span>
                          <button 
                            onClick={() => handleDeleteSubAccount(acc.id, sub)} 
                            className="text-rose-400 hover:text-rose-600 hover:bg-rose-50 p-1.5 rounded-lg transition-colors"
                            title="ลบบัญชีย่อยนี้ออกจากหน้าจอ"
                          >
                            <Icon name="delete" className="text-[18px]" />
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <form onSubmit={handleAddSubAccount} className="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100">
              <h3 className="text-sm font-bold text-indigo-800 mb-4 flex items-center gap-2"><Icon name="add_circle" className="text-[18px]" /> เพิ่มบัญชีย่อยใหม่</h3>
              <div className="grid grid-cols-2 gap-4 mb-4">
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1">เลือกบัญชีหลัก</label>
                  <select 
                    value={selectedMainAcc} 
                    onChange={e => setSelectedMainAcc(e.target.value)} 
                    disabled={isCreating}
                    className="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-400 outline-none font-bold text-slate-700 disabled:opacity-50"
                  >
                    {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1">ชื่อบัญชีย่อย</label>
                  <input 
                    type="text" 
                    value={newSubAccName} 
                    onChange={e => setNewSubAccName(e.target.value)}

                    placeholder="เช่น B4, M3 หรือชื่ออื่นๆ" 
                    required 
                  />
                </div>
              </div>
              <button 
                type="submit" 
                disabled={isCreating}
                className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md transition-colors flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
              >
                {isCreating ? (
                  <><div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> กำลังสร้าง...</>
                ) : (
                  <>+ เพิ่มบัญชีย่อย</>
                )}
              </button>
              <p className="text-[10px] text-indigo-500 mt-3 text-center">*หมายเหตุ: ถ้าระบุชื่อไม่ตรงกลุ่ม ระบบจะเติมชื่อบัญชีหลักนำหน้าให้อัตโนมัติเพื่อป้องกันข้อมูลสูญหาย (เช่น M-)</p>

    function PinModal({ onClose, onSuccess, showAlert }) {
      const [pin, setPin] = useState('');
      const handleSubmit = (e) => {
        e.preventDefault();
        if (pin === '062261') { onSuccess(); onClose(); } 
        else { showAlert('รหัสผ่านแอดมินไม่ถูกต้อง!'); setPin(''); }
      };
      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
          <div className="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-sm relative animate-in zoom-in-95">
            <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><Icon name="close" /></button>
            <div className="text-center mb-6 mt-4">
              <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="lock" className="text-[32px] text-slate-600" /></div>
              <h3 className="text-xl font-black text-slate-800">Admin Login</h3>
            </div>
            <form onSubmit={handleSubmit}>
              <input type="password" inputMode="numeric" value={pin} onChange={(e) => setPin(e.target.value)} placeholder="••••••" className="w-full text-center text-3xl tracking-widest p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none mb-4 font-black" autoFocus required />
              <button type="submit" className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-2xl transition-all">ยืนยันรหัสผ่าน</button>
            </form>
          </div>
        </div>
      );
    }

    function Dashboard({ balance, totalIncome, totalExpense, totalSaving, expensesByCategory, transactions, onEditTransaction, onDeleteTransaction }) {
      const [transactionFilter, setTransactionFilter] = useState('daily');
      const [typeFilter, setTypeFilter] = useState('all');

      const { displayTransactions, summary } = useMemo(() => {
        const today = new Date();
        const currentMonth = today.getMonth();
        const currentYear = today.getFullYear();

        const timeFiltered = transactions.filter(t => {
          const d = parseDate(t.date);
          if (transactionFilter === 'daily') return d.getDate() === today.getDate() && d.getMonth() === currentMonth && d.getFullYear() === currentYear;
          if (transactionFilter === 'monthly') return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
          if (transactionFilter === 'yearly') return d.getFullYear() === currentYear;
          return true;
        });

        const sums = timeFiltered.reduce((acc, curr) => {
          if (curr.type === 'income') acc.income += curr.amount;
          if (curr.type === 'expense') acc.expense += curr.amount;
          return acc;
        }, { income: 0, expense: 0 });

        const finalFiltered = timeFiltered.filter(t => typeFilter === 'all' ? true : t.type === typeFilter);
        
        finalFiltered.sort((a, b) => {
          const dateDiff = parseDate(b.date) - parseDate(a.date);
          if (dateDiff !== 0) return dateDiff;
          return String(b.id).localeCompare(String(a.id));
        });

        return { displayTransactions: finalFiltered, summary: sums };
      }, [transactions, transactionFilter, typeFilter]);

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <div className="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-2xl p-6 text-white shadow-lg">
            <div className="flex justify-between items-start mb-6">
              <div>
                <p className="text-indigo-100 text-sm font-medium mb-1">ยอดเงินคงเหลือ (พร้อมใช้)</p>
                <h2 className="text-4xl font-bold tracking-tight">{formatCurrency(balance)}</h2>
              </div>
              <div className="text-right">
                <p className="text-indigo-100 text-sm font-medium mb-1 flex items-center justify-end gap-1"><Icon name="savings" className="text-[16px]"/> เงินเก็บสะสม</p>
                <h3 className="text-2xl font-bold text-blue-200">{formatCurrency(totalSaving)}</h3>
              </div>
            </div>
            <div className="flex justify-between gap-4">
              <div className="flex items-center gap-3 bg-white/10 p-3 rounded-xl flex-1">
                <Icon name="arrow_circle_down" className="text-[32px] text-green-300" />
                <div><p className="text-xs text-indigo-100">รายรับรวม</p><p className="font-semibold text-sm">{formatCurrency(totalIncome)}</p></div>
              </div>
              <div className="flex items-center gap-3 bg-white/10 p-3 rounded-xl flex-1">
                <Icon name="arrow_circle_up" className="text-[32px] text-red-300" />
                <div><p className="text-xs text-indigo-100">รายจ่ายรวม</p><p className="font-semibold text-sm">{formatCurrency(totalExpense)}</p></div>
              </div>
            </div>
          </div>

          {/* 1. รายการล่าสุด */}
          <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col">
            <div className="flex justify-between items-center mb-5 flex-shrink-0">
              <h3 className="text-lg font-bold text-gray-800">รายการล่าสุด</h3>
              <div className="flex bg-gray-100 p-1 rounded-lg">
                <button onClick={() => setTransactionFilter('daily')} className={`px-3 py-1 text-xs font-medium rounded-md transition-colors ${transactionFilter === 'daily' ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-500 hover:text-gray-700'}`}>รายวัน</button>
                <button onClick={() => setTransactionFilter('monthly')} className={`px-3 py-1 text-xs font-medium rounded-md transition-colors ${transactionFilter === 'monthly' ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-500 hover:text-gray-700'}`}>รายเดือน</button>
                <button onClick={() => setTransactionFilter('yearly')} className={`px-3 py-1 text-xs font-medium rounded-md transition-colors ${transactionFilter === 'yearly' ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-500 hover:text-gray-700'}`}>รายปี</button>
              </div>
            </div>

            <div className="grid grid-cols-2 gap-3 mb-5">
              <div className="bg-gradient-to-br from-green-50 to-emerald-100 border border-green-200 p-3 sm:p-4 rounded-2xl flex flex-col justify-center items-center shadow-sm relative overflow-hidden">
                <div className="absolute -right-4 -bottom-4 opacity-10"><Icon name="arrow_circle_down" className="text-[64px] text-green-600" /></div>
                <span className="text-[10px] sm:text-[11px] text-green-700 font-extrabold uppercase tracking-wider mb-1 relative z-10">รายรับ ({transactionFilter === 'daily' ? 'วันนี้' : transactionFilter === 'monthly' ? 'เดือนนี้' : 'ปีนี้'})</span>
                <span className="text-lg sm:text-xl font-black text-green-700 relative z-10">+{formatCurrency(summary.income)}</span>
              </div>
              <div className="bg-gradient-to-br from-red-50 to-rose-100 border border-red-200 p-3 sm:p-4 rounded-2xl flex flex-col justify-center items-center shadow-sm relative overflow-hidden">
                <div className="absolute -right-4 -bottom-4 opacity-10"><Icon name="arrow_circle_up" className="text-[64px] text-red-600" /></div>
                <span className="text-[10px] sm:text-[11px] text-red-700 font-extrabold uppercase tracking-wider mb-1 relative z-10">รายจ่าย ({transactionFilter === 'daily' ? 'วันนี้' : transactionFilter === 'monthly' ? 'เดือนนี้' : 'ปีนี้'})</span>
                <span className="text-lg sm:text-xl font-black text-red-700 relative z-10">-{formatCurrency(summary.expense)}</span>
              </div>
            </div>

            <div className="flex gap-2 mb-4 overflow-x-auto custom-scrollbar pb-2 pt-1 px-1 -mx-1">
              <button onClick={() => setTypeFilter('all')} className={`px-4 py-2 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex-shrink-0 ${typeFilter === 'all' ? 'bg-gray-800 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>ทั้งหมด</button>
              <button onClick={() => setTypeFilter('income')} className={`px-4 py-2 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${typeFilter === 'income' ? 'bg-green-500 text-white shadow-md shadow-green-500/30' : 'bg-green-50 text-green-700 hover:bg-green-100 border border-green-100'}`}><Icon name="arrow_circle_down" className="text-[14px]" /> รายรับ</button>
              <button onClick={() => setTypeFilter('expense')} className={`px-4 py-2 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${typeFilter === 'expense' ? 'bg-red-500 text-white shadow-md shadow-red-500/30' : 'bg-red-50 text-red-700 hover:bg-red-100 border border-red-100'}`}><Icon name="arrow_circle_up" className="text-[14px]" /> รายจ่าย</button>
              <button onClick={() => setTypeFilter('saving')} className={`px-4 py-2 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${typeFilter === 'saving' ? 'bg-blue-500 text-white shadow-md shadow-blue-500/30' : 'bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-100'}`}><Icon name="savings" className="text-[14px]" /> เงินเก็บ</button>
              <button onClick={() => setTypeFilter('withdraw')} className={`px-4 py-2 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${typeFilter === 'withdraw' ? 'bg-indigo-500 text-white shadow-md shadow-indigo-500/30' : 'bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-100'}`}><Icon name="price_change" className="text-[14px]" /> ถอนเงิน</button>
            </div>

            {displayTransactions.length === 0 ? (
              <p className="text-center text-gray-400 py-6 text-sm bg-gray-50 rounded-xl border border-dashed border-gray-200">ไม่มีรายการ{typeFilter !== 'all' ? 'ในหมวดหมู่นี้' : ''}</p>
            ) : (
              <div className="space-y-4 max-h-[280px] overflow-y-auto custom-scrollbar pr-2">
                {displayTransactions.map(t => <TransactionItem key={t.id} transaction={t} showActions onEdit={onEditTransaction} onDelete={onDeleteTransaction} />)}
              </div>
            )}
          </div>

          {/* 2. สถิติรายการ */}
          <TransactionChart transactions={transactions} />

          {/* 3. สัดส่วนรายจ่าย */}
          {expensesByCategory.length > 0 && (
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col">
              <h3 className="text-lg font-bold text-gray-800 mb-4 flex-shrink-0">สัดส่วนรายจ่าย</h3>
              <div className="space-y-4">
                {expensesByCategory.map((category) => (
                  <div key={category.id}>
                    <div className="flex justify-between items-center mb-1">
                      <div className="flex items-center gap-2">
                        <div className={`p-1.5 rounded-lg ${category.color} text-white`}><Icon name={category.icon} className="text-[16px]" /></div>
                        <span className="text-sm font-medium text-gray-700">{category.name}</span>
                      </div>
                      <span className="text-sm font-semibold text-gray-900">{formatCurrency(category.amount)}</span>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-2">
                      <div className={`h-2 rounded-full ${category.color}`} style={{ width: `${Math.min(category.percentage, 100)}%` }}></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

        </div>
      );
    }

    // ... (ส่วนที่เหลือทั้งหมด AddTransactionForm, TransactionHistory, ฯลฯ ใช้โค้ดเดิมได้เลยครับ ผมข้ามไปเพื่อความกระชับ)
    function AddTransactionForm({ onSave, initialData, onCancel, usdRate, showAlert, totalSaving, balance }) {
      const [type, setType] = useState(initialData?.type || 'expense');
      const [amount, setAmount] = useState(initialData?.amount || '');
      const [category, setCategory] = useState(initialData?.category || 'food');
      const [date, setDate] = useState(initialData?.date ? toISODateString(initialData.date) : getLocalISODate());
      const [note, setNote] = useState(initialData?.note || '');
      const [portId, setPortId] = useState(initialData?.portId || 'lib');
      const [usdAmount, setUsdAmount] = useState(initialData?.usdAmount || '');
      
      const handleTypeChange = (newType) => {
        setType(newType);
        if (newType === 'expense') setCategory('food');
        else if (newType === 'income') setCategory('salary');
        else if (newType === 'saving') setCategory('general_saving');
        else if (newType === 'withdraw') setCategory('withdraw_saving');
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const parsedAmount = parseFloat(amount);
        if (!parsedAmount || isNaN(parsedAmount) || parsedAmount <= 0) return showAlert('กรุณากรอกจำนวนเงินให้มากกว่า 0');
        
        if (type === 'withdraw') {
           const currentSaved = initialData && initialData.type === 'withdraw' 
                                ? totalSaving + initialData.amount 
                                : totalSaving;
           if (parsedAmount > currentSaved) {
               return showAlert(`ยอดเงินเก็บสะสมมีไม่พอให้ถอน (สูงสุด ${formatCurrency(currentSaved)})`);
           }
        }

        if (type === 'saving') {
           let effectiveBalance = balance;
           if (initialData) {
               if (initialData.type === 'income') effectiveBalance -= initialData.amount;
               if (initialData.type === 'expense') effectiveBalance += initialData.amount;
               if (initialData.type === 'saving') effectiveBalance += initialData.amount;
               if (initialData.type === 'withdraw') effectiveBalance -= initialData.amount;
           }
           if (parsedAmount > effectiveBalance) {
               return showAlert(`ยอดเงินคงเหลือ (พร้อมใช้) มีไม่พอให้จัดเก็บ (สูงสุด ${formatCurrency(effectiveBalance)})`);
           }
        }
        
        const formattedDate = toThaiDateString(date);
        const payload = { type, amount: parsedAmount, category, date: formattedDate, note };
        if (type === 'saving' && category === 'investment') {
           payload.portId = portId;
           if (portId === 'lib_us') {
               const parsedUsd = parseFloat(usdAmount);
               if (!parsedUsd || isNaN(parsedUsd) || parsedUsd <= 0) return showAlert('กรุณากรอกจำนวนเงิน USD ให้มากกว่า 0');
               payload.usdAmount = parsedUsd;
           }
        }

        onSave(payload);
      };

      return (
        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 animate-in fade-in max-w-md mx-auto relative">
          {initialData && <button type="button" onClick={onCancel} className="absolute top-4 right-4 bg-slate-100 p-1 rounded-full text-slate-500 hover:bg-slate-200"><Icon name="close"/></button>}
          <h2 className="text-2xl font-black text-slate-800 mb-6 text-center">{initialData ? 'แก้ไขรายการ' : 'บันทึกรายการใหม่'}</h2>
          <form onSubmit={handleSubmit} className="space-y-5">
             <div className="flex p-1 bg-gray-100 rounded-xl flex-wrap">
              <button type="button" onClick={() => handleTypeChange('expense')} className={`flex-1 py-2 text-[11px] sm:text-sm font-semibold rounded-lg transition-colors ${type === 'expense' ? 'bg-white text-red-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>รายจ่าย</button>
              <button type="button" onClick={() => handleTypeChange('income')} className={`flex-1 py-2 text-[11px] sm:text-sm font-semibold rounded-lg transition-colors ${type === 'income' ? 'bg-white text-green-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>รายรับ</button>
              <button type="button" onClick={() => handleTypeChange('saving')} className={`flex-1 py-2 text-[11px] sm:text-sm font-semibold rounded-lg transition-colors ${type === 'saving' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>เงินเก็บ</button>
              <button type="button" onClick={() => handleTypeChange('withdraw')} className={`flex-1 py-2 text-[11px] sm:text-sm font-semibold rounded-lg transition-colors ${type === 'withdraw' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>ถอนเงิน</button>
            </div>
            
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-2">หมวดหมู่</label>
              <div className={`grid gap-2 ${type === 'withdraw' ? 'grid-cols-1' : 'grid-cols-4'}`}>
                  {CATEGORIES[type].filter(c=>c.id!=='port_withdraw').map((c) => (
                    <button key={c.id} type="button" onClick={() => setCategory(c.id)} className={`flex flex-col items-center justify-center p-2 rounded-xl border-2 transition-all ${category === c.id ? `border-transparent ${c.color} text-white scale-105` : 'border-gray-100 bg-gray-50 text-gray-600'}`}>
                      <Icon name={c.icon} className={`${type === 'withdraw' ? 'text-[28px]' : 'text-[20px] sm:text-[24px]'} mb-1`} />
                      <span className="text-[10px] sm:text-xs font-bold text-center leading-tight">{c.name}</span>
                    </button>
                  ))}
              </div>
            </div>

            {type === 'saving' && category === 'investment' && (
               <div className="animate-in fade-in slide-in-from-top-2">
                  <label className="block text-sm font-medium text-gray-700 mb-1">เลือกพอร์ตลงทุน</label>
                  <select value={portId} onChange={e => setPortId(e.target.value)} className="block w-full px-4 py-3 bg-indigo-50 border border-indigo-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-indigo-800 font-bold outline-none">
                    {Object.entries(PORT_NAMES).map(([id, name]) => (<option key={id} value={id}>{name}</option>))}
                  </select>
               </div>
            )}

            <div>
              <div className="flex justify-between items-end mb-1">
                <label className="block text-sm font-medium text-gray-700">จำนวนเงิน (บาท)</label>
                {type === 'withdraw' && <span className="text-[10px] font-bold text-violet-600 bg-violet-50 px-2 py-0.5 rounded">มีในคลัง: {formatCurrency(totalSaving)}</span>}
                {type === 'saving' && category === 'investment' && portId === 'lib_us' && amount && <span className="text-[10px] font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded">เรท {usdRate.toFixed(2)} ≈ {formatUSD(amount / usdRate)}</span>}
              </div>
              <div className="relative">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span className="text-gray-500 font-semibold">฿</span></div>
                <input type="number" min="0" step="0.01" value={amount} onChange={(e) => setAmount(e.target.value)} className="block w-full pl-8 pr-4 py-3 border border-gray-200 rounded-xl font-bold text-lg outline-none focus:border-indigo-500" placeholder="0.00" required />
              </div>
            </div>

            {type === 'saving' && category === 'investment' && portId === 'lib_us' && (
              <div className="animate-in fade-in slide-in-from-top-2">
                <label className="block text-sm font-medium text-gray-700 mb-1">จำนวนเงิน (USD) ที่เข้าพอร์ตจริง</label>
                <div className="relative">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span className="text-gray-500 font-semibold">$</span></div>
                  <input type="number" min="0" step="0.01" value={usdAmount} onChange={(e) => setUsdAmount(e.target.value)} className="block w-full pl-8 pr-4 py-3 border border-indigo-200 bg-indigo-50/30 rounded-xl font-bold text-lg text-indigo-700 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="0.00" required />
                </div>
              </div>
            )}

            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">วันที่</label>
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full p-3 border border-gray-200 rounded-xl font-bold outline-none focus:border-indigo-500" required />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">บันทึกเพิ่มเติม (ถ้ามี)</label>
              <input type="text" value={note} onChange={(e) => setNote(e.target.value)} className="block w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-gray-700 outline-none" placeholder="เช่น ซื้อกาแฟ, ค่ารถเมล์..." />
            </div>
            <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-95 transition-transform">บันทึก</button>
          </form>
        </div>
      );
    }

    function TransactionHistory({ transactions, onEdit, onDelete }) {
      const groupedTransactions = useMemo(() => {
        const groups = {};
        transactions.forEach(t => {
          const normDate = t.date.includes('/') ? t.date : formatDate(t.date);
          if (!groups[normDate]) groups[normDate] = [];
          groups[normDate].push(t);
        });
        return Object.keys(groups).sort((a, b) => parseDate(b) - parseDate(a)).map(date => {
           const sortedItems = groups[date].sort((a, b) => String(b.id).localeCompare(String(a.id)));
           return { date, items: sortedItems };
        });
      }, [transactions]);

      return (
        <div className="space-y-4 animate-in fade-in">
          <h2 className="text-xl font-bold text-gray-800">ประวัติรายการ</h2>
          <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
             {groupedTransactions.length === 0 ? <p className="text-center text-gray-400 py-4">ไม่มีข้อมูล</p> : 
              groupedTransactions.map(group => (
                <div key={group.date}>
                  <h3 className="text-sm font-bold text-gray-500 mb-2 mt-4 border-b pb-1">{group.date}</h3>
                  {group.items.map(t => <TransactionItem key={t.id} transaction={t} showActions onEdit={onEdit} onDelete={onDelete} />)}
                </div>
              ))}
          </div>
        </div>
      );
    }

    function TransactionItem({ transaction, showActions = false, onEdit, onDelete }) {
      const categoryList = CATEGORIES[transaction.type] || CATEGORIES.expense;
      const categoryDef = categoryList.find(c => c.id === transaction.category) || categoryList[categoryList.length - 1];

      let amountColor = 'text-gray-800';
      let amountPrefix = '-';
      if (transaction.type === 'income') { amountColor = 'text-green-600'; amountPrefix = '+'; } 
      else if (transaction.type === 'saving') { amountColor = 'text-blue-600'; amountPrefix = '🏦 '; }
      else if (transaction.type === 'withdraw') { amountColor = 'text-indigo-600'; amountPrefix = '💸 +'; }
      else if (transaction.type === 'expense') { amountColor = 'text-red-500'; amountPrefix = '-'; }

      const timeDisplay = transaction.recordTime || (transaction.timestamp ? new Date(transaction.timestamp).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) : null);

      return (
        <div className="flex items-center justify-between py-3 border-b border-gray-50">
          <div className="flex items-center gap-3">
            <div className={`p-2.5 rounded-xl ${categoryDef.color} text-white shadow-sm`}><Icon name={categoryDef.icon} className="text-[20px]" /></div>
            <div>
              <p className="font-semibold text-sm text-gray-800 leading-tight">{transaction.note || categoryDef.name}</p>
              <p className="text-[10px] text-gray-500 mt-0.5">
                {categoryDef.name} {transaction.type === 'saving' && transaction.category === 'investment' && transaction.portId ? `(${PORT_NAMES[transaction.portId] || transaction.portId})` : ''}
                {timeDisplay && <span className="text-blue-600 font-bold text-[11px] sm:text-[12px]"> (เวลา {timeDisplay} น.)</span>}
              </p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <span className={`font-bold ${amountColor}`}>{amountPrefix}{formatCurrency(transaction.amount)}</span>
            {showActions && (
              <div className="flex items-center gap-1">
                <button onClick={() => onEdit && onEdit(transaction)} className="text-gray-300 hover:text-indigo-500 p-1 transition-colors" title="แก้ไขรายการ"><Icon name="edit" className="text-[16px]"/></button>
                <button onClick={() => onDelete && onDelete(transaction.id)} className="text-gray-300 hover:text-red-500 p-1 transition-colors" title="ลบรายการ"><Icon name="delete" className="text-[16px]"/></button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
