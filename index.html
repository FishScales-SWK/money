    const US_STOCKS = ['AAPL','ABBV','ABT','ACN','ADBE','AMAT','AMD','AMZN','AVGO','BAC','BRK.B','COST','CRM','CSCO','DHR','DIS','GOOGL','HD','IBM','INTC','JNJ','JPM','KO','LIN','LRCX','MA','MCD','META','MRK','MSFT','MU','NEE','NFLX','NKE','NVDA','PEP','PFE','PG','PM','QCOM','TMO','TSLA','TXN','UNH','V','WMT','XOM'];

    // Date Time Utilities
    const getLocalISODate = () => {
      const tzoffset = (new Date()).getTimezoneOffset() * 60000; 
      return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
    };

    const parseDate = (dateStr) => {
      if (!dateStr) return new Date();
      let cleanStr = typeof dateStr === 'string' ? dateStr.split(' เวลา ')[0].trim() : dateStr;
      if (cleanStr.includes('/')) {
        const [day, month, thaiYear] = cleanStr.split('/');
        return new Date(parseInt(thaiYear, 10) - 543, parseInt(month, 10) - 1, parseInt(day, 10));
      }
      if (cleanStr.includes('-')) {
        const parts = cleanStr.split('T')[0].split('-');
        if (parts.length >= 3) {
          return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
        }
      }
      return new Date(cleanStr);
    };

    const toThaiDateString = (isoDate) => {
      if (!isoDate) return '';
      let cleanStr = typeof isoDate === 'string' ? isoDate.split(' เวลา ')[0].trim() : isoDate;
      if (cleanStr.includes('/')) return cleanStr;
      const [year, month, day] = cleanStr.split('-');
      return `${day.padStart(2, '0')}/${month.padStart(2, '0')}/${parseInt(year, 10) + 543}`;
    };

    const toISODateString = (thaiDate) => {
      if (!thaiDate) return '';
      let cleanStr = typeof thaiDate === 'string' ? thaiDate.split(' เวลา ')[0].trim() : thaiDate;
      if (cleanStr.includes('-')) return cleanStr.split('T')[0]; 
      const [day, month, thaiYear] = cleanStr.split('/');
      return `${parseInt(thaiYear, 10) - 543}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
    };

    const formatDate = (dateString) => {
      if (!dateString) return '';
      let cleanStr = typeof dateString === 'string' ? dateString.split(' เวลา ')[0].trim() : dateString;
      if (cleanStr.includes('/')) return cleanStr; 
      const date = parseDate(cleanStr);
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear() + 543;
      return `${day}/${month}/${year}`;
    };

    const generateSequentialId = (dateString, items) => {
      if (!dateString) return Date.now().toString(); 
      const parsedStr = dateString.includes('/') ? dateString.split(' เวลา ')[0].trim() : toThaiDateString(dateString);
      const [day, month, thaiYear] = parsedStr.split('/');
      const prefix = `${day}-${month}-${thaiYear}-`;

      let maxSeq = 0;
      items.forEach(item => {
        const itemIdStr = String(item.id);
        if (itemIdStr.startsWith(prefix)) {
          const seqStr = itemIdStr.replace(prefix, '');
          const seqNum = parseInt(seqStr, 10);
          if (!isNaN(seqNum) && seqNum > maxSeq) {
            maxSeq = seqNum;
          }
        }
      });

      const nextSeq = String(maxSeq + 1).padStart(3, '0');
      return `${prefix}${nextSeq}`;
    };

    const formatCurrency = (amount, maxDecimals = 2) => {
      return new Intl.NumberFormat('th-TH', { 
        style: 'currency', currency: 'THB', minimumFractionDigits: 2, maximumFractionDigits: Math.max(2, maxDecimals)
      }).format(amount || 0);
    };

    const formatUSD = (amount, maxDecimals = 2) => {
      return new Intl.NumberFormat('en-US', { 
        style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: Math.max(2, maxDecimals)
      }).format(amount || 0);
    };

    const formatNumber = (num) => new Intl.NumberFormat('th-TH').format(num || 0);

    const getProfileTheme = (index) => {
      const themes = [
        { from: 'from-blue-400', to: 'to-indigo-500', shadow: 'shadow-blue-500/10', text: 'from-blue-600 to-indigo-600' },

      return themes[index % themes.length];
    };

    const initialAccounts = [
      { id: 'B', name: 'คุณ B', subAccounts: ['B1', 'B2', 'B3'] }, // ใช้ค่าเริ่มต้นเพื่อให้กดเข้าใช้งานได้ทันที ไม่ต้องรอโหลด
      { id: 'M', name: 'คุณ M', subAccounts: ['M1', 'M2'] }
    ];

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================

    function App() {
      const [accounts, setAccounts] = useState(initialAccounts);
      const [activeUser, setActiveUser] = useState(null); 
      const [activeSubAccount, setActiveSubAccount] = useState('');
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [transactions, setTransactions] = useState([]);
      const [trades, setTrades] = useState([]);
      
      // ให้ isLoading เริ่มต้นเป็น false เพื่อไม่ให้หน้าแรกติดสถานะโหลด
      const [isLoading, setIsLoading] = useState(false);
      
      const [marketPrices, setMarketPrices] = useState({});
      const [usdRate, setUsdRate] = useState(35.50);

      const [showPinModal, setShowPinModal] = useState(false);
      const [isAdminMode, setIsAdminMode] = useState(false);
      const [editingTransaction, setEditingTransaction] = useState(null);
      
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null });
      const [showPortfolioSplash, setShowPortfolioSplash] = useState(false);

      // โหลดข้อมูลบัญชี (ชื่อ Sheet) จาก Google Sheets ออนไลน์ 100% เสมอ ป้องกันหายเวลารีเฟรช
      useEffect(() => {
        const fetchAccountsFromSheets = async () => {
          // ❌ ปิดการตั้งค่า setIsLoading(true) เพื่อดึงข้อมูลแบบเงียบๆ เบื้องหลัง (Background Sync) ไม่รบกวนผู้ใช้
          try {
            // &t=... ป้องกันการจำแคช (Cache-Busting) เพื่อให้ได้รายชื่อล่าสุดตลอดเวลา
            const url = `${GOOGLE_SCRIPT_URL}?action=getSheets&t=${new Date().getTime()}`;
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.status === 'success' && Array.isArray(result.data)) {
              const sheetNames = result.data;
              
              setAccounts(prevAccounts => {
                const updatedAccounts = [
                  { id: 'B', name: 'คุณ B', subAccounts: [] },
                  { id: 'M', name: 'คุณ M', subAccounts: [] }
                ];
                
                sheetNames.forEach(sheetName => {
                  const match = sheetName.match(/^([BM])\d+$/i);
                  if (match) {
                    // หากชื่อชีทตรงตามรูปแบบ B1, B2, M1 ให้จัดการเข้าไปในกลุ่มบัญชีย่อย
                    const userId = match[1].toUpperCase();
                    const targetAcc = updatedAccounts.find(a => a.id === userId);
                    if (targetAcc && !targetAcc.subAccounts.includes(sheetName.toUpperCase())) {
                      targetAcc.subAccounts.push(sheetName.toUpperCase());
                    }
                  } else {
                    // เก็บตกรองรับกรณีมีชีทชื่ออื่นที่ขึ้นต้นด้วย B หรือ M (เช่น B-Saving) ที่เคยสร้างไว้
                    const firstChar = sheetName.charAt(0).toUpperCase();
                    if (firstChar === 'B' || firstChar === 'M') {
                        const targetAcc = updatedAccounts.find(a => a.id === firstChar);
                        if (targetAcc && !targetAcc.subAccounts.includes(sheetName)) {
                            targetAcc.subAccounts.push(sheetName);
                        }
                    }
                  }
                });
                
                // คืนค่าบัญชีที่จัดกลุ่มและเรียงลำดับให้ถูกต้อง (บัญชีที่มีตัวเลข เช่น B1, M1 ต้องอยู่หน้าสุดเสมอ)
                return updatedAccounts.map(acc => {
                  // ถ้าระบบออนไลน์ยังไม่มีบัญชี ให้ใช้ค่าเดิมไปก่อน เพื่อไม่ให้ปุ่มกดไม่ได้และดูว่างเปล่า
                  const finalSubAccounts = acc.subAccounts.length > 0 ? acc.subAccounts : prevAccounts.find(p => p.id === acc.id).subAccounts;
                  return {
                    ...acc,
                    subAccounts: finalSubAccounts.sort((a,b) => {
                        const numA = parseInt(a.replace(/\D/g, ''));
                        const numB = parseInt(b.replace(/\D/g, ''));
                        // ถ้ามีตัวเลขทั้งคู่ เรียงตามตัวเลข
                        if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                        // ถ้า a มีตัวเลข ให้ a อยู่หน้า
                        if (!isNaN(numA)) return -1;
                        // ถ้า b มีตัวเลข ให้ b อยู่หน้า
                        if (!isNaN(numB)) return 1;
                        // ถ้าไม่มีตัวเลขทั้งคู่ เรียงตามตัวอักษร
                        return a.localeCompare(b);
                    })
                  };
                });
              });
            }
          } catch (error) {
            console.error("Error fetching accounts from sheets:", error);
          }
        };

        fetchAccountsFromSheets();
      }, []);

      const showConfirm = (message, onConfirm) => {
        setDialog({ isOpen: true, type: 'confirm', message, onConfirm });
      };

      const showAlert = (message) => {
        setDialog({ isOpen: true, type: 'alert', message, onConfirm: null });
      };

      const currentUser = useMemo(() => accounts.find(a => a.id === activeUser), [accounts, activeUser]);
      
      const userTransactions = useMemo(() => {
        return transactions.filter(t => t.userId === activeUser && t.subAccountId === activeSubAccount);
      }, [transactions, activeUser, activeSubAccount]);

      const getTypeNameTh = (typeId) => {
        if (typeId === 'income') return 'รายรับ';
        if (typeId === 'expense') return 'รายจ่าย';
        if (typeId === 'saving') return 'เงินเก็บ';
        if (typeId === 'withdraw') return 'ถอนเงิน';
        if (typeId === 'รายรับ') return 'income';
        if (typeId === 'รายจ่าย') return 'expense';
        if (typeId === 'เงินเก็บ') return 'saving';
        if (typeId === 'ถอนเงิน') return 'withdraw';
        return typeId;
      };

      const getCategoryNameTh = (typeId, catId) => {
         if (['income', 'expense', 'saving', 'withdraw'].includes(typeId)) {
            const catObj = CATEGORIES[typeId]?.find(c => c.id === catId);
            return catObj ? catObj.name : catId;
         }
         const thType = getTypeNameTh(typeId);
         if (thType && CATEGORIES[thType]) {
             const catObj = CATEGORIES[thType].find(c => c.name === catId);
             return catObj ? catObj.id : catId;
         }
         return catId;
      };

      const extractDateAndTime = (rawDate) => {
        let cDate = rawDate;
        let rTime = null;
        if (typeof cDate === 'string' && cDate.includes('เวลา')) {
          const parts = cDate.split(' เวลา ');
          cDate = parts[0].trim();
          rTime = parts[1].replace(' น.', '').trim();
          if (rTime.split(':').length === 3) {
              rTime = rTime.split(':').slice(0, 2).join(':'); // แยกแค่ HH:mm
          }
        }
        return { cleanDate: cDate, recordTime: rTime };
      };

      const loadMarketPrices = async (tradesList) => {
        const uniqueItems = [...new Set(tradesList
           .filter(t => t.symbol && !['รายการฝากเงิน', 'รายการถอนเงิน'].includes(t.symbol))
           .map(t => `${t.symbol}:${t.portId}`))];
            
        if (uniqueItems.length === 0) return;
        
        try {
          const url = `${GOOGLE_SCRIPT_URL}?action=getPrices&symbols=${encodeURIComponent(uniqueItems.join(','))}&t=${new Date().getTime()}`;
          const response = await fetch(url);
          const result = await response.json();
          if (result.status === 'success' && result.data) {
             setMarketPrices(prev => ({ ...prev, ...result.data }));
          }
        } catch (error) {
          console.error("Load Prices Error:", error);
        }
      };

      const loadDataFromSheet = async (subAccId) => {
        if (!subAccId) return;
        setIsLoading(true);
        try {
          if (subAccId !== 'PORTFOLIO') {
            const url = `${GOOGLE_SCRIPT_URL}?subAccountId=${subAccId}&t=${new Date().getTime()}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.status === 'success') {
               const mappedData = (result.data || []).map(item => {
                   const extracted = extractDateAndTime(item.date);
                   return {
                       ...item,
                       date: extracted.cleanDate,
                       recordTime: item.recordTime || extracted.recordTime,
                       type: getTypeNameTh(item.type),
                       category: getCategoryNameTh(item.type, item.category)
                   };
               });
               setTransactions(mappedData);
            } else {
               setTransactions([]);
            }
          } 
          else {
            const url = `${GOOGLE_SCRIPT_URL}?sheet=invest&t=${new Date().getTime()}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.status === 'success') {
               const loadedTrades = (result.data || []).map(item => {
                   const extracted = extractDateAndTime(item.date);
                   return {
                       ...item,
                       date: extracted.cleanDate,
                       recordTime: item.recordTime || extracted.recordTime
                   };
               });
               setTrades(loadedTrades);
               if (result.usdRate) {
                  setUsdRate(Number(result.usdRate));
               }
               loadMarketPrices(loadedTrades);
            } else {
               setTrades([]);
            }
          }
        } catch (error) {
          console.error("Fetch API Error:", error);
          showAlert('ไม่สามารถเชื่อมต่อข้อมูลจาก Sheet ได้');
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        if (activeSubAccount) {
           loadDataFromSheet(activeSubAccount);
        }
      }, [activeSubAccount]);

      useEffect(() => {
        if (activeUser) {
           fetch(`${GOOGLE_SCRIPT_URL}?sheet=invest&t=${new Date().getTime()}`)
            .then(res => res.json())
            .then(result => {
               if (result.status === 'success' && result.usdRate) {
                  setUsdRate(Number(result.usdRate));
               }
            })
            .catch(err => console.error("Error fetching USD rate:", err));
        }
      }, [activeUser]);

      const sendDataToSheet = async (dataPayload, action = 'add') => {
        setIsLoading(true);
        try {
          let payloadToSave = { ...dataPayload, action };
          if (payloadToSave.sheetType !== 'invest' && payloadToSave.type) {
             payloadToSave.category = getCategoryNameTh(payloadToSave.type, payloadToSave.category);
             payloadToSave.type = getTypeNameTh(payloadToSave.type);
          }
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payloadToSave)
          });
          const result = await response.json();
          if (result.status !== 'success') {
             showAlert('เกิดข้อผิดพลาดในการดำเนินการ: ' + result.message);
          }
          loadDataFromSheet(payloadToSave.sheetType === 'invest' ? 'PORTFOLIO' : activeSubAccount);
        } catch (error) {
          console.error("Save Data Error:", error);
          showAlert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ ข้อมูลอาจบันทึกแบบ Offline เท่านั้น');
        } finally {
          setIsLoading(false);
        }
      };

      const { totalIncome, totalExpense, totalSaving, balance } = useMemo(() => {
        let income = 0;
        let expense = 0;
        let saving = 0;
        let investment = 0;
        let withdraw = 0;

        userTransactions.forEach(curr => {
          if (curr.type === 'income') {
            income += curr.amount;
          } else if (curr.type === 'expense') {
            expense += curr.amount;
          } else if (curr.type === 'saving') {
            if (curr.category !== 'investment') {
              saving += curr.amount;
            } else {
              investment += curr.amount;
            }
          } else if (curr.type === 'withdraw') {
            withdraw += curr.amount;
          }
        });

        const currentBalance = income + withdraw - expense - saving - investment;
        const netSaving = saving - withdraw;

        return {
          totalIncome: income,
          totalExpense: expense,
          totalSaving: netSaving,
          balance: currentBalance
        };
      }, [userTransactions]);

      const expensesByCategory = useMemo(() => {
        const expenses = userTransactions.filter(t => t.type === 'expense');
        const grouped = expenses.reduce((acc, curr) => {
          acc[curr.category] = (acc[curr.category] || 0) + curr.amount;
          return acc;
        }, {});

        return Object.entries(grouped)
          .map(([categoryId, amount]) => {
            const categoryObj = CATEGORIES.expense.find(c => c.id === categoryId) || CATEGORIES.expense[CATEGORIES.expense.length - 1];
            return { ...categoryObj, amount, percentage: totalExpense > 0 ? (amount / totalExpense) * 100 : 0 };
          }).sort((a, b) => b.amount - a.amount);
      }, [userTransactions, totalExpense]);

      const handleAddTransaction = async (newTransaction) => {
        const transactionId = generateSequentialId(newTransaction.date, transactions);
        const nowStr = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        const payload = { ...newTransaction, id: transactionId, userId: activeUser, subAccountId: activeSubAccount, recordTime: nowStr };
        
        setTransactions(prev => [payload, ...prev]);
        
        let updatedBalance = balance;
        let updatedSaving = totalSaving;
        
        if (payload.type === 'income') updatedBalance += payload.amount;
        if (payload.type === 'expense') updatedBalance -= payload.amount;
        if (payload.type === 'saving') {
            updatedBalance -= payload.amount;
            if(payload.category !== 'investment') updatedSaving += payload.amount;
        }
        if (payload.type === 'withdraw') {
            updatedBalance += payload.amount;
            updatedSaving -= payload.amount;
        }
        
        const updatedTotalMoney = updatedBalance + updatedSaving;

        await sendDataToSheet({
           ...payload,
           balance: updatedBalance,
           totalSaving: updatedSaving,
           totalMoney: updatedTotalMoney
        }, 'add');
        
        if (newTransaction.type === 'saving' && newTransaction.category === 'investment' && newTransaction.portId) {
           const depositPrice = newTransaction.portId === 'lib_us' ? newTransaction.usdAmount : newTransaction.amount;
           const tradeId = generateSequentialId(newTransaction.date, trades);

           const newTrade = {
             id: tradeId,
             userId: activeUser,
             portId: newTransaction.portId,
             symbol: 'รายการฝากเงิน',
             type: 'DEPOSIT',
             units: 0,
             price: depositPrice,
             date: newTransaction.date,
             recordTime: nowStr
           };
           
           setTrades(prev => [newTrade, ...prev]);
           await sendDataToSheet({ ...newTrade, sheetType: 'invest' }, 'add');
        }
        
        setActiveTab('dashboard');
      };

      const handleDeleteTransaction = (id) => {
        showConfirm('คุณแน่ใจหรือไม่ว่าต้องการลบรายการนี้?', async () => {
          setTransactions(prev => prev.filter(t => t.id !== id));
          await sendDataToSheet({ id, subAccountId: activeSubAccount }, 'delete');
        });
      };

      const handleLogin = (userId, firstSubAccount) => {
        if (!firstSubAccount) {
            showAlert('บัญชีนี้ยังไม่มีบัญชีย่อย กรุณาเข้าไปสร้างในเมนูแอดมินก่อน');
            return;
        }
        setActiveUser(userId);
        setActiveSubAccount(firstSubAccount);
      };

      const renderContent = () => {
        if (isAdminMode) {
          return <AdminPanel accounts={accounts} setAccounts={setAccounts} onExit={() => setIsAdminMode(false)} showConfirm={showConfirm} showAlert={showAlert} setIsLoading={setIsLoading} />;
        }

        if (!activeUser) {
          return (
            <div className="min-h-[100dvh] bg-slate-50 relative flex flex-col items-center justify-center p-6 overflow-hidden">
              <div className="blob-1 absolute top-1/4 -left-10 md:left-20 w-72 h-72 bg-blue-300 rounded-full mix-blend-multiply filter blur-[80px] opacity-40"></div>
              <div className="blob-2 absolute top-1/3 -right-10 md:right-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-[80px] opacity-40"></div>
              
              <div className="relative z-10 w-full max-w-2xl flex flex-col items-center">
                <div className="text-center mb-12 animate-in fade-in duration-700 relative">
                  <button 
                    onClick={() => setShowPinModal(true)} 
                    className="inline-flex items-center justify-center w-20 h-20 bg-white/60 backdrop-blur-xl rounded-[2rem] shadow-xl shadow-slate-200/50 mb-6 border border-white/50 hover:scale-105 transition-all"
                    title="จัดการบัญชี (Admin)"
                  >
                    <Icon name="account_balance_wallet" className="text-[40px] text-indigo-600" />
                  </button>
                  <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-800 to-slate-600 mb-3 tracking-tight">Smart Money</h1>
                  <p className="text-slate-500 font-medium text-lg">เลือกบัญชีผู้ใช้งานของคุณ</p>
                </div>

                <div className="flex flex-wrap justify-center gap-6 sm:gap-10 w-full animate-in fade-in duration-1000 delay-150">
                  {accounts.map((acc, idx) => {
                    const theme = getProfileTheme(idx);
                    return (
                      <button key={acc.id} onClick={() => handleLogin(acc.id, acc.subAccounts[0])} className="group flex flex-col items-center gap-5 transition-all duration-300 hover:-translate-y-2">
                        <div className="relative">
                          <div className={`absolute inset-0 bg-gradient-to-br ${theme.from} ${theme.to} rounded-[2.5rem] rotate-6 group-hover:rotate-12 transition-transform duration-300 opacity-20 group-hover:opacity-40 blur-sm`}></div>
                          <div className={`w-24 h-24 sm:w-28 sm:h-28 bg-white rounded-[2.5rem] shadow-xl ${theme.shadow} border-2 border-white/50 flex items-center justify-center relative z-10 overflow-hidden transition-shadow duration-300 backdrop-blur-sm`}>
                            <span className={`text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br ${theme.text} relative z-20 uppercase`}>{acc.id}</span>
                          </div>
                        </div>
                        <div className="flex flex-col items-center">
                          <span className="font-bold text-lg text-slate-800 transition-colors">{acc.name}</span>
                          <span className="text-xs text-slate-400 mt-1">{acc.subAccounts.length > 0 ? `${acc.subAccounts.length} บัญชีย่อย` : 'ยังไม่มีบัญชี'}</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {showPinModal && <PinModal onClose={() => setShowPinModal(false)} onSuccess={() => setIsAdminMode(true)} showAlert={showAlert} />}
            </div>
          );
        }

        return (
          <div className="h-[100dvh] bg-slate-50 flex flex-col overflow-hidden relative">
            
            {isLoading && (
               <div className="absolute inset-0 z-[999] bg-white/50 backdrop-blur-sm flex flex-col items-center justify-center">
                  <div className="loader mb-4"></div>
                  <p className="font-bold text-indigo-600 text-sm mt-3">กำลังเชื่อมต่อข้อมูล...</p>
               </div>
            )}

            <header className="bg-white shadow-sm px-4 sm:px-6 py-4 flex-shrink-0 z-10">
              <div className="max-w-3xl mx-auto flex justify-between items-center">
                <button onClick={() => { setActiveUser(null); setActiveTab('dashboard'); }} className="flex items-center gap-2 text-left hover:opacity-80 transition-opacity" title="กลับไปหน้าเลือกบัญชี">
                  <Icon name="account_balance_wallet" className="text-[24px] text-indigo-600" />
                  <h1 className="text-xl font-bold hidden sm:block text-slate-800">Smart Money</h1>
                  <span className={`text-xs sm:text-sm font-bold px-3 py-1 rounded-full ml-1 bg-indigo-100 text-indigo-700`}>{currentUser?.name}</span>
                </button>
                <div className="flex items-center gap-3">
                  <button onClick={() => { setActiveUser(null); setActiveTab('dashboard'); }} className="flex items-center gap-1.5 text-xs sm:text-sm font-semibold text-slate-500 hover:text-red-500 bg-slate-50 px-3 py-1.5 rounded-lg transition-colors">
                    <Icon name="logout" className="text-[16px]" />
                    <span className="hidden sm:inline">ออกระบบ</span>
                  </button>
                </div>
              </div>
              
              {currentUser && currentUser.subAccounts.length > 0 && (
                <div className="max-w-3xl mx-auto mt-4 flex gap-2 overflow-x-auto hide-scroll pb-1">
                  {currentUser.subAccounts.map((sub, idx) => (
                    <button key={sub} onClick={() => { setActiveSubAccount(sub); setActiveTab('dashboard'); }}
                      className={`px-4 py-1.5 text-xs sm:text-sm font-bold rounded-full transition-colors whitespace-nowrap flex items-center gap-1 ${activeSubAccount === sub ? 'bg-indigo-100 text-indigo-700 border border-indigo-200 shadow-sm' : 'bg-slate-50 text-slate-500 hover:bg-slate-100 border border-transparent'}`}
                    >
                      <Icon name="account_balance_wallet" className="text-[16px]" />
                      บัญชี {sub} {idx === 0 ? '(หลัก)' : ''}
                    </button>
                  ))}
                  
                  {activeUser === 'M' && (
                    <button onClick={() => { setActiveSubAccount('PORTFOLIO'); setActiveTab('dashboard'); setShowPortfolioSplash(true); }}
                      className={`px-4 py-1.5 text-xs sm:text-sm font-bold rounded-full transition-colors whitespace-nowrap flex items-center gap-1 ${activeSubAccount === 'PORTFOLIO' ? 'bg-indigo-800 text-white shadow-md' : 'bg-slate-50 text-slate-500 hover:bg-slate-100 border border-transparent'}`}
                    >
                      <Icon name="monitoring" className="text-[16px]" /> พอร์ตการลงทุน
                    </button>
                  )}
                </div>
              )}
            </header>

            <main className="flex-1 w-full max-w-3xl mx-auto overflow-y-auto custom-scrollbar">
              <div className="p-2 sm:p-4 md:p-6 pb-6">
                {activeTab === 'dashboard' && activeSubAccount !== 'PORTFOLIO' && <Dashboard balance={balance} totalIncome={totalIncome} totalExpense={totalExpense} totalSaving={totalSaving} expensesByCategory={expensesByCategory} transactions={userTransactions} onEditTransaction={setEditingTransaction} onDeleteTransaction={handleDeleteTransaction} />}
                
                {activeTab === 'dashboard' && activeSubAccount === 'PORTFOLIO' && activeUser === 'M' && (
                  <PortfolioDashboard 
                    trades={trades} 
                    setTrades={setTrades} 
                    marketPrices={marketPrices} 
                    setMarketPrices={setMarketPrices} 
                    portNames={PORT_NAMES} 
                    activeUser={activeUser}
                    mainSubAccount={currentUser.subAccounts[0]}
                    transactions={transactions}
                    setTransactions={setTransactions}
                    usdRate={usdRate}
                    showConfirm={showConfirm}
                    showAlert={showAlert}
                    sendDataToSheet={sendDataToSheet}
                  />
                )}
                
                {activeTab === 'add' && <AddTransactionForm onSave={handleAddTransaction} usdRate={usdRate} showAlert={showAlert} totalSaving={totalSaving} balance={balance} />}
                {activeTab === 'history' && <TransactionHistory transactions={userTransactions} onEdit={setEditingTransaction} onDelete={handleDeleteTransaction} />}
              </div>
            </main>

            {editingTransaction && activeSubAccount !== 'PORTFOLIO' && (
              <AddTransactionForm 
                isModal 
                initialData={editingTransaction}
                usdRate={usdRate}
                showAlert={showAlert}
                totalSaving={totalSaving}
                balance={balance}
                onClose={() => setEditingTransaction(null)}
                onSave={async (updatedData) => {
                  const updatedTrans = { ...editingTransaction, ...updatedData };
                  
                  let newBalance = balance;
                  let newSaving = totalSaving;
                  
                  // Revert old transaction
                  if (editingTransaction.type === 'income') newBalance -= editingTransaction.amount;
                  if (editingTransaction.type === 'expense') newBalance += editingTransaction.amount;
                  if (editingTransaction.type === 'saving') {
                      newBalance += editingTransaction.amount;
                      if(editingTransaction.category !== 'investment') newSaving -= editingTransaction.amount;
                  }
                  if (editingTransaction.type === 'withdraw') {
                      newBalance -= editingTransaction.amount;
                      newSaving += editingTransaction.amount;
                  }
                  
                  // Apply new transaction
                  if (updatedTrans.type === 'income') newBalance += updatedTrans.amount;
                  if (updatedTrans.type === 'expense') newBalance -= updatedTrans.amount;
                  if (updatedTrans.type === 'saving') {
                      newBalance -= updatedTrans.amount;
                      if(updatedTrans.category !== 'investment') newSaving += updatedTrans.amount;
                  }
                  if (updatedTrans.type === 'withdraw') {
                      newBalance += updatedTrans.amount;
                      newSaving -= updatedTrans.amount;
                  }
                  
                  const newTotalMoney = newBalance + newSaving;

                  updatedTrans.balance = newBalance;
                  updatedTrans.totalSaving = newSaving;
                  updatedTrans.totalMoney = newTotalMoney; 

                  setTransactions(prev => prev.map(t => t.id === editingTransaction.id ? updatedTrans : t));
                  setEditingTransaction(null);
                  
                  await sendDataToSheet(updatedTrans, 'edit');
                }}
              />
            )}

            {activeSubAccount !== 'PORTFOLIO' && (
              <nav className="bg-white border-t border-slate-200 flex-shrink-0 w-full z-20 pb-safe">
                <div className="max-w-3xl mx-auto flex justify-around">
                  <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center py-3 px-2 sm:px-6 w-full transition-colors ${activeTab === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}`}>
                    <Icon name="home" className="text-[24px] mb-1" />
                    <span className="text-[10px] sm:text-xs font-bold">หน้าแรก</span>
                  </button>
                  <button onClick={() => setActiveTab('add')} className="flex flex-col items-center justify-center py-2 px-2 sm:px-6 w-full relative">
                    <div className={`absolute -top-5 p-3 rounded-full shadow-lg text-white transition-transform ${activeTab === 'add' ? 'bg-indigo-700 scale-110' : 'bg-indigo-500'}`}>
                      <Icon name="add_circle" className="text-[24px]" />
                    </div>
                    <span className={`text-[10px] sm:text-xs font-bold mt-8 ${activeTab === 'add' ? 'text-indigo-600' : 'text-slate-400'}`}>เพิ่มรายการ</span>
                  </button>
                  <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center py-3 px-2 sm:px-6 w-full transition-colors ${activeTab === 'history' ? 'text-indigo-600' : 'text-slate-400'}`}>
                    <Icon name="format_list_bulleted" className="text-[24px] mb-1" />
                    <span className="text-[10px] sm:text-xs font-bold">ประวัติ</span>
                  </button>
                </div>
              </nav>
            )}

            {/* แสดง Popup รูปภาพเมื่อเข้าสู่พอร์ตการลงทุน */}
            {showPortfolioSplash && activeSubAccount === 'PORTFOLIO' && (
              <PortfolioSplashModal onClose={() => setShowPortfolioSplash(false)} />
            )}
          </div>
        );
      };

      return (
        <>
          {renderContent()}
          <CustomDialog {...dialog} onClose={() => setDialog(prev => ({ ...prev, isOpen: false }))} />
        </>
      );
    }

    // Modal สำหรับแสดงรูปภาพต้อนรับเข้าพอร์ต แบบเน้นความรวดเร็วและแสดงแค่ภาพ
    function PortfolioSplashModal({ onClose }) {
      return (
        <div 
          className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/85 animate-in fade-in duration-150"
          onClick={onClose} // แตะพื้นที่ว่างเพื่อปิดได้เลย
        >
          <div 
            className="relative max-w-md w-full flex flex-col items-center animate-in zoom-in-[0.98] duration-150"
            onClick={(e) => e.stopPropagation()} // ป้องกันการกดโดนรูปแล้วปิด
          >
            <button 
              onClick={onClose} 
              className="absolute -top-12 right-0 bg-white/20 hover:bg-white/30 text-white rounded-full p-2 transition-all z-10"
            >
              <Icon name="close" className="text-[28px]" />
            </button>
            
            <img 
              src="https://i.postimg.cc/W1ZGQnjf/Gemini-Generated-Image-iquzxyiquzxyiquz.png" 
              alt="Welcome to Portfolio" 
              className="w-full h-auto rounded-2xl shadow-2xl object-cover"
            />
          </div>
        </div>
      );
    }

    // --- Components ย่อย ---
    
    function TransactionChart({ transactions }) {
      const chartRef = useRef(null);
      const yAxisRef = useRef(null);
      const chartInstance = useRef(null);
      const yAxisInstance = useRef(null);
      const containerRef = useRef(null);

      // State สำหรับตัวกรองเวลาของกราฟ (รายวัน, รายเดือน, รายปี)
      const [chartFilter, setChartFilter] = useState('daily');
      // State ใหม่: สำหรับตัวกรองประเภทรายการบนกราฟ
      const [chartTypeFilter, setChartTypeFilter] = useState('all');

      const chartData = useMemo(() => {
        const grouped = {};
        transactions.forEach(t => {
          // เอาการข้าม withdraw ออก เพื่อให้นำมาวาดกราฟได้
          const dObj = parseDate(t.date);
          let dateStr = '';
          let sortKey = 0;

          const day = String(dObj.getDate()).padStart(2, '0');
          const month = String(dObj.getMonth() + 1).padStart(2, '0');
          const thaiYearStr = String(dObj.getFullYear() + 543);
          const shortYearStr = thaiYearStr.slice(-2);
          const thaiMonthsShort = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

          // จัดกลุ่มข้อมูลตาม Filter ที่เลือก
          if (chartFilter === 'daily') {
            dateStr = `${day}-${month}-${shortYearStr}`;
            sortKey = new Date(dObj.getFullYear(), dObj.getMonth(), dObj.getDate()).getTime();
          } else if (chartFilter === 'monthly') {
            dateStr = `${thaiMonthsShort[dObj.getMonth()]} ${shortYearStr}`;
            sortKey = new Date(dObj.getFullYear(), dObj.getMonth(), 1).getTime();
          } else if (chartFilter === 'yearly') {
            dateStr = `${thaiYearStr}`;
            sortKey = new Date(dObj.getFullYear(), 0, 1).getTime();
          }

          if (!grouped[sortKey]) {
            // เพิ่ม field withdraw ในกลุ่มข้อมูล
            grouped[sortKey] = { sortKey, date: dateStr, income: 0, expense: 0, saving: 0, investment: 0, withdraw: 0, hasData: false };
          }
          
          if (t.type === 'income') { grouped[sortKey].income += t.amount; grouped[sortKey].hasData = true; }
          else if (t.type === 'expense') { grouped[sortKey].expense += t.amount; grouped[sortKey].hasData = true; }
          else if (t.type === 'saving') {
             if (t.category === 'investment') { grouped[sortKey].investment += t.amount; grouped[sortKey].hasData = true; }
             else { grouped[sortKey].saving += t.amount; grouped[sortKey].hasData = true; }
          }
          else if (t.type === 'withdraw') { grouped[sortKey].withdraw += t.amount; grouped[sortKey].hasData = true; }
        });

        return Object.values(grouped).filter(d => d.hasData).sort((a, b) => a.sortKey - b.sortKey);
      }, [transactions, chartFilter]);

      // ฟังก์ชันคำนวณสเกลแกน Y โดยเช็คจากตัวกรองที่เลือก เพื่อให้กราฟซูมพอดีกับข้อมูล
      const calculateYAxis = useCallback((data) => {
        if (!data || data.length === 0) return 100;
        
        let maxValues = [];
        data.forEach(d => {
            if (chartTypeFilter === 'all' || chartTypeFilter === 'income') maxValues.push(d.income);
            if (chartTypeFilter === 'all' || chartTypeFilter === 'expense') maxValues.push(d.expense);
            if (chartTypeFilter === 'all' || chartTypeFilter === 'saving') { maxValues.push(d.saving); maxValues.push(d.investment); }
            if (chartTypeFilter === 'all' || chartTypeFilter === 'withdraw') maxValues.push(d.withdraw);
        });

        const maxVal = Math.max(10, ...maxValues);
        
        const rawStep = maxVal / 4;
        const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
        const normalizedStep = rawStep / magnitude;
        
        const niceSteps = [1, 1.25, 1.5, 2, 2.5, 3, 4, 5, 6, 7.5, 8, 10];
        const niceStep = niceSteps.find(step => step >= normalizedStep) || 10;

        return niceStep * magnitude * 4;
      }, [chartTypeFilter]);

      const handleScroll = useCallback(() => {
        if (!containerRef.current || !chartInstance.current || !yAxisInstance.current || chartData.length === 0) return;

        const { scrollLeft, clientWidth, scrollWidth } = containerRef.current;
        const barWidth = scrollWidth / chartData.length;

        let startIndex = Math.floor(scrollLeft / barWidth);
        let endIndex = Math.ceil((scrollLeft + clientWidth) / barWidth);

        startIndex = Math.max(0, startIndex);
        endIndex = Math.min(chartData.length, endIndex);

        const visibleData = chartData.slice(startIndex, endIndex);

        if (visibleData.length === 0) return;

        const yAxisMax = calculateYAxis(visibleData);

        if (yAxisInstance.current.options.scales.y.max !== yAxisMax) {
          yAxisInstance.current.options.scales.y.max = yAxisMax;
          chartInstance.current.options.scales.y.max = yAxisMax;
          yAxisInstance.current.update(); 
          chartInstance.current.update();
        }
      }, [chartData, calculateYAxis]);

      useEffect(() => {
        if (!chartRef.current || !yAxisRef.current || chartData.length === 0) return;

        const initialVisible = chartData.slice(-5);
        const initialYAxisMax = calculateYAxis(initialVisible);

        if (chartInstance.current) chartInstance.current.destroy();
        if (yAxisInstance.current) yAxisInstance.current.destroy();

        const sysFontFamily = 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif';

        const commonOptions = {
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            duration: 500, 
            easing: 'easeOutQuart' 
          }, 
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          clip: false 
        };

        // 1. กราฟแกน Y (Sticky Left)
        yAxisInstance.current = new window.Chart(yAxisRef.current.getContext('2d'), {
          type: 'bar',
          data: { labels: ['00-00-00'], datasets: [{ data: [0] }] },
          options: {
            ...commonOptions,
            layout: { padding: { top: 20, bottom: 5, right: 0, left: 0 } }, 
            scales: {
              x: { 
                 border: { display: false }, 
                 grid: { display: false, drawBorder: false },
                 ticks: { 
                    display: true, color: 'transparent', font: { size: 10, family: sysFontFamily, weight: 'normal' }, 
                    padding: 8, maxRotation: 0, minRotation: 0 
                 } 
              },
              y: { 
                type: 'linear', position: 'right', 
                min: 0, max: initialYAxisMax,
                border: { display: false }, grid: { display: false },
                ticks: {
                  mirror: true, padding: 4, 
                  callback: function(value) { 
                    if (value === 0) return '0';
                    if (value >= 1000000) return (value / 1000000).toFixed(1).replace('.0', '') + 'M';
                    if (value >= 100000) return (value / 1000).toFixed(0) + 'k';
                    return new Intl.NumberFormat('th-TH').format(value); 
                  },
                  font: { size: 9, family: sysFontFamily, weight: 'bold' }, color: '#64748b', count: 5 
                }
              }
            }
          },
          plugins: [{
            id: 'drawPerfectCorner',
            afterDraw: (chart) => {
              const ctx = chart.ctx;
              const yAxis = chart.scales.y;
              if (!yAxis) return;
              const zeroY = Math.round(yAxis.getPixelForValue(0));
              const width = chart.width;
              ctx.save();
              ctx.beginPath();
              ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2; 
              ctx.moveTo(width - 1, chart.chartArea.top);
              ctx.lineTo(width - 1, zeroY + 8); 
              ctx.moveTo(width - 2, zeroY);
              ctx.lineTo(width + 10, zeroY); 
              ctx.stroke();
              ctx.restore();
            }
          }]
        });

        // กำหนดชุดข้อมูล (Datasets) ตามตัวกรองที่เลือก
        const activeDatasets = [];
        const baseDatasetOptions = { borderRadius: 4, barPercentage: 0.9, categoryPercentage: 0.9, minBarLength: 5 };

        if (chartTypeFilter === 'all' || chartTypeFilter === 'income') {
            activeDatasets.push({ label: 'รายรับ', data: chartData.map(d => d.income === 0 ? null : d.income), backgroundColor: '#10b981', ...baseDatasetOptions });
        }
        if (chartTypeFilter === 'all' || chartTypeFilter === 'expense') {
            activeDatasets.push({ label: 'รายจ่าย', data: chartData.map(d => d.expense === 0 ? null : d.expense), backgroundColor: '#ef4444', ...baseDatasetOptions });
        }
        if (chartTypeFilter === 'all' || chartTypeFilter === 'saving') {
            activeDatasets.push({ label: 'เงินเก็บ', data: chartData.map(d => d.saving === 0 ? null : d.saving), backgroundColor: '#3b82f6', ...baseDatasetOptions });
            activeDatasets.push({ label: 'ลงทุน', data: chartData.map(d => d.investment === 0 ? null : d.investment), backgroundColor: '#6366f1', ...baseDatasetOptions });
        }
        if (chartTypeFilter === 'all' || chartTypeFilter === 'withdraw') {
            activeDatasets.push({ label: 'ถอนเงิน', data: chartData.map(d => d.withdraw === 0 ? null : d.withdraw), backgroundColor: '#8b5cf6', ...baseDatasetOptions });
        }

        // 2. กราฟข้อมูลหลัก
        chartInstance.current = new window.Chart(chartRef.current.getContext('2d'), {
          type: 'bar',
          data: {
            labels: chartData.map(d => d.date),
            datasets: activeDatasets
          },
          options: {
            ...commonOptions,
            layout: { padding: { top: 20, bottom: 5, left: 0, right: 15 } }, 
            plugins: {
              legend: { display: false },
              tooltip: {
                enabled: true,
                callbacks: {
                  title: () => null, 
                  label: function(context) {
                    let label = context.dataset.label || '';
                    if (label) label += ': ';
                    if (context.parsed.y !== null) {
                      label += new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(context.parsed.y);
                    }
                    return label;
                  }
                }
              }
            },
            interaction: { mode: 'nearest', intersect: true }, 
            scales: {
              x: {
                border: { display: true, color: '#94a3b8', width: 2, z: 10 }, 
                grid: { display: true, drawOnChartArea: true, drawBorder: false, color: '#f1f5f9', borderDash: [4, 4], drawTicks: false }, 
                ticks: { font: { size: 10, family: sysFontFamily, weight: 'normal' }, color: '#64748b', padding: 8, maxRotation: 0, minRotation: 0, autoSkip: true } 
              },
              y: { 
                position: 'right', 
                min: 0, max: initialYAxisMax,
                display: true, border: { display: false }, 
                grid: { display: true, drawBorder: false, color: '#e2e8f0', borderDash: [4, 4], drawTicks: false }, 
                ticks: { display: false, count: 5 } 
              }
            }
          }
        });

        setTimeout(() => {
          if (containerRef.current) {
            containerRef.current.scrollLeft = containerRef.current.scrollWidth;
            handleScroll();
          }
        }, 100);

        return () => {
          if (chartInstance.current) chartInstance.current.destroy();
          if (yAxisInstance.current) yAxisInstance.current.destroy();
        };
      }, [chartData, handleScroll, calculateYAxis, chartTypeFilter]);

      if (chartData.length === 0) return null;

      const visibleBars = chartFilter === 'daily' ? 5 : chartFilter === 'monthly' ? 6 : 4;
      const calculatedWidth = chartData.length > visibleBars ? `${(chartData.length / visibleBars) * 100}%` : '100%';

      return (
        <div className="bg-white rounded-2xl p-4 sm:p-5 shadow-sm border border-gray-100 flex flex-col relative overflow-hidden animate-in fade-in">
          
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-3">
            <div className="flex items-center gap-2">
               <h3 className="text-lg font-bold text-gray-800 flex-shrink-0">สถิติรายการ</h3>
            </div>
            
            <div className="flex bg-gray-100 p-1 rounded-lg self-end sm:self-auto w-full sm:w-auto">
              <button onClick={() => setChartFilter('daily')} className={`flex-1 sm:flex-none px-3 py-1.5 text-[11px] sm:text-xs font-medium rounded-md transition-colors ${chartFilter === 'daily' ? 'bg-white shadow-sm text-indigo-600 font-bold' : 'text-gray-500 hover:text-gray-700'}`}>รายวัน</button>
              <button onClick={() => setChartFilter('monthly')} className={`flex-1 sm:flex-none px-3 py-1.5 text-[11px] sm:text-xs font-medium rounded-md transition-colors ${chartFilter === 'monthly' ? 'bg-white shadow-sm text-indigo-600 font-bold' : 'text-gray-500 hover:text-gray-700'}`}>รายเดือน</button>
              <button onClick={() => setChartFilter('yearly')} className={`flex-1 sm:flex-none px-3 py-1.5 text-[11px] sm:text-xs font-medium rounded-md transition-colors ${chartFilter === 'yearly' ? 'bg-white shadow-sm text-indigo-600 font-bold' : 'text-gray-500 hover:text-gray-700'}`}>รายปี</button>
            </div>
          </div>

          {/* แถบปุ่มตัวกรองประเภทรายการสำหรับกราฟ */}
          <div className="flex gap-2 mb-4 overflow-x-auto custom-scrollbar pb-2 pt-1 px-1 -mx-1">
            <button onClick={() => setChartTypeFilter('all')} className={`px-4 py-1.5 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex-shrink-0 ${chartTypeFilter === 'all' ? 'bg-gray-800 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>ทั้งหมด</button>
            <button onClick={() => setChartTypeFilter('income')} className={`px-4 py-1.5 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${chartTypeFilter === 'income' ? 'bg-green-500 text-white shadow-md shadow-green-500/30' : 'bg-green-50 text-green-700 hover:bg-green-100 border border-green-100'}`}><Icon name="arrow_circle_down" className="text-[14px]" /> รายรับ</button>
            <button onClick={() => setChartTypeFilter('expense')} className={`px-4 py-1.5 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${chartTypeFilter === 'expense' ? 'bg-red-500 text-white shadow-md shadow-red-500/30' : 'bg-red-50 text-red-700 hover:bg-red-100 border border-red-100'}`}><Icon name="arrow_circle_up" className="text-[14px]" /> รายจ่าย</button>
            <button onClick={() => setChartTypeFilter('saving')} className={`px-4 py-1.5 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${chartTypeFilter === 'saving' ? 'bg-blue-500 text-white shadow-md shadow-blue-500/30' : 'bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-100'}`}><Icon name="savings" className="text-[14px]" /> เงินเก็บ</button>
            <button onClick={() => setChartTypeFilter('withdraw')} className={`px-4 py-1.5 text-[11px] sm:text-xs font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 ${chartTypeFilter === 'withdraw' ? 'bg-purple-500 text-white shadow-md shadow-purple-500/30' : 'bg-purple-50 text-purple-700 hover:bg-purple-100 border border-purple-100'}`}><Icon name="price_change" className="text-[14px]" /> ถอนเงิน</button>
          </div>
          
          <div className="flex items-start w-full relative">
            <div className="w-[38px] sm:w-[48px] flex-shrink-0 z-20 relative">
              <div style={{ height: '220px' }}>
                <canvas ref={yAxisRef}></canvas>
              </div>
            </div>
            
            <div className="flex-1 overflow-x-auto chart-scrollbar pb-2 relative z-10 -ml-[2px]" ref={containerRef} onScroll={handleScroll}>
              <div style={{ width: calculatedWidth, minWidth: '100%', height: '220px' }}>
                <canvas ref={chartRef}></canvas>
              </div>
            </div>
          </div>

          <div className="flex justify-center flex-wrap gap-3 sm:gap-5 mt-3 mb-1 pt-3 border-t border-slate-50">
            {(chartTypeFilter === 'all' || chartTypeFilter === 'income') && <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-[#10b981]"></div><span className="text-xs font-medium text-slate-600">รายรับ</span></div>}
            {(chartTypeFilter === 'all' || chartTypeFilter === 'expense') && <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-[#ef4444]"></div><span className="text-xs font-medium text-slate-600">รายจ่าย</span></div>}
            {(chartTypeFilter === 'all' || chartTypeFilter === 'saving') && (
               <>
                 <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-[#3b82f6]"></div><span className="text-xs font-medium text-slate-600">เงินเก็บ</span></div>
                 <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-[#6366f1]"></div><span className="text-xs font-medium text-slate-600">ลงทุน</span></div>
               </>
            )}
            {(chartTypeFilter === 'all' || chartTypeFilter === 'withdraw') && <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-[#8b5cf6]"></div><span className="text-xs font-medium text-slate-600">ถอนเงิน</span></div>}
          </div>
        </div>
      );
    }

    // ==========================================
    // PORTFOLIO MODULE
    // ==========================================
    
    function PortfolioDashboard({ trades, setTrades, marketPrices, setMarketPrices, portNames, activeUser, mainSubAccount, transactions, setTransactions, usdRate, showConfirm, showAlert, sendDataToSheet }) {
      const [activePort, setActivePort] = useState('all');
      const [viewTab, setViewTab] = useState('assets');
      const [showTradeModal, setShowTradeModal] = useState(false);
      const [editingTrade, setEditingTrade] = useState(null);

      const [timeFilter, setTimeFilter] = useState('all'); 
      const [typeFilter, setTypeFilter] = useState('ALL'); 
      const [sortConfig, setSortConfig] = useState({ key: 'symbol', direction: 'asc' });
      const [searchQuery, setSearchQuery] = useState(''); 
      const [historySortConfig, setHistorySortConfig] = useState({ key: 'date', direction: 'desc' }); 

      const ledger = useMemo(() => {
        let holdings = {}; 
        let realized = []; 
        let enrichedTrades = []; 
        let cash = {};
        let lastTradedPrice = {}; 

        const sortedTrades = [...trades].sort((a,b) => {
          const dateDiff = parseDate(a.date) - parseDate(b.date);
          if (dateDiff !== 0) return dateDiff;
          return String(a.id).localeCompare(String(b.id));
        });

        sortedTrades.forEach(t => {
          if (!holdings[t.portId]) holdings[t.portId] = {};
          if (!cash[t.portId]) cash[t.portId] = 0;

          let h = holdings[t.portId][t.symbol] || { units: 0, avgCost: 0, sheetPrice: 0, totalAmount: 0 };
          let enrichedTrade = { ...t }; 

          if (t.price_now && t.price_now > 0) {
             h.sheetPrice = Number(t.price_now);
          }

          if (t.type === 'BUY') {
            const baseCost = t.amount > 0 ? t.amount : (t.units * t.price);
            const prevBaseCost = h.units * h.avgCost; 
            h.units += t.units;
            h.avgCost = (prevBaseCost + baseCost) / h.units; 
            
            cash[t.portId] -= baseCost; 
            holdings[t.portId][t.symbol] = h;
            lastTradedPrice[t.symbol] = t.price;
          } else if (t.type === 'SELL') {
            const netRevenue = t.amount > 0 ? t.amount : (t.units * t.price); 
            const costOfSold = t.units * h.avgCost; 
            const profit = netRevenue - costOfSold; 
            
            enrichedTrade.profit = profit;
            enrichedTrade.avgCostAtSell = h.avgCost;
            
            realized.push(enrichedTrade);
            h.units -= t.units;
            if (h.units <= 0) { h.units = 0; h.avgCost = 0; }
            cash[t.portId] += netRevenue;
            holdings[t.portId][t.symbol] = h;
            lastTradedPrice[t.symbol] = t.price;
          } else if (t.type === 'DIVIDEND') {
            const dividendValue = t.amount > 0 ? t.amount : ((t.units || h.units) * t.price);
            enrichedTrade.profit = dividendValue;
            enrichedTrade.units = t.units || h.units; 
            realized.push(enrichedTrade);
            cash[t.portId] += dividendValue;
          } else if (t.type === 'DEPOSIT') {
            cash[t.portId] += t.price;
          } else if (t.type === 'WITHDRAW') {
            cash[t.portId] -= t.price;
          }
          enrichedTrades.push(enrichedTrade);
        });

        return { holdings, realized, enrichedTrades, cash, lastTradedPrice };
      }, [trades]);

      const profitStats = useMemo(() => {
        const todayStr = getLocalISODate();
        const today = new Date();
        const currentMonth = today.getMonth();
        const currentYear = today.getFullYear();

        let todayP = 0, monthP = 0, yearP = 0, dividendYear = 0;

        ledger.realized.forEach(r => {
          if (activePort !== 'all' && r.portId !== activePort) return;
          const d = parseDate(r.date);
          const isCurrentYear = d.getFullYear() === currentYear;

          let profit = r.profit;
          if (activePort === 'all' && r.portId === 'lib_us') {
            profit = profit * usdRate;
          }

          if (r.type === 'SELL') {
            const isToday = d.getDate() === today.getDate() && d.getMonth() === currentMonth && isCurrentYear;
            if (isToday) todayP += profit;
            if (d.getMonth() === currentMonth && isCurrentYear) monthP += profit;
            if (isCurrentYear) yearP += profit;
          } else if (r.type === 'DIVIDEND') {
            if (isCurrentYear) dividendYear += profit;
          }
        });

        return { today: todayP, month: monthP, year: yearP, dividendYear };
      }, [ledger.realized, activePort, usdRate]);

      const portSummary = useMemo(() => {
        let totalValueTHB = 0;
        let totalCostTHB = 0;
        let totalValueUSD = 0; 
        let totalCashTHB = 0;
        let assetsList = [];

        Object.keys(ledger.holdings).forEach(portId => {
          if (activePort !== 'all' && portId !== activePort) return;
          
          Object.keys(ledger.holdings[portId]).forEach(symbol => {
            const h = ledger.holdings[portId][symbol];
            if (h.units > 0) {
              let currentPrice = h.sheetPrice > 0 ? h.sheetPrice : (marketPrices[symbol] || ledger.lastTradedPrice[symbol] || h.avgCost);

              const value = h.units * currentPrice;
              const cost = h.units * h.avgCost; 
              
              if (portId === 'lib_us') {
                totalValueUSD += value;
                totalValueTHB += value * usdRate;
                totalCostTHB += cost * usdRate;
              } else {
                totalValueTHB += value;
                totalCostTHB += cost;
              }

              assetsList.push({ portId, symbol, units: h.units, avgCost: h.avgCost, currentPrice, value, cost, isCash: false });
            }
          });
        });

        // คำนวณกำไร/ขาดทุน (Unrealized Profit) เฉพาะส่วนของสินทรัพย์ (หุ้น) เท่านั้น
        const unrealizedProfitTHB = totalValueTHB - totalCostTHB;

        // นำเงินสดมารวมในมูลค่าพอร์ต
        Object.keys(ledger.cash).forEach(portId => {
          if (activePort !== 'all' && portId !== activePort) return;
          const portCash = ledger.cash[portId];
          if (portCash !== 0) {
            if (portId === 'lib_us') {
              totalCashTHB += portCash * usdRate;
              totalValueUSD += portCash; // นำเงินสด USD มาบวกเข้ากับมูลค่าพอร์ต USD รวม
            } else {
              totalCashTHB += portCash;
            }
          }
        });

        // นำเงินสด (THB) มาบวกเข้ากับมูลค่าพอร์ต THB รวม
        totalValueTHB += totalCashTHB;

        return { totalValue: totalValueTHB, totalCost: totalCostTHB, unrealizedProfit: unrealizedProfitTHB, totalValueUSD, totalCash: totalCashTHB, assetsList };
      }, [ledger.holdings, ledger.cash, marketPrices, activePort, usdRate]);

      const sortedAssets = useMemo(() => {
        let sortableItems = [...portSummary.assetsList];
        if (sortConfig !== null) {
          sortableItems.sort((a, b) => {
            let aValue = a[sortConfig.key];
            let bValue = b[sortConfig.key];

            if (sortConfig.key === 'pl') {
              const aPL = a.value - a.cost;
              const bPL = b.value - b.cost;
              aValue = a.portId === 'lib_us' ? aPL * usdRate : aPL;
              bValue = b.portId === 'lib_us' ? bPL * usdRate : bPL;
            } else if (sortConfig.key === 'symbol') {
              return sortConfig.direction === 'asc' 
                ? a.symbol.localeCompare(b.symbol)
                : b.symbol.localeCompare(a.symbol);
            } else if (sortConfig.key === 'avgCost' || sortConfig.key === 'currentPrice') {
              aValue = a.portId === 'lib_us' ? a[sortConfig.key] * usdRate : a[sortConfig.key];
              bValue = b.portId === 'lib_us' ? b[sortConfig.key] * usdRate : b[sortConfig.key];
            }

            if (aValue < bValue) {
              return sortConfig.direction === 'asc' ? -1 : 1;
            }
            if (aValue > bValue) {
              return sortConfig.direction === 'asc' ? 1 : -1;
            }
            return 0;
          });
        }
        return sortableItems;
      }, [portSummary.assetsList, sortConfig, usdRate]);

      const filteredAssets = useMemo(() => {
        return sortedAssets.filter(a => a.symbol.toLowerCase().includes(searchQuery.toLowerCase()));
      }, [sortedAssets, searchQuery]);

      const requestSort = (key) => {
        let direction = 'asc';
        if (sortConfig && sortConfig.key === key && sortConfig.direction === 'asc') {
          direction = 'desc';
        }
        setSortConfig({ key, direction });
      };

      const requestHistorySort = (key) => {
        let direction = 'asc';
        if (historySortConfig && historySortConfig.key === key && historySortConfig.direction === 'asc') {
          direction = 'desc';
        }
        setHistorySortConfig({ key, direction });
      };

      const getSortIcon = (key) => {
        if (!sortConfig || sortConfig.key !== key) {
          return <Icon name="unfold_more" className="text-[10px] sm:text-[14px] text-slate-300 ml-0.5 sm:ml-1" />;
        }
        return sortConfig.direction === 'asc' 
          ? <Icon name="keyboard_arrow_up" className="text-[10px] sm:text-[14px] text-indigo-600 ml-0.5 sm:ml-1" />
          : <Icon name="keyboard_arrow_down" className="text-[10px] sm:text-[14px] text-indigo-600 ml-0.5 sm:ml-1" />;
      };

      const getHistorySortIcon = (key) => {
        if (!historySortConfig || historySortConfig.key !== key) {
          return <Icon name="unfold_more" className="text-[10px] sm:text-[14px] text-slate-300 ml-0.5 sm:ml-1" />;
        }
        return historySortConfig.direction === 'asc' 
          ? <Icon name="keyboard_arrow_up" className="text-[10px] sm:text-[14px] text-indigo-600 ml-0.5 sm:ml-1" />
          : <Icon name="keyboard_arrow_down" className="text-[10px] sm:text-[14px] text-indigo-600 ml-0.5 sm:ml-1" />;
      };

      const filteredHistory = useMemo(() => {
        let items = ledger.enrichedTrades.filter(t => {
          if (activePort !== 'all' && t.portId !== activePort) return false;
          
          if (typeFilter === 'BS' && (t.type !== 'BUY' && t.type !== 'SELL')) return false;
          if (typeFilter === 'DIVIDEND' && t.type !== 'DIVIDEND') return false;
          if (typeFilter === 'TRANSFER' && t.type !== 'DEPOSIT' && t.type !== 'WITHDRAW') return false;
          
          if (timeFilter !== 'all') {
            const d = parseDate(t.date);
            const today = new Date();
            if (timeFilter === 'daily') return d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
            if (timeFilter === 'monthly') return d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
            if (timeFilter === 'yearly') return d.getFullYear() === today.getFullYear();
          }
          
          if (searchQuery && t.symbol && t.symbol.toLowerCase().indexOf(searchQuery.toLowerCase()) === -1) {
            if (t.symbol !== 'รายการฝากเงิน' && t.symbol !== 'รายการถอนเงิน') {
               return false;
            }
          }
          
          return true;
        });

        if (historySortConfig !== null) {
          items.sort((a, b) => {
            if (historySortConfig.key === 'symbol') {
              const symDiff = historySortConfig.direction === 'asc' 
                ? a.symbol.localeCompare(b.symbol)
                : b.symbol.localeCompare(a.symbol);
              if (symDiff !== 0) return symDiff;
              return String(b.id).localeCompare(String(a.id));
            } else if (historySortConfig.key === 'date') {
               const dateDiff = historySortConfig.direction === 'asc' 
                 ? parseDate(a.date) - parseDate(b.date)
                 : parseDate(b.date) - parseDate(a.date);
               if (dateDiff !== 0) return dateDiff;
               return historySortConfig.direction === 'asc'
                 ? String(a.id).localeCompare(String(b.id))
                 : String(b.id).localeCompare(String(a.id));
            } else if (historySortConfig.key === 'units') {
               const aVal = a.units || 0;
               const bVal = b.units || 0;
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            } else if (historySortConfig.key === 'price') {
               const aVal = a.portId === 'lib_us' ? a.price * usdRate : a.price;
               const bVal = b.portId === 'lib_us' ? b.price * usdRate : b.price;
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            } else if (historySortConfig.key === 'value') {
               const getVal = (t) => {
                 if (t.type === 'DIVIDEND') return t.profit || 0;
                 if (t.type === 'DEPOSIT' || t.type === 'WITHDRAW') return t.price || 0;
                 return (t.price || 0) * (t.units || 0);
               };
               const aVal = a.portId === 'lib_us' ? getVal(a) * usdRate : getVal(a);
               const bVal = b.portId === 'lib_us' ? getVal(b) * usdRate : getVal(b);
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            } else if (historySortConfig.key === 'pl') {
               const aVal = a.profit !== undefined ? (a.portId === 'lib_us' ? a.profit * usdRate : a.profit) : -Infinity;
               const bVal = b.profit !== undefined ? (b.portId === 'lib_us' ? b.profit * usdRate : b.profit) : -Infinity;
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            }
            return 0;
          });
        }
        return items;
      }, [ledger.enrichedTrades, activePort, timeFilter, typeFilter, searchQuery, historySortConfig]);

      const historySummaryData = useMemo(() => {
        if (typeFilter !== 'ALL') return [];
        const grouped = {};

        filteredHistory.forEach(t => {
          const d = parseDate(t.date);
          let key = '';
          let label = '';
          const thaiMonthsFull = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
          const thaiYear = d.getFullYear() + 543;

          if (timeFilter === 'daily') {
            key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            label = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${thaiYear}`;
          } else if (timeFilter === 'monthly') {
            key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            label = `${thaiMonthsFull[d.getMonth()]} ${thaiYear}`;
          } else if (timeFilter === 'yearly') {
            key = `${d.getFullYear()}`;
            label = `ปี ${thaiYear}`;
          } else {
            key = 'all';
            label = 'รวมทุกช่วงเวลา';
          }

          if (!grouped[key]) {
            grouped[key] = { key, label, profit: 0, dividend: 0 };
          }

          let profit = t.profit || 0;
          if (activePort === 'all' && t.portId === 'lib_us') {
             profit = profit * usdRate;
          }

          if (t.type === 'SELL' && t.profit !== undefined) {
            grouped[key].profit += profit;
          } else if (t.type === 'DIVIDEND' && t.profit !== undefined) {
            grouped[key].dividend += profit;
          }
        });

        return Object.values(grouped).sort((a, b) => {
           if (a.key === 'all') return 0;
           return b.key.localeCompare(a.key); 
        });
      }, [filteredHistory, activePort, timeFilter, typeFilter, usdRate]);

      const getProfitColor = (profit) => profit > 0 ? 'text-emerald-500' : profit < 0 ? 'text-rose-500' : 'text-slate-400';

      const handleDeleteTrade = (tradeId) => {
        showConfirm('คุณแน่ใจหรือไม่ว่าต้องการลบรายการนี้?', async () => {
          setTrades(prev => prev.filter(t => t.id !== tradeId));
          await sendDataToSheet({ id: tradeId, sheetType: 'invest' }, 'delete');
        });
      };

      const handleSaveTrade = async (newTrade) => {
        const tradeId = editingTrade ? editingTrade.id : generateSequentialId(newTrade.date, trades);
        
        let remaining_units = 0;
        let realized_pl = 0;
        let status = "-";
        
        const currentAsset = ledger.holdings[newTrade.portId]?.[newTrade.symbol] || { units: 0, avgCost: 0 };
        let currentUnits = currentAsset.units;
        let avgCost = currentAsset.avgCost;

        if (editingTrade) {
            if (editingTrade.type === 'BUY') currentUnits -= editingTrade.units;
            if (editingTrade.type === 'SELL') currentUnits += editingTrade.units;
        }

        if (newTrade.type === 'BUY') {
            remaining_units = currentUnits + newTrade.units;
            status = "ยังคงเหลือ";
        } else if (newTrade.type === 'SELL') {
            remaining_units = currentUnits - newTrade.units;
            realized_pl = newTrade.units * (newTrade.price - avgCost);
            status = remaining_units > 0 ? "ยังคงเหลือ" : "ขายหมดแล้ว";
        } else if (newTrade.type === 'DIVIDEND') {
            remaining_units = currentUnits;
            realized_pl = (newTrade.units || currentUnits) * newTrade.price;
            status = remaining_units > 0 ? "ยังคงเหลือ" : "ขายหมดแล้ว";
        }

        const currentPriceNow = marketPrices[newTrade.symbol] || "";
        const nowStr = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

        const payload = { 
            ...newTrade, 
            id: tradeId, 
            userId: activeUser, 
            sheetType: 'invest',
            currentPrice: currentPriceNow,    
            realized_pl: realized_pl,         
            status: status,
            recordTime: editingTrade ? editingTrade.recordTime : nowStr
        };
        
        let actionToPerform = 'add';

        if (editingTrade) {
          actionToPerform = 'edit';
          setTrades(prev => prev.map(t => t.id === editingTrade.id ? { ...payload, id: t.id, userId: t.userId } : t));
        } else {
          setTrades(prev => [payload, ...prev]);
        }

        if (newTrade.type === 'BUY' || newTrade.type === 'SELL') {
          setMarketPrices(prev => ({ ...prev, [newTrade.symbol]: newTrade.price }));
        }

        await sendDataToSheet(payload, actionToPerform);
        
        if (newTrade.type === 'WITHDRAW' && !editingTrade) {
          const amountTHB = newTrade.portId === 'lib_us' ? newTrade.price * usdRate : newTrade.price;
          
          const transactionId = generateSequentialId(newTrade.date, transactions);
          const nowStr = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
          const newTransaction = {
            id: transactionId,
            userId: activeUser,
            subAccountId: mainSubAccount,
            type: 'income',
            amount: amountTHB,
            category: 'port_withdraw',
            date: newTrade.date,
            note: `ถอนเงินจาก ${portNames[newTrade.portId]}`,
            recordTime: payload.recordTime
          };
          setTransactions(prev => [newTransaction, ...prev]);
          await sendDataToSheet(newTransaction, 'add');
        }
        
        setShowTradeModal(false);
        setEditingTrade(null);
      };

      return (

                className="w-full sm:w-64 appearance-none bg-white border-2 border-slate-200 text-slate-800 font-bold rounded-xl py-2.5 pl-4 pr-10 outline-none focus:border-indigo-500 cursor-pointer shadow-sm"
              >
                <option value="all">ภาพรวมทุกพอร์ต (All)</option>
                <option value="lib">พอร์ต {portNames['lib']}</option>
                <option value="lib_us">พอร์ต {portNames['lib_us']}</option>
                <option value="finan">พอร์ต {portNames['finan']}</option>
              </select>
              <Icon name="expand_more" className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
            </div>
          </div>

          <div className="bg-slate-900 rounded-[2rem] p-5 sm:p-8 text-white shadow-xl relative overflow-hidden flex flex-col">
            <div className="absolute -right-10 -bottom-10 opacity-10 blur-sm pointer-events-none">
              <Icon name="monitoring" className="text-[200px]" />
            </div>
            
            <div className="relative z-10 flex-1">
              <div className="flex justify-between items-end mb-1">
                <p className="text-slate-400 text-xs sm:text-sm font-bold uppercase tracking-wider">มูลค่าพอร์ตปัจจุบัน</p>
                <p className="text-slate-400 text-xs sm:text-sm font-bold uppercase tracking-wider">เงินสด</p>
              </div>
              
              <div className="flex justify-between items-start mb-4 sm:mb-6">
                <div>
                  <h2 className="text-3xl sm:text-5xl font-black tracking-tight">
                    {formatCurrency(portSummary.totalValue)}
                  </h2>
                  {activePort === 'lib_us' && (
                    <p className="text-blue-300 font-bold text-sm sm:text-xl mt-1 tracking-wide">
                      ({formatUSD(portSummary.totalValueUSD)})
                    </p>
                  )}
                </div>
                
                <div className="text-right">
                  <h2 className="text-xl sm:text-3xl font-bold tracking-tight text-teal-400">
                    {formatCurrency(portSummary.totalCash)}
                  </h2>
                  {activePort === 'lib_us' && (
                    <div className="flex items-center justify-end gap-1.5 sm:gap-2 mt-1.5 sm:mt-3">
                      <span className="text-[9px] sm:text-xs text-indigo-300 font-medium">เรทแลกเปลี่ยน</span>
                      <span className="font-bold text-white text-[10px] sm:text-sm bg-slate-800/60 px-2 py-0.5 sm:px-2.5 sm:py-1 rounded-lg shadow-inner border border-white/10">
                        {usdRate.toFixed(2)} ฿/$
                      </span>
                    </div>
