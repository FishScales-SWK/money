    }
    .chart-scrollbar::-webkit-scrollbar-thumb {

    .chart-scrollbar::-webkit-scrollbar-thumb:hover {

    @keyframes float {

    .material-symbols-outlined {

      height: 40px;

<body class="bg-slate-50 text-slate-800 antialiased font-sans">

  <script type="text/babel">

    // --- การตั้งค่า Google Sheets API ---
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCeMEMzzPZHNNn6Wjj20HgxIYUpzZo9dyw24kkguvKsZ_1Gnuf-qYrarn15uhpMKVM/exec';

    const Icon = ({ name, className }) => {
      return <span className={`material-symbols-outlined ${className || ''}`}>{name}</span>;
    };

    // --- Custom Calendar Picker (พ.ศ. แท้ 100%) ---
    const CustomBeDatePicker = ({ value, onChange, className }) => {
      const [isOpen, setIsOpen] = useState(false);
      const popupRef = useRef(null);

      const parsedDate = value ? new Date(value) : new Date();
      const [viewDate, setViewDate] = useState(parsedDate);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (popupRef.current && !popupRef.current.contains(e.target)) {
            setIsOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleDayClick = (day) => {
        const newDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), day);
        const tzoffset = newDate.getTimezoneOffset() * 60000;
        const iso = new Date(newDate.getTime() - tzoffset).toISOString().split('T')[0];
        onChange(iso);
        setIsOpen(false);
      };

      const displayValue = useMemo(() => {
        if (!value) return '';
        const parts = value.split('-');
        if (parts.length !== 3) return value;
        return `${parts[2]}/${parts[1]}/${parseInt(parts[0], 10) + 543}`;
      }, [value]);

      const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
      const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);

      const monthsTh = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
      const years = Array.from({length: 41}, (_, i) => new Date().getFullYear() - 20 + i);

      return (
        <div className="relative w-full" ref={popupRef}>
          <div 
            onClick={() => setIsOpen(!isOpen)}
            className={`w-full p-3 flex justify-between items-center cursor-pointer ${className || 'bg-white border border-slate-200 rounded-xl font-bold text-slate-800'}`}
          >
            <span>{displayValue}</span>
            <Icon name="calendar_today" className="text-slate-500 text-[20px]" />
          </div>
          
          {isOpen && (
            <div className="absolute z-50 bottom-full left-0 mb-2 p-4 bg-white rounded-2xl shadow-2xl border border-slate-200 w-72 animate-in fade-in zoom-in-95 origin-bottom">
              <div className="flex justify-between items-center mb-4 gap-2">
                <button type="button" onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1))} className="p-1 hover:bg-slate-100 rounded-lg text-slate-600"><Icon name="chevron_left" /></button>
                <div className="flex gap-1 flex-1 justify-center">
                  <select 
                    value={viewDate.getMonth()} 
                    onChange={e => setViewDate(new Date(viewDate.getFullYear(), parseInt(e.target.value), 1))}
                    className="p-1.5 text-xs font-bold bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-indigo-500 cursor-pointer"
                  >
                    {monthsTh.map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                  <select 
                    value={viewDate.getFullYear()} 
                    onChange={e => setViewDate(new Date(parseInt(e.target.value), viewDate.getMonth(), 1))}
                    className="p-1.5 text-xs font-bold bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-indigo-500 cursor-pointer"
                  >
                    {years.map(y => <option key={y} value={y}>{y + 543}</option>)}
                  </select>
                </div>
                <button type="button" onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1))} className="p-1 hover:bg-slate-100 rounded-lg text-slate-600"><Icon name="chevron_right" /></button>
              </div>
              <div className="grid grid-cols-7 gap-1 text-center mb-2">
                {['อา','จ','อ','พ','พฤ','ศ','ส'].map(d => <div key={d} className="text-[10px] font-bold text-slate-400">{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {days.map((d, i) => {
                  if (!d) return <div key={i} className="h-8 w-8"></div>;
                  const isSelected = value && parsedDate.getDate() === d && parsedDate.getMonth() === viewDate.getMonth() && parsedDate.getFullYear() === viewDate.getFullYear();
                  const isToday = d === new Date().getDate() && viewDate.getMonth() === new Date().getMonth() && viewDate.getFullYear() === new Date().getFullYear();
                  return (
                    <button 
                      key={i} 
                      type="button"
                      onClick={() => handleDayClick(d)}
                      className={`h-8 w-8 flex items-center justify-center rounded-full text-sm font-semibold transition-colors ${isSelected ? 'bg-indigo-600 text-white shadow-md' : isToday ? 'bg-indigo-50 text-indigo-600 border border-indigo-200' : 'text-slate-700 hover:bg-slate-100'}`}
                    >
                      {d}
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );

    // --- Custom Alert/Confirm Modal ---

    // Date Time Utilities
    const getLocalISODate = () => {
      const tzoffset = (new Date()).getTimezoneOffset() * 60000; 
      return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
    };

    const parseDate = (dateStr) => {
      if (!dateStr) return new Date();
      let cleanStr = typeof dateStr === 'string' ? dateStr.split(' เวลา ')[0].trim() : dateStr;
      if (cleanStr.includes('/')) {
        const [day, month, thaiYear] = cleanStr.split('/');
        return new Date(parseInt(thaiYear, 10) - 543, parseInt(month, 10) - 1, parseInt(day, 10));
      }
      if (cleanStr.includes('-')) {
        const parts = cleanStr.split('T')[0].split('-');
        if (parts.length >= 3) {
          return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
        }
      }
      return new Date(cleanStr);
    };

    const toThaiDateString = (isoDate) => {
      if (!isoDate) return '';
      let cleanStr = typeof isoDate === 'string' ? isoDate.split(' เวลา ')[0].trim() : isoDate;
      if (cleanStr.includes('/')) return cleanStr;
      const [year, month, day] = cleanStr.split('-');
      return `${day.padStart(2, '0')}/${month.padStart(2, '0')}/${parseInt(year, 10) + 543}`;
    };

    const toISODateString = (thaiDate) => {
      if (!thaiDate) return '';
      let cleanStr = typeof thaiDate === 'string' ? thaiDate.split(' เวลา ')[0].trim() : thaiDate;
      if (cleanStr.includes('-')) return cleanStr.split('T')[0]; 
      const [day, month, thaiYear] = cleanStr.split('/');
      return `${parseInt(thaiYear, 10) - 543}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
    };

    const formatDate = (dateString) => {
      if (!dateString) return '';
      let cleanStr = typeof dateString === 'string' ? dateString.split(' เวลา ')[0].trim() : dateString;
      if (cleanStr.includes('/')) return cleanStr; 
      const date = parseDate(cleanStr);
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear() + 543;
      return `${day}/${month}/${year}`;
    };

    const generateSequentialId = (dateString, items) => {
      if (!dateString) return Date.now().toString(); 
      const parsedStr = dateString.includes('/') ? dateString.split(' เวลา ')[0].trim() : toThaiDateString(dateString);
      const [day, month, thaiYear] = parsedStr.split('/');
      const prefix = `${day}-${month}-${thaiYear}-`;

      let maxSeq = 0;
      items.forEach(item => {
        const itemIdStr = String(item.id);
        if (itemIdStr.startsWith(prefix)) {
          const seqStr = itemIdStr.replace(prefix, '');
          const seqNum = parseInt(seqStr, 10);
          if (!isNaN(seqNum) && seqNum > maxSeq) {
            maxSeq = seqNum;
          }
        }
      });

      const nextSeq = String(maxSeq + 1).padStart(3, '0');
      return `${prefix}${nextSeq}`;
    };

      return new Intl.NumberFormat('th-TH', {

        "FMT": "ท่อทองแดง", "HTECH": "เครื่องมือตัดเฉือนโลหะ", "KKC": "ตู้เย็น ตู้แช่", "TCJ": "เครนและรถโฟล์คลิฟท์", "CTW": "สายไฟฟ้า", "STARK": "สายไฟฟ้า", "PSP": "โซลูชันผลิตภัณฑ์หล่อลื่นครบวงจร",
        "KJL": "ตู้ไฟ เดินสายไฟ", "VARO": "อลูมิเนียม", "PIMO": "มอเตอร์", "KUMWEL": "ระบบต่อลงดิน ป้องกันฟ้าผ่า", "SELIC": "กาว", "GTB": "เครื่องกำเนิดไอน้ำ", "CIG": "ระบบทำความเย็น",
        "TMI": "อุปกรณ์ไฟฟ้า หลอดไฟ", "UTP": "กระดาษและวัสดุการพิมพ์", "STP": "กระดาษและวัสดุการพิมพ์"
    };

    const STOCK_SECTOR_ICONS = {
        "อสังหาริมทรัพย์และก่อสร้าง": "location_city", "ธุรกิจการเงิน": "account_balance",
        "เกษตรและอุตสาหกรรมอาหาร": "agriculture", "สินค้าอุปโภคบริโภค": "shopping_bag",
        "บริการ": "work", "เทคโนโลยี": "memory", "ทรัพยากร": "bolt",
        "สินค้าอุตสาหกรรม": "factory", "ตลาด mai": "trending_up"
    };

    const STOCK_COLOR_THEMES = [
        { header: 'bg-indigo-600', border: 'border-indigo-200', body: 'bg-indigo-50/30' },
        { header: 'bg-emerald-600', border: 'border-emerald-200', body: 'bg-emerald-50/30' },
        { header: 'bg-blue-600', border: 'border-blue-200', body: 'bg-blue-50/30' },
        { header: 'bg-orange-500', border: 'border-orange-200', body: 'bg-orange-50/30' },
        { header: 'bg-violet-600', border: 'border-violet-200', body: 'bg-violet-50/30' },
        { header: 'bg-teal-600', border: 'border-teal-200', body: 'bg-teal-50/30' },
        { header: 'bg-rose-500', border: 'border-rose-200', body: 'bg-rose-50/30' },
        { header: 'bg-amber-500', border: 'border-amber-200', body: 'bg-amber-50/30' }
    ];

    const CUSTOM_NICHE_ORDER = [
        "ธนาคารขนาดใหญ่", "ธนาคารขนาดกลาง", "ธนาคารขนาดเล็ก",
        "ประกันชีวิต", "ประกันรถยนต์และประกันภัย", "ประกันชีวิตและวางแผนการเงิน", "ประกันวินาศภัย",
        "หลักทรัพย์", "สินเชื่อรายย่อย", "สินเชื่อจักรยานยนต์", "บริษัทจัดการกองทุน", "เช่ารถยนต์", "สินเชื่อ", "สินเชื่อรถยนต์", "ธุรกิจการลงทุน", "สินเชื่อรถบรรทุก", "สินเชื่อรถแท็กซี่", "สินเชื่อการรับโอนสิทธิเรียกร้อง", "บริหารจัดการสินทรัพย์ด้อยคุณภาพ", "บริหารหนี้", "สินเชื่อภาคธุรกิจ", "สินเชื่อเงินกู้ยืม", "ปรึกษาธุรกิจด้านการเงินและลงทุนสกุลเงินดิจิทัล",
        "รับเหมาก่อสร้างขนาดใหญ่", "รับเหมาก่อสร้างขนาดเล็ก", "รับเหมาก่อสร้าง", "ขายอุปกรณ์/วัสดุก่อสร้าง",
        "งานเสาเข็ม", "ผลิตเสาเข็มคอนกรีต", "งานก่อสร้างโลหะ", "ปูนซีเมนต์ / วัสดุก่อสร้าง", "คอนกรีต",
        "พัฒนาที่อยู่อาศัย", "อสังหาริมทรัพย์เชิงพาณิชย์", "นิคมอุตสาหกรรม",
        "โรงพยาบาลขนาดใหญ่", "โรงพยาบาลขนาดกลาง", "โรงพยาบาลขนาดเล็ก", "ทันตกรรม", "เครื่องมือแพทย์", "ศูนย์ผู้มีบุตรยาก",
        "พลังงานปิโตรเลียม", "โรงกลั่นน้ำมัน", "ผลิตไฟฟ้า", "ไฟฟ้าจากพลังงานหมุนเวียน", "ไฟฟ้าพลังแสงอาทิตย์", "ถ่านหิน"
    ];

    function getAutoNiche(symbol, sectorName) {
        if (AUTO_NICHE_MAP[symbol]) return AUTO_NICHE_MAP[symbol];
        return sectorName ? `${sectorName}ทั่วไป` : 'หมวดหมู่ทั่วไป';
    }

    const HighlightText = ({ text, query }) => {
        if (!query) return <>{text}</>;
        const parts = text.split(new RegExp(`(${query})`, 'gi'));
        return (
            <>
                {parts.map((part, i) => 
                    part.toLowerCase() === query.toLowerCase() ? <span key={i} className="bg-yellow-200 text-amber-800 px-0.5 rounded">{part}</span> : part
                )}
            </>
        );
    };

    function StockDirectory({ showAlert, showConfirm }) {
        const [db, setDb] = useState([]);
        const [loading, setLoading] = useState(false);
        const [search, setSearch] = useState('');
        const [sectorFilter, setSectorFilter] = useState('');
        const [isEditMode, setIsEditMode] = useState(false);
        const [totalCount, setTotalCount] = useState(0);
        
        const [showAddModal, setShowAddModal] = useState(false);
        const [addForm, setAddForm] = useState({ stocks: '', sector: '', subSector: '' });
        const [isSubmitting, setIsSubmitting] = useState(false);

        const loadDatabase = useCallback(async () => {
            setLoading(true);
            try {
                const fastUrl = `https://docs.google.com/spreadsheets/d/${STOCK_DIR_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${STOCK_DIR_SHEET_NAME}&headers=1&t=${new Date().getTime()}`;
                let isFastSuccess = false;

                try {
                    const fastRes = await fetch(fastUrl, { cache: 'no-store' });
                    if (fastRes.ok) {
                        const text = await fastRes.text();
                        const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);/);
                        if (match) {
                            const json = JSON.parse(match[1]);
                            if (json.status === 'ok') {
                                const cols = json.table.cols.map(c => c.label);
                                const rows = json.table.rows.map(r => {
                                    let obj = {};
                                    cols.forEach((col, i) => {
                                        const cell = r.c[i];
                                        obj[col] = cell ? (cell.f !== undefined ? cell.f : (cell.v !== null ? cell.v : '')) : '';
                                    });
                                    for(let i=0; i<10; i++) {
                                        const cell = r.c[i];
                                        obj[i] = cell ? (cell.f !== undefined ? cell.f : (cell.v !== null ? cell.v : '')) : '';
                                    }
                                    return obj;
                                });
                                processSheetData(rows);
                                isFastSuccess = true;
                            }
                        }
                    }
                } catch (fastErr) {
                    console.warn("Fast fetch unavailable, falling back...", fastErr);
                }

                if (!isFastSuccess) {
                    const response = await fetch(STOCK_DIR_SCRIPT_URL + "?action=get&t=" + new Date().getTime(), { cache: 'no-store' });
                    const result = await response.json();
                    if (result.status === 'success') {
                        processSheetData(result.data);
                    } else {
                        showAlert('ดึงข้อมูลหุ้นล้มเหลว: ' + result.message);
                    }
                }
            } catch (error) {
                console.error(error);
                showAlert('ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบการเชื่อมต่อ');
            } finally {
                setLoading(false);
            }
        }, []);

        const processSheetData = (data) => {
            let newDB = [];
            let rowsToProcess = [];

            if (!data || data.length === 0) { setDb([]); return; }

            if (Array.isArray(data[0])) {
                let headerIndex = -1;
                for(let i=0; i < Math.min(10, data.length); i++) {
                    if(data[i] && data[i][0] && data[i][0].toString().trim() === 'หลักทรัพย์') { headerIndex = i; break; }
                }
                if(headerIndex === -1) { setDb([]); return; }
                const headers = data[headerIndex];
                rowsToProcess = data.slice(headerIndex + 1).map(row => {
                    let obj = {};
                    headers.forEach((h, i) => obj[h.trim()] = row[i]);
                    obj[0] = row[0]; obj[1] = row[1]; obj[2] = row[2]; obj[3] = row[3]; obj[4] = row[4];
                    return obj;
                });
            } else {
                rowsToProcess = data;
            }
            
            rowsToProcess.forEach(row => {
                const symbol = (row['หลักทรัพย์'] || row[0] || '').toString().trim().toUpperCase();
                if(!symbol || symbol === '-') return;

                const market = (row['ตลาด'] || row[2] || '').toString().trim();
                let industryRaw = (row['กลุ่มอุตสาหกรรม'] || row[3] || '').toString().trim();
                const industry = (industryRaw && industryRaw !== '-') ? industryRaw : (market.toLowerCase() === 'mai' ? 'ตลาด mai' : 'กลุ่มอื่นๆ');
                
                let subSectorRaw = (row['หมวดธุรกิจ'] || row[4] || '').toString().trim();
                const subSectorName = (subSectorRaw && subSectorRaw !== '-') ? subSectorRaw : 'หมวดธุรกิจทั่วไป';
                
                const autoNicheName = getAutoNiche(symbol, subSectorName);

                let targetSec = newDB.find(s => s.sector === industry);
                if (!targetSec) {
                    targetSec = { sector: industry, icon: STOCK_SECTOR_ICONS[industry] || "inventory_2", subSectors: [] };
                    newDB.push(targetSec);
                }

                let targetSub = targetSec.subSectors.find(s => s.name === subSectorName);
                if (!targetSub) {
                    targetSub = { name: subSectorName, niches: [] };
                    targetSec.subSectors.push(targetSub);
                }

                let targetNiche = targetSub.niches.find(n => n.name === autoNicheName);
                if (!targetNiche) {
                    targetNiche = { name: autoNicheName, stocks: [] };
                    targetSub.niches.push(targetNiche);
                }

                if(!targetNiche.stocks.includes(symbol)) {
                    targetNiche.stocks.push(symbol);
                }
            });

            let tCount = 0;
            newDB.forEach(sec => {
                sec.subSectors.forEach(sub => {
                    sub.niches.forEach(n => {
                        n.stocks.sort();
                        tCount += n.stocks.length;
                    });
                    sub.niches.sort((a,b) => {
                        let idxA = CUSTOM_NICHE_ORDER.indexOf(a.name);
                        let idxB = CUSTOM_NICHE_ORDER.indexOf(b.name);
                        idxA = idxA !== -1 ? idxA : 9999;
                        idxB = idxB !== -1 ? idxB : 9999;
                        if (idxA !== idxB) return idxA - idxB;
                        return a.name.localeCompare(b.name);
                    });
                });
                sec.subSectors.sort((a,b) => a.name.localeCompare(b.name));
            });
            newDB.sort((a,b) => a.sector.localeCompare(b.sector));
            
            setDb(newDB);
            setTotalCount(tCount);
        };

        useEffect(() => { loadDatabase(); }, [loadDatabase]);

        const submitAddStock = async (e) => {
            e.preventDefault();
            const stocksInput = addForm.stocks.toUpperCase().trim();
            const sectorRaw = addForm.sector.trim();
            const subSectorRaw = addForm.subSector.trim();

            if(!stocksInput || !sectorRaw || !subSectorRaw) {
                return showAlert("กรุณากรอกข้อมูลให้ครบถ้วน");
            }

            const newStocks = stocksInput.split(',').map(s => s.trim()).filter(s => s !== "");
            setIsSubmitting(true);

            try {
                const response = await fetch(STOCK_DIR_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'add', stocks: newStocks, industry: sectorRaw, sector: subSectorRaw })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    setSectorFilter(sectorRaw);
                    setSearch('');
                    setShowAddModal(false);
                    setAddForm({ stocks: '', sector: '', subSector: '' });
                    await loadDatabase();
                } else { 
                    showAlert('ไม่สำเร็จ: ' + result.message); 
                }
            } catch (error) { 
                showAlert('เชื่อมต่อมีปัญหา (Failed to fetch)'); 
            } finally { 
                setIsSubmitting(false); 
            }
        };

        const deleteStock = (stockName) => {
            showConfirm(`ลบหุ้น ${stockName} ออกจากระบบสแกนใช่หรือไม่?`, async () => {
                try {
                    const response = await fetch(STOCK_DIR_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'delete', symbol: stockName })
                    });
                    const result = await response.json();
                    if(result.status === 'success') {
                        await loadDatabase();
                    } else { 
                        showAlert('ลบไม่สำเร็จ: ' + result.message); 
                    }
                } catch (error) { 
                    showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อ'); 
                }
            });
        };

        const getFilteredData = () => {
            const lowerQuery = search.toLowerCase();
            const isSearching = search.length > 0;
            let results = [];

            db.forEach(sectorData => {
                if (sectorFilter && sectorData.sector !== sectorFilter) return;

                let sectorHasMatch = sectorData.sector.toLowerCase().includes(lowerQuery);
                let matchedSubSectors = [];

                sectorData.subSectors.forEach((subSector) => {
                    let subSectorHasMatch = subSector.name.toLowerCase().includes(lowerQuery);
                    let matchedNiches = [];

                    subSector.niches.forEach((niche) => {
                        let nicheHasMatch = niche.name.toLowerCase().includes(lowerQuery);
                        let matchedStocks = niche.stocks.filter(stock => stock.toLowerCase().includes(lowerQuery));

                        if (!isSearching || sectorHasMatch || subSectorHasMatch || nicheHasMatch || matchedStocks.length > 0) {
                            matchedNiches.push({
                                ...niche,
                                displayStocks: (!isSearching || sectorHasMatch || subSectorHasMatch || nicheHasMatch) ? niche.stocks : matchedStocks
                            });
                        }
                    });

                    if (!isSearching || sectorHasMatch || subSectorHasMatch || matchedNiches.length > 0) {
                        matchedSubSectors.push({
                            ...subSector,
                            niches: matchedNiches.length > 0 ? matchedNiches : subSector.niches.map(n => ({...n, displayStocks: n.stocks}))
                        });
                    }
                });

                if (matchedSubSectors.length > 0) {
                    results.push({ ...sectorData, subSectors: matchedSubSectors });
                }
            });
            return results;
        };

        const renderData = getFilteredData();
        let globalColorIndex = 0;

        return (
            <div className="animate-in fade-in duration-300 relative pb-10">
                {/* Control Panel */}
                <div className="bg-white rounded-2xl p-4 sm:p-6 mb-6 border border-slate-200 shadow-sm transition-all">
                    <div className="flex flex-col lg:flex-row gap-4 items-center justify-between mb-4 sm:mb-6">
                        <div className="w-full lg:w-auto text-center lg:text-left">
                            <h1 className="text-xl sm:text-2xl font-bold text-slate-800 mb-1">ฐานข้อมูลและโครงสร้างหุ้น</h1>
                            <p className="text-slate-500 text-xs sm:text-sm flex items-center justify-center lg:justify-start gap-1">
                                <Icon name="bolt" className="text-[16px] text-amber-500" /> แบ่งหมวดหมู่ย่อยและดึงข้อมูลอัตโนมัติ
                            </p>
                        </div>
                        <div className="flex flex-col gap-2 w-full lg:w-auto lg:min-w-[320px]">
                            <div className="w-full bg-slate-100 px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl flex items-center justify-center gap-2">
                                <Icon name="bar_chart" className="text-[18px] text-emerald-500" />
                                <span className="text-xs sm:text-sm font-bold text-slate-600">หุ้นในระบบ: {totalCount} ตัว</span>
                            </div>
                            <div className="flex gap-2 w-full">
                                <button onClick={() => setIsEditMode(!isEditMode)} className={`flex-1 flex items-center justify-center gap-1.5 px-3 py-2 sm:py-2.5 rounded-xl transition-colors font-bold text-xs sm:text-sm shadow-sm whitespace-nowrap ${isEditMode ? 'bg-emerald-50 text-emerald-600 border border-emerald-200' : 'bg-rose-50 text-rose-600 border border-rose-200'}`}>
                                    <Icon name={isEditMode ? 'check' : 'delete'} className="text-[16px]" /> {isEditMode ? 'เสร็จสิ้น' : 'ลบหุ้น'}
                                </button>
                                <button onClick={() => setShowAddModal(true)} className="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 sm:py-2.5 bg-indigo-600 text-white hover:bg-indigo-700 rounded-xl transition-colors font-bold text-xs sm:text-sm shadow-sm whitespace-nowrap">
                                    <Icon name="add" className="text-[16px]" /> เพิ่มหุ้นใหม่
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex flex-col md:flex-row gap-3 sm:gap-4">
                        <div className="w-full md:w-2/5 lg:w-1/3 relative">
                            <Icon name="filter_alt" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[18px] pointer-events-none" />
                            <select value={sectorFilter} onChange={e => setSectorFilter(e.target.value)} className="block w-full pl-9 sm:pl-10 pr-10 py-2.5 sm:py-3 border border-slate-300 rounded-xl bg-slate-50 focus:bg-white outline-none focus:border-indigo-500 font-bold text-sm sm:text-base text-slate-800 appearance-none cursor-pointer">
                                <option value="">-- ทุกอุตสาหกรรม --</option>
                                {db.map(s => <option key={s.sector} value={s.sector}>{s.sector}</option>)}
                            </select>
                            <Icon name="keyboard_arrow_down" className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-[18px] pointer-events-none" />
                        </div>
                        <div className="w-full md:w-3/5 lg:w-2/3 relative">
                            <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[18px] pointer-events-none" />
                            <input type="text" value={search} onChange={e => setSearch(e.target.value)} className="block w-full pl-9 sm:pl-10 pr-4 py-2.5 sm:py-3 border border-slate-300 rounded-xl bg-slate-50 focus:bg-white outline-none focus:border-indigo-500 font-medium text-sm sm:text-base" placeholder="พิมพ์ชื่อหุ้น (เช่น PTT), หมวดหมู่..." />
                        </div>
                    </div>
                </div>

                {/* Loading State */}
                {loading && db.length === 0 ? (
                    <div className="text-center py-20 text-indigo-500 font-bold">
                        <div className="bg-indigo-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <Icon name="bolt" className="text-[32px] text-amber-500 animate-pulse" />
                        </div>
                        กำลังดึงข้อมูลออนไลน์...
                    </div>
                ) : renderData.length === 0 ? (
                    <div className="text-center py-16 bg-white rounded-2xl border border-slate-200 shadow-sm mx-1">
                        <div className="bg-slate-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                            <Icon name="search_off" className="text-[40px] text-slate-400" />
                        </div>
                        <h3 className="text-xl font-bold text-slate-700">ไม่พบข้อมูล</h3>
                    </div>
                ) : (
                    <div className={isEditMode ? 'edit-mode' : ''}>
                        {renderData.map((sectorData) => (
                            <div key={sectorData.sector} className="mb-10 sm:mb-12">
                                <div className="flex items-center gap-3 mb-6 pb-3 border-b-2 border-slate-200">
                                    <div className="bg-slate-200 p-2 rounded-lg">
                                        <Icon name={sectorData.icon} className="text-[20px] sm:text-[24px] text-slate-700" />
                                    </div>
                                    <h2 className="text-xl sm:text-2xl font-bold text-slate-800 tracking-wide uppercase">
                                        <HighlightText text={sectorData.sector} query={search} />
                                    </h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6 items-start">
                                    {sectorData.subSectors.map((sub) => {
                                        const totalInCard = sub.niches.reduce((acc, n) => acc + (n.stocks?.length || 0), 0);
                                        if (totalInCard === 0) return null;
                                        const theme = STOCK_COLOR_THEMES[globalColorIndex % STOCK_COLOR_THEMES.length];
                                        globalColorIndex++;

                                        return (
                                            <div key={sub.name} className={`col-span-1 rounded-2xl shadow-sm border ${theme.border} bg-white flex flex-col h-full transition-all hover:shadow-md`}>
                                                <div className={`${theme.header} text-white px-4 py-3 sm:py-3.5 flex justify-between items-center shadow-sm shrink-0 rounded-t-2xl`}>
                                                    <h3 className="font-bold text-[16px] sm:text-[18px] leading-tight truncate pr-2 tracking-wide"><HighlightText text={sub.name} query={search} /></h3>
                                                    <span className="text-[11px] sm:text-[12px] font-bold bg-black/20 px-2 py-1 rounded-lg shrink-0 backdrop-blur-sm">{totalInCard} หุ้น</span>
                                                </div>
                                                <div className={`p-4 sm:p-5 flex-1 rounded-b-2xl ${theme.body}`}>
                                                    <div className="space-y-5">
                                                        {sub.niches.map(niche => {
                                                            if(!niche.displayStocks || niche.displayStocks.length === 0) return null;
                                                            const isGeneric = niche.name.includes("ทั่วไป");
                                                            return (
                                                                <div key={niche.name} className="relative">
                                                                    <h4 className={`text-[12px] sm:text-[13px] font-bold ${isGeneric ? 'text-slate-500' : 'text-slate-800'} mb-2.5 pb-1 border-b border-slate-300/50 flex items-center gap-1.5`}>
                                                                        <Icon name="subdirectory_arrow_right" className="text-[14px] opacity-60" /> <HighlightText text={niche.name} query={search} />
                                                                    </h4>
                                                                    <div className="flex flex-wrap items-center gap-2 pl-2">
                                                                        {niche.displayStocks.map(stock => {
                                                                            const isStockMatch = search && stock.toLowerCase().includes(search.toLowerCase());
                                                                            const stockCol = isStockMatch 
                                                                                ? "text-yellow-900 bg-yellow-300 font-bold px-2 py-1 rounded-md shadow-sm border border-yellow-500" 
                                                                                : "text-slate-700 bg-white border border-slate-300 px-2 py-1 rounded-md shadow-sm hover:border-indigo-500 hover:text-indigo-600 font-medium";
                                                                            return (
                                                                                <div key={stock} className="stock-badge relative inline-block">
                                                                                    <a href={`https://www.set.or.th/th/market/product/stock/quote/${encodeURIComponent(stock)}/price`} target="_blank" rel="noreferrer" title={`ดูข้อมูลหุ้น ${stock}`} className={`${stockCol} text-[13px] sm:text-[14px] md:text-[15px] inline-block transition-colors`}>
                                                                                        <HighlightText text={stock} query={search} />
                                                                                    </a>
                                                                                    {isEditMode && (
                                                                                        <div className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-rose-500 text-white rounded-full flex items-center justify-center cursor-pointer shadow-md hover:bg-rose-700 hover:scale-110 z-10" onClick={(e) => { e.preventDefault(); e.stopPropagation(); deleteStock(stock); }}>
                                                                                            <Icon name="close" className="text-[10px]" />
                                                                                        </div>
                                                                                    )}
                                                                                </div>
                                                                            );
                                                                        })}
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                )}

                {/* Add Modal */}
                {showAddModal && (
                    <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in" onClick={() => setShowAddModal(false)}>
                        <div className="bg-white rounded-3xl shadow-2xl p-0 w-full max-w-md relative animate-in zoom-in-95 flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                            <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-indigo-50/50">
                                <h3 className="font-black text-lg text-indigo-900 flex items-center gap-2"><Icon name="add" className="text-[24px]" /> เพิ่มหุ้นใหม่</h3>
                                <button onClick={() => setShowAddModal(false)} className="text-slate-400 hover:text-slate-600 bg-white p-1.5 rounded-full shadow-sm"><Icon name="close" /></button>
                            </div>
                            <div className="p-5 overflow-y-auto custom-scrollbar">
                                <div className="mb-4 bg-indigo-50 border border-indigo-100 p-3 rounded-xl flex gap-2">
                                    <Icon name="info" className="text-indigo-500 text-[20px] shrink-0 mt-0.5" />
                                    <p className="text-xs sm:text-sm text-indigo-800 font-medium">ชื่อบริษัทและตลาดจะถูกดึงให้อัตโนมัติ พร้อมจัดหมวดหมู่ย่อย</p>
                                </div>
                                <form id="addStockForm" onSubmit={submitAddStock} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 mb-1">รายชื่อหุ้น <span className="text-[10px] text-slate-500 font-normal">(คั่นด้วยลูกน้ำ เช่น BBL, SCB)</span></label>
                                        <input type="text" required value={addForm.stocks} onChange={e => setAddForm({...addForm, stocks: e.target.value})} className="w-full px-3 py-2.5 text-sm sm:text-base border border-slate-300 rounded-xl focus:border-indigo-500 outline-none uppercase font-bold shadow-sm" placeholder="เช่น ADVANC, TRUE" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 mb-1">1. กลุ่มอุตสาหกรรม (Industry)</label>
                                        <input type="text" list="sectorList" required value={addForm.sector} onChange={e => setAddForm({...addForm, sector: e.target.value})} className="w-full px-3 py-2.5 text-sm sm:text-base border border-slate-300 rounded-xl focus:border-indigo-500 outline-none shadow-sm" placeholder="เช่น ธุรกิจการเงิน" />
                                        <datalist id="sectorList">{db.map(s => <option key={s.sector} value={s.sector} />)}</datalist>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 mb-1">2. หมวดธุรกิจหลัก (Sector)</label>
                                        <input type="text" list="subSectorList" required value={addForm.subSector} onChange={e => setAddForm({...addForm, subSector: e.target.value})} className="w-full px-3 py-2.5 text-sm sm:text-base border border-slate-300 rounded-xl focus:border-indigo-500 outline-none shadow-sm" placeholder="เช่น ธนาคาร" />
                                        <datalist id="subSectorList">{db.find(s => s.sector === addForm.sector)?.subSectors.map(sub => <option key={sub.name} value={sub.name} />)}</datalist>
                                    </div>
                                    <button type="submit" disabled={isSubmitting} className="w-full mt-2 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-bold shadow-md transition-colors disabled:opacity-50">
                                        {isSubmitting ? 'กำลังบันทึก...' : 'บันทึกข้อมูล'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================

    function App() {
      const [accounts, setAccounts] = useState(initialAccounts);
      const [activeUser, setActiveUser] = useState(null); 
      const [activeSubAccount, setActiveSubAccount] = useState('');
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [transactions, setTransactions] = useState([]);
      const [trades, setTrades] = useState([]);
      const [upcomingEvents, setUpcomingEvents] = useState({});
      
      const [isLoading, setIsLoading] = useState(false);
      
      const [marketPrices, setMarketPrices] = useState({});
      const [usdRate, setUsdRate] = useState(35.50);

      const [showPinModal, setShowPinModal] = useState(false);
      const [isAdminMode, setIsAdminMode] = useState(false);
      const [editingTransaction, setEditingTransaction] = useState(null);
      
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null });
      const [showPortfolioSplash, setShowPortfolioSplash] = useState(false);

      useEffect(() => {
        const processSheetNames = (sheetNames) => {
          setAccounts(prevAccounts => {
            const updatedAccounts = [
              { id: 'B', name: 'คุณ B', subAccounts: [] },
              { id: 'M', name: 'คุณ M', subAccounts: [] }
            ];
            
            sheetNames.forEach(sheetName => {
              const match = sheetName.match(/^([BM])\d+$/i);
              if (match) {
                const userId = match[1].toUpperCase();
                const targetAcc = updatedAccounts.find(a => a.id === userId);
                if (targetAcc && !targetAcc.subAccounts.includes(sheetName.toUpperCase())) {
                  targetAcc.subAccounts.push(sheetName.toUpperCase());
                }
              } else {
                const firstChar = sheetName.charAt(0).toUpperCase();
                if (firstChar === 'B' || firstChar === 'M') {
                    const targetAcc = updatedAccounts.find(a => a.id === firstChar);
                    if (targetAcc && !targetAcc.subAccounts.includes(sheetName)) {
                        targetAcc.subAccounts.push(sheetName);
                    }
                }
              }
            });
            
            return updatedAccounts.map(acc => {
              const finalSubAccounts = acc.subAccounts.length > 0 ? acc.subAccounts : prevAccounts.find(p => p.id === acc.id).subAccounts;
              return {
                ...acc,
                subAccounts: finalSubAccounts.sort((a,b) => {
                    const numA = parseInt(a.replace(/\D/g, ''));
                    const numB = parseInt(b.replace(/\D/g, ''));
                    if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                    if (!isNaN(numA)) return -1;
                    if (!isNaN(numB)) return 1;
                    return a.localeCompare(b);
                })
              };
            });
          });
        };

        const fetchAccountsFromSheets = async () => {
          try {
            const url = `${GOOGLE_SCRIPT_URL}?action=getSheets&t=${new Date().getTime()}`;
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.status === 'success' && Array.isArray(result.data)) {
              processSheetNames(result.data);
            }
          } catch (error) {
            console.error("Error fetching accounts from sheets:", error);
          }
        };

        fetchAccountsFromSheets();
      }, []);

      const showConfirm = (message, onConfirm) => {
        setDialog({ isOpen: true, type: 'confirm', message, onConfirm });
      };

      const showAlert = (message) => {
        setDialog({ isOpen: true, type: 'alert', message, onConfirm: null });
      };

      const currentUser = useMemo(() => accounts.find(a => a.id === activeUser), [accounts, activeUser]);
      
      const userTransactions = useMemo(() => {
        return transactions.filter(t => t.userId === activeUser && t.subAccountId === activeSubAccount);
      }, [transactions, activeUser, activeSubAccount]);

      const getTypeNameTh = (typeId) => {
        if (typeId === 'income') return 'รายรับ';
        if (typeId === 'expense') return 'รายจ่าย';
        if (typeId === 'saving') return 'เงินเก็บ';
        if (typeId === 'withdraw') return 'ถอนเงิน';
        if (typeId === 'memo') return 'memo';
        if (typeId === 'รายรับ') return 'income';
        if (typeId === 'รายจ่าย') return 'expense';
        if (typeId === 'เงินเก็บ') return 'saving';
        if (typeId === 'ถอนเงิน') return 'withdraw';
        if (typeId === 'บันทึกข้อความ') return 'memo';
        return typeId;
      };

      const getCategoryNameTh = (typeId, catId) => {
         if (typeId === 'memo') return 'memo';
         if (['income', 'expense', 'saving', 'withdraw'].includes(typeId)) {
            const catObj = CATEGORIES[typeId]?.find(c => c.id === catId);
            return catObj ? catObj.name : catId;
         }
         const thType = getTypeNameTh(typeId);
         if (thType && CATEGORIES[thType]) {
             const catObj = CATEGORIES[thType].find(c => c.name === catId);
             return catObj ? catObj.id : catId;
         }
         return catId;
      };

      const extractDateAndTime = (rawDate) => {
        let cDate = rawDate;
        let rTime = null;
        if (typeof cDate === 'string' && cDate.includes('เวลา')) {
          const parts = cDate.split(' เวลา ');
          cDate = parts[0].trim();
          rTime = parts[1].replace(' น.', '').trim();
          if (rTime.split(':').length === 3) {
              rTime = rTime.split(':').slice(0, 2).join(':'); 
          }
        }
        return { cleanDate: cDate, recordTime: rTime };
      };

      const loadUpcomingEvents = async (tradesList) => {
        const uniqueSymbols = [...new Set(tradesList
            .filter(t => t.symbol && !['รายการฝากเงิน', 'รายการถอนเงิน', 'ภาพรวมตลาด'].includes(t.symbol) && t.type !== 'MEMO')
            .map(t => t.symbol))];
        
        if (uniqueSymbols.length === 0) return;

        try {
            const url = `${GOOGLE_SCRIPT_URL}?action=getEvents&symbols=${encodeURIComponent(uniqueSymbols.join(','))}&t=${new Date().getTime()}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.status === 'success' && result.data) {
                setUpcomingEvents(prev => ({ ...prev, ...result.data }));
            }
        } catch (error) {
            console.error("Load Events Error:", error);
        }
      };

      const loadDataFromSheet = async (subAccId) => {
        if (!subAccId) return;
        
        setIsLoading(true);

        try {
          if (subAccId !== 'PORTFOLIO') {
            const url = `${GOOGLE_SCRIPT_URL}?subAccountId=${subAccId}&t=${new Date().getTime()}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.status === 'success') {
               const mappedData = (result.data || []).map(item => {
                   const extracted = extractDateAndTime(item.date);
                   return {
                       ...item,
                       date: extracted.cleanDate,
                       recordTime: item.recordTime || extracted.recordTime,
                       type: getTypeNameTh(item.type),
                       category: getCategoryNameTh(item.type, item.category)
                   };
               });
               setTransactions(mappedData);
            } else {
               setTransactions([]);
            }
          } 
          else {
            const url = `${GOOGLE_SCRIPT_URL}?sheet=invest&t=${new Date().getTime()}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.status === 'success') {
               const loadedTrades = (result.data || []).map(item => {
                   const extracted = extractDateAndTime(item.date);
                   return {
                       ...item,
                       date: extracted.cleanDate,
                       recordTime: item.recordTime || extracted.recordTime,
                       note: item.type === 'MEMO' ? item.status : item.note 
                   };
               });
               setTrades(loadedTrades);

               if (result.usdRate) {
                  setUsdRate(Number(result.usdRate));
               }
               
               // ✅ ระบบ Direct Data Stream: ดึงราคาตรงจากเซลล์ Sheet (column price.now) ทันที
               const directPrices = {};
               loadedTrades.forEach(t => {
                   if (t.symbol && t.price_now > 0 && !['รายการฝากเงิน', 'รายการถอนเงิน', 'ภาพรวมตลาด'].includes(t.symbol)) {
                       directPrices[t.symbol] = Number(t.price_now);
                   }
               });
               setMarketPrices(prev => ({ ...prev, ...directPrices }));

               loadUpcomingEvents(loadedTrades); // ✅ โหลดข้อมูล Events ทันที
            } else {
               setTrades([]);
            }
          }
        } catch (error) {
          console.error("Fetch API Error:", error);
          showAlert('ไม่สามารถเชื่อมต่อข้อมูลจาก Sheet ได้');
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        if (activeSubAccount) {
           loadDataFromSheet(activeSubAccount);
        }
      }, [activeSubAccount]);

      useEffect(() => {
        if (activeUser) {
           fetch(`${GOOGLE_SCRIPT_URL}?sheet=invest&t=${new Date().getTime()}`)
            .then(res => res.json())
            .then(result => {
               if (result.status === 'success' && result.usdRate) {
                  setUsdRate(Number(result.usdRate));
               }
            })
            .catch(err => console.error("Error fetching USD rate:", err));
        }
      }, [activeUser]);

      const sendDataToSheet = async (dataPayload, action = 'add') => {
        setIsLoading(true);
        try {
          let payloadToSave = { ...dataPayload, action };
          if (payloadToSave.sheetType !== 'invest' && payloadToSave.type) {
             if (payloadToSave.type !== 'memo') {
                 payloadToSave.category = getCategoryNameTh(payloadToSave.type, payloadToSave.category);
                 payloadToSave.type = getTypeNameTh(payloadToSave.type);
             } else {
                 payloadToSave.type = 'บันทึกข้อความ'; 
             }
          }
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payloadToSave)
          });
          const result = await response.json();
          if (result.status !== 'success') {
             showAlert('เกิดข้อผิดพลาดในการดำเนินการ: ' + result.message);
          }
          loadDataFromSheet(payloadToSave.sheetType === 'invest' ? 'PORTFOLIO' : activeSubAccount);
        } catch (error) {
          console.error("Save Data Error:", error);
          showAlert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ ข้อมูลอาจบันทึกแบบ Offline เท่านั้น');
        } finally {
          setIsLoading(false);
        }
      };

      const { totalIncome, totalExpense, totalSaving, balance } = useMemo(() => {
        let income = 0;
        let expense = 0;
        let saving = 0;
        let investment = 0;
        let withdraw = 0;

        userTransactions.forEach(curr => {
          if (curr.type === 'income') {
            income += curr.amount;
          } else if (curr.type === 'expense') {
            expense += curr.amount;
          } else if (curr.type === 'saving') {
            if (curr.category !== 'investment') {
              saving += curr.amount;
            } else {
              investment += curr.amount;
            }
          } else if (curr.type === 'withdraw') {
            withdraw += curr.amount;
          }
        });

        const currentBalance = income + withdraw - expense - saving - investment;
        const netSaving = saving - withdraw;

        return {
          totalIncome: income,
          totalExpense: expense,
          totalSaving: netSaving,
          balance: currentBalance
        };
      }, [userTransactions]);

      const expensesByCategory = useMemo(() => {
        const expenses = userTransactions.filter(t => t.type === 'expense');
        const grouped = expenses.reduce((acc, curr) => {
          acc[curr.category] = (acc[curr.category] || 0) + curr.amount;
          return acc;
        }, {});

        return Object.entries(grouped)
          .map(([categoryId, amount]) => {
            const categoryObj = CATEGORIES.expense.find(c => c.id === categoryId) || CATEGORIES.expense[CATEGORIES.expense.length - 1];
            return { ...categoryObj, amount, percentage: totalExpense > 0 ? (amount / totalExpense) * 100 : 0 };
          }).sort((a, b) => b.amount - a.amount);
      }, [userTransactions, totalExpense]);

      const handleAddTransaction = async (newTransaction) => {
        const transactionId = generateSequentialId(newTransaction.date, transactions);
        const nowStr = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        
        let payload = { ...newTransaction, id: transactionId, userId: activeUser, subAccountId: activeSubAccount, recordTime: nowStr };
        
        if (payload.type === 'memo') {
            payload.amount = 0;
            payload.balance = balance;
            payload.totalSaving = totalSaving;
            payload.totalMoney = balance + totalSaving;
        } else {
            let updatedBalance = balance;
            let updatedSaving = totalSaving;
            
            if (payload.type === 'income') updatedBalance += payload.amount;
            if (payload.type === 'expense') updatedBalance -= payload.amount;
            if (payload.type === 'saving') {
                updatedBalance -= payload.amount;
                if(payload.category !== 'investment') updatedSaving += payload.amount;
            }
            if (payload.type === 'withdraw') {
                updatedBalance += payload.amount;
                updatedSaving -= payload.amount;
            }
            
            payload.balance = updatedBalance;
            payload.totalSaving = updatedSaving;
            payload.totalMoney = updatedBalance + updatedSaving;
        }
        
        setTransactions(prev => [payload, ...prev]);

        await sendDataToSheet(payload, 'add');
        
        if (newTransaction.type === 'saving' && newTransaction.category === 'investment' && newTransaction.portId) {
           const depositPrice = newTransaction.portId === 'lib_us' ? newTransaction.usdAmount : newTransaction.amount;
           const tradeId = generateSequentialId(newTransaction.date, trades);

           const newTrade = {
             id: tradeId,
             userId: activeUser,
             portId: newTransaction.portId,
             symbol: 'รายการฝากเงิน',
             type: 'DEPOSIT',
             units: 0,
             price: depositPrice,
             date: newTransaction.date,
             recordTime: nowStr
           };
           
           setTrades(prev => [newTrade, ...prev]);
           await sendDataToSheet({ ...newTrade, sheetType: 'invest' }, 'add');
        }
        
        setActiveTab('dashboard');
      };

      const handleDeleteTransaction = (id) => {

    // --- Components ย่อย ---
