<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Money - ระบบบันทึกรายรับรายจ่าย และพอร์ตลงทุน</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }
    .blob-1 { animation: float 7s ease-in-out infinite; }
    .blob-2 { animation: float 9s ease-in-out infinite reverse; }
    .blob-3 { animation: float 11s ease-in-out infinite 2s; }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Loading Overlay */
    .loader {
      border: 4px solid #f3f3f3;
      border-radius: 50%;
      border-top: 4px solid #4f46e5;
      width: 40px;
      height: 40px;
      -webkit-animation: spin 1s linear infinite; /* Safari */
      animation: spin 1s linear infinite;
    }
    @-webkit-keyframes spin { 0% { -webkit-transform: rotate(0deg); } 100% { -webkit-transform: rotate(360deg); } }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- การตั้งค่า Google Sheets API ---
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCeMEMzzPZHNNn6Wjj20HgxIYUpzZo9dyw24kkguvKsZ_1Gnuf-qYrarn15uhpMKVM/exec';

    const Icon = ({ name, className }) => {
      return <span className={`material-symbols-outlined ${className || ''}`}>{name}</span>;
    };

    // --- Custom Alert/Confirm Modal ---
    const CustomDialog = ({ isOpen, type, message, onConfirm, onClose }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
          <div className="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-sm relative animate-in zoom-in-95">
            <div className="text-center mb-6 mt-2">
              <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${type === 'confirm' ? 'bg-amber-100 text-amber-600' : 'bg-rose-100 text-rose-600'}`}>
                <Icon name={type === 'confirm' ? 'help' : 'error'} className="text-[32px]" />
              </div>
              <h3 className="text-lg font-bold text-slate-800 leading-tight">{message}</h3>
            </div>
            <div className="flex gap-3">
              {type === 'confirm' && (
                <button onClick={onClose} className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">
                  ยกเลิก
                </button>
              )}
              <button 
                onClick={() => { 
                  onClose(); 
                  if (onConfirm) setTimeout(onConfirm, 50); 
                }} 
                className={`flex-1 py-3 font-bold rounded-xl text-white shadow-md transition-transform active:scale-95 ${type === 'confirm' ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-slate-800 hover:bg-slate-900'}`}
              >
                ตกลง
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- Constants & Helpers ---
    const PORT_NAMES = {
      'lib': 'lib (หุ้นไทย)',
      'lib_us': 'lib/us (ตปท.)',
      'finan': 'finan '
    };

    const CATEGORIES = {
      expense: [
        { id: 'food', name: 'อาหารและเครื่องดื่ม', icon: 'restaurant', color: 'bg-orange-500' },
        { id: 'transport', name: 'การเดินทาง', icon: 'directions_car', color: 'bg-blue-500' },
        { id: 'housing', name: 'ที่พักอาศัย', icon: 'home', color: 'bg-indigo-500' },
        { id: 'utilities', name: 'บิลและสาธารณูปโภค', icon: 'lightbulb', color: 'bg-yellow-500' },
        { id: 'shopping', name: 'ช้อปปิ้ง', icon: 'shopping_bag', color: 'bg-pink-500' },
        { id: 'entertainment', name: 'บันเทิง', icon: 'movie', color: 'bg-purple-500' },
        { id: 'health', name: 'สุขภาพ', icon: 'monitor_heart', color: 'bg-red-500' },
        { id: 'other_exp', name: 'อื่นๆ (รายจ่าย)', icon: 'more_horiz', color: 'bg-gray-500' },
      ],
      income: [
        { id: 'salary', name: 'เงินเดือน', icon: 'work', color: 'bg-green-600' },
        { id: 'sales', name: 'ค้าขาย/ธุรกิจ', icon: 'payments', color: 'bg-emerald-500' },
        { id: 'bonus', name: 'โบนัส/เงินพิเศษ', icon: 'redeem', color: 'bg-teal-500' },
        { id: 'port_withdraw', name: 'ถอนเงินลงทุน', icon: 'account_balance', color: 'bg-teal-600' },
        { id: 'other_inc', name: 'อื่นๆ (รายรับ)', icon: 'more_horiz', color: 'bg-gray-500' },
      ],
      saving: [
        { id: 'general_saving', name: 'เงินเก็บทั่วไป', icon: 'savings', color: 'bg-blue-500' },
        { id: 'investment', name: 'การลงทุน', icon: 'trending_up', color: 'bg-indigo-600' },
        { id: 'emergency', name: 'สำรองฉุกเฉิน', icon: 'monitor_heart', color: 'bg-rose-500' }
      ],
      withdraw: [
        { id: 'withdraw_saving', name: 'ถอนเงินเก็บสะสม', icon: 'price_change', color: 'bg-indigo-500' }
      ]
    };

    const formatCurrency = (amount, maxDecimals = 2) => {
      return new Intl.NumberFormat('th-TH', { 
        style: 'currency', 
        currency: 'THB',
        minimumFractionDigits: 2,
        maximumFractionDigits: Math.max(2, maxDecimals)
      }).format(amount || 0);
    };

    const formatUSD = (amount, maxDecimals = 2) => {
      return new Intl.NumberFormat('en-US', { 
        style: 'currency', 
        currency: 'USD',
        minimumFractionDigits: 2,
        maximumFractionDigits: Math.max(2, maxDecimals)
      }).format(amount || 0);
    };

    const formatNumber = (num) => new Intl.NumberFormat('th-TH').format(num || 0);

    const formatDate = (dateString) => {
      if (!dateString) return '';
      const date = new Date(dateString);
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear() + 543;
      return `${day}-${month}-${year}`;
    };

    const generateSequentialId = (dateString, items) => {
      if (!dateString) return Date.now().toString(); 
      const [year, month, day] = dateString.split('-');
      const thaiYear = parseInt(year) + 543;
      const prefix = `${day}-${month}-${thaiYear}-`;

      let maxSeq = 0;
      items.forEach(item => {
        const itemIdStr = String(item.id);
        if (itemIdStr.startsWith(prefix)) {
          const seqStr = itemIdStr.replace(prefix, '');
          const seqNum = parseInt(seqStr, 10);
          if (!isNaN(seqNum) && seqNum > maxSeq) {
            maxSeq = seqNum;
          }
        }
      });

      const nextSeq = String(maxSeq + 1).padStart(3, '0');
      return `${prefix}${nextSeq}`;
    };

    const getProfileTheme = (index) => {
      const themes = [
        { from: 'from-blue-400', to: 'to-indigo-500', shadow: 'shadow-blue-500/10', text: 'from-blue-600 to-indigo-600' },
        { from: 'from-pink-400', to: 'to-rose-500', shadow: 'shadow-pink-500/10', text: 'from-pink-600 to-rose-500' },
      ];
      return themes[index % themes.length];
    };

    const initialAccounts = [
      { id: 'B', name: 'คุณ B', subAccounts: ['B1', 'B2', 'B3'] },
      { id: 'M', name: 'คุณ M', subAccounts: ['M1', 'M2'] }
    ];

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================

    function App() {
      const [accounts, setAccounts] = useState(initialAccounts);
      const [activeUser, setActiveUser] = useState(null); 
      const [activeSubAccount, setActiveSubAccount] = useState('');
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [transactions, setTransactions] = useState([]);
      const [trades, setTrades] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      
      const [marketPrices, setMarketPrices] = useState({});

      const [usdRate, setUsdRate] = useState(35.50);

      const [showPinModal, setShowPinModal] = useState(false);
      const [isAdminMode, setIsAdminMode] = useState(false);
      const [editingTransaction, setEditingTransaction] = useState(null);
      
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null });

      const showConfirm = (message, onConfirm) => {
        setDialog({ isOpen: true, type: 'confirm', message, onConfirm });
      };

      const showAlert = (message) => {
        setDialog({ isOpen: true, type: 'alert', message, onConfirm: null });
      };

      const currentUser = useMemo(() => accounts.find(a => a.id === activeUser), [accounts, activeUser]);
      
      const userTransactions = useMemo(() => {
        return transactions.filter(t => t.userId === activeUser && t.subAccountId === activeSubAccount);
      }, [transactions, activeUser, activeSubAccount]);

      const getTypeNameTh = (typeId) => {
        if (typeId === 'income') return 'รายรับ';
        if (typeId === 'expense') return 'รายจ่าย';
        if (typeId === 'saving') return 'เงินเก็บ';
        if (typeId === 'withdraw') return 'ถอนเงิน';
        if (typeId === 'รายรับ') return 'income';
        if (typeId === 'รายจ่าย') return 'expense';
        if (typeId === 'เงินเก็บ') return 'saving';
        if (typeId === 'ถอนเงิน') return 'withdraw';
        return typeId;
      };

      const getCategoryNameTh = (typeId, catId) => {
         if (['income', 'expense', 'saving', 'withdraw'].includes(typeId)) {
            const catObj = CATEGORIES[typeId]?.find(c => c.id === catId);
            return catObj ? catObj.name : catId;
         }
         const thType = getTypeNameTh(typeId);
         if (thType && CATEGORIES[thType]) {
             const catObj = CATEGORIES[thType].find(c => c.name === catId);
             return catObj ? catObj.id : catId;
         }
         return catId;
      };

      // ดึงข้อมูลจาก Sheet
      const loadDataFromSheet = async (subAccId) => {
        if (!subAccId) return;

        setIsLoading(true);
        try {
          const url = subAccId !== 'PORTFOLIO' ? `${GOOGLE_SCRIPT_URL}?subAccountId=${subAccId}` : `${GOOGLE_SCRIPT_URL}?sheet=invest`;
          const response = await fetch(url);
          const result = await response.json();
          
          if (result.status === 'success') {
             if (subAccId !== 'PORTFOLIO') {
                setTransactions((result.data || []).map(item => ({ ...item, type: getTypeNameTh(item.type), category: getCategoryNameTh(item.type, item.category) })));
             } else {
                setTrades(result.data || []);
                if (result.usdRate) {
                   setUsdRate(Number(result.usdRate));
                }
             }
          } else {
             subAccId === 'PORTFOLIO' ? setTrades([]) : setTransactions([]);
          }
        } catch (error) {
          console.error("Fetch API Error:", error);
          showAlert('ไม่สามารถเชื่อมต่อข้อมูลจาก Sheet ได้');
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        if (activeSubAccount) {
           loadDataFromSheet(activeSubAccount);
        }
      }, [activeSubAccount]);


      const sendDataToSheet = async (dataPayload, action = 'add') => {
        setIsLoading(true);
        try {
          let payloadToSave = { ...dataPayload, action };
          if (payloadToSave.sheetType !== 'invest' && payloadToSave.type) {
             payloadToSave.category = getCategoryNameTh(payloadToSave.type, payloadToSave.category);
             payloadToSave.type = getTypeNameTh(payloadToSave.type);
          }
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payloadToSave)
          });
          const result = await response.json();
          if (result.status !== 'success') {
             showAlert('เกิดข้อผิดพลาดในการดำเนินการ: ' + result.message);
          }
        } catch (error) {
          console.error("Save Data Error:", error);
          showAlert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ ข้อมูลอาจบันทึกแบบ Offline เท่านั้น');
        } finally {
          setIsLoading(false);
        }
      };

      const { totalIncome, totalExpense, totalSaving, balance } = useMemo(() => {
        let income = 0;
        let expense = 0;
        let saving = 0;
        let investment = 0;
        let withdraw = 0;

        userTransactions.forEach(curr => {
          if (curr.type === 'income') {
            income += curr.amount;
          } else if (curr.type === 'expense') {
            expense += curr.amount;
          } else if (curr.type === 'saving') {
            if (curr.category !== 'investment') {
              saving += curr.amount;
            } else {
              investment += curr.amount;
            }
          } else if (curr.type === 'withdraw') {
            withdraw += curr.amount;
          }
        });

        const currentBalance = income + withdraw - expense - saving - investment;
        const netSaving = saving - withdraw;

        return {
          totalIncome: income,
          totalExpense: expense,
          totalSaving: netSaving,
          balance: currentBalance
        };
      }, [userTransactions]);

      const expensesByCategory = useMemo(() => {
        const expenses = userTransactions.filter(t => t.type === 'expense');
        const grouped = expenses.reduce((acc, curr) => {
          acc[curr.category] = (acc[curr.category] || 0) + curr.amount;
          return acc;
        }, {});

        return Object.entries(grouped)
          .map(([categoryId, amount]) => {
            const categoryObj = CATEGORIES.expense.find(c => c.id === categoryId) || CATEGORIES.expense[CATEGORIES.expense.length - 1];
            return { ...categoryObj, amount, percentage: totalExpense > 0 ? (amount / totalExpense) * 100 : 0 };
          }).sort((a, b) => b.amount - a.amount);
      }, [userTransactions, totalExpense]);

      const handleAddTransaction = async (newTransaction) => {
        const transactionId = generateSequentialId(newTransaction.date, transactions);
        const payload = { ...newTransaction, id: transactionId, userId: activeUser, subAccountId: activeSubAccount };
        
        setTransactions(prev => [payload, ...prev]);
        
        let updatedBalance = balance;
        let updatedSaving = totalSaving;
        
        if (payload.type === 'income') updatedBalance += payload.amount;
        if (payload.type === 'expense') updatedBalance -= payload.amount;
        if (payload.type === 'saving') {
            updatedBalance -= payload.amount;
            if(payload.category !== 'investment') updatedSaving += payload.amount;
        }
        if (payload.type === 'withdraw') {
            updatedBalance += payload.amount;
            updatedSaving -= payload.amount;
        }
        
        const updatedTotalMoney = updatedBalance + updatedSaving;

        await sendDataToSheet({
           ...payload,
           balance: updatedBalance,
           totalSaving: updatedSaving,
           totalMoney: updatedTotalMoney
        }, 'add');
        
        if (newTransaction.type === 'saving' && newTransaction.category === 'investment' && newTransaction.portId) {
           const depositPrice = newTransaction.portId === 'lib_us' ? newTransaction.amount / usdRate : newTransaction.amount;
           const tradeId = generateSequentialId(newTransaction.date, trades);

           const newTrade = {
             id: tradeId,
             userId: activeUser,
             portId: newTransaction.portId,
             symbol: 'รายการฝากเงิน',
             type: 'DEPOSIT',
             units: 0,
             price: depositPrice,
             date: newTransaction.date
           };
           
           setTrades(prev => [newTrade, ...prev]);
           await sendDataToSheet({ ...newTrade, sheetType: 'invest' }, 'add');
        }
        
        setActiveTab('dashboard');
      };

      const handleDeleteTransaction = (id) => {
        showConfirm('คุณแน่ใจหรือไม่ว่าต้องการลบรายการนี้?', async () => {
          setTransactions(prev => prev.filter(t => t.id !== id));
          await sendDataToSheet({ id, subAccountId: activeSubAccount }, 'delete');
        });
      };

      const handleLogin = (userId, firstSubAccount) => {
        setActiveUser(userId);
        setActiveSubAccount(firstSubAccount);
      };

      const renderContent = () => {
        if (isAdminMode) {
          return <AdminPanel accounts={accounts} setAccounts={setAccounts} onExit={() => setIsAdminMode(false)} showConfirm={showConfirm} showAlert={showAlert} />;
        }

        if (!activeUser) {
          return (
            <div className="min-h-[100dvh] bg-slate-50 relative flex flex-col items-center justify-center p-6 overflow-hidden">
              <div className="blob-1 absolute top-1/4 -left-10 md:left-20 w-72 h-72 bg-blue-300 rounded-full mix-blend-multiply filter blur-[80px] opacity-40"></div>
              <div className="blob-2 absolute top-1/3 -right-10 md:right-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-[80px] opacity-40"></div>
              
              <div className="relative z-10 w-full max-w-2xl flex flex-col items-center">
                <div className="text-center mb-12 animate-in fade-in duration-700 relative">
                  <button 
                    onClick={() => setShowPinModal(true)} 
                    className="inline-flex items-center justify-center w-20 h-20 bg-white/60 backdrop-blur-xl rounded-[2rem] shadow-xl shadow-slate-200/50 mb-6 border border-white/50 hover:scale-105 transition-all"
                    title="จัดการบัญชี (Admin)"
                  >
                    <Icon name="account_balance_wallet" className="text-[40px] text-indigo-600" />
                  </button>
                  <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-800 to-slate-600 mb-3 tracking-tight">Smart Money</h1>
                  <p className="text-slate-500 font-medium text-lg">เลือกบัญชีผู้ใช้งานของคุณ</p>
                </div>

                <div className="flex flex-wrap justify-center gap-6 sm:gap-10 w-full animate-in fade-in duration-1000 delay-150">
                  {accounts.map((acc, idx) => {
                    const theme = getProfileTheme(idx);
                    return (
                      <button key={acc.id} onClick={() => handleLogin(acc.id, acc.subAccounts[0])} className="group flex flex-col items-center gap-5 transition-all duration-300 hover:-translate-y-2">
                        <div className="relative">
                          <div className={`absolute inset-0 bg-gradient-to-br ${theme.from} ${theme.to} rounded-[2.5rem] rotate-6 group-hover:rotate-12 transition-transform duration-300 opacity-20 group-hover:opacity-40 blur-sm`}></div>
                          <div className={`w-24 h-24 sm:w-28 sm:h-28 bg-white rounded-[2.5rem] shadow-xl ${theme.shadow} border-2 border-white/50 flex items-center justify-center relative z-10 overflow-hidden transition-shadow duration-300 backdrop-blur-sm`}>
                            <span className={`text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br ${theme.text} relative z-20 uppercase`}>{acc.id}</span>
                          </div>
                        </div>
                        <div className="flex flex-col items-center">
                          <span className="font-bold text-lg text-slate-800 transition-colors">{acc.name}</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {showPinModal && <PinModal onClose={() => setShowPinModal(false)} onSuccess={() => setIsAdminMode(true)} showAlert={showAlert} />}
            </div>
          );
        }

        return (
          <div className="h-[100dvh] bg-slate-50 flex flex-col overflow-hidden relative">
            
            {isLoading && (
               <div className="absolute inset-0 z-[999] bg-white/50 backdrop-blur-sm flex flex-col items-center justify-center">
                  <div className="loader mb-4"></div>
                  <p className="font-bold text-indigo-600 text-sm">กำลังเชื่อมต่อข้อมูล...</p>
               </div>
            )}

            <header className="bg-white shadow-sm px-4 sm:px-6 py-4 flex-shrink-0 z-10">
              <div className="max-w-3xl mx-auto flex justify-between items-center">
                <button onClick={() => { setActiveUser(null); setActiveTab('dashboard'); }} className="flex items-center gap-2 text-left hover:opacity-80 transition-opacity" title="กลับไปหน้าเลือกบัญชี">
                  <Icon name="account_balance_wallet" className="text-[24px] text-indigo-600" />
                  <h1 className="text-xl font-bold hidden sm:block text-slate-800">Smart Money</h1>
                  <span className={`text-xs sm:text-sm font-bold px-3 py-1 rounded-full ml-1 bg-indigo-100 text-indigo-700`}>{currentUser?.name}</span>
                </button>
                <div className="flex items-center gap-3">
                  <button onClick={() => { setActiveUser(null); setActiveTab('dashboard'); }} className="flex items-center gap-1.5 text-xs sm:text-sm font-semibold text-slate-500 hover:text-red-500 bg-slate-50 px-3 py-1.5 rounded-lg transition-colors">
                    <Icon name="logout" className="text-[16px]" />
                    <span className="hidden sm:inline">ออกระบบ</span>
                  </button>
                </div>
              </div>
              
              {currentUser && (
                <div className="max-w-3xl mx-auto mt-4 flex gap-2 overflow-x-auto hide-scroll pb-1">
                  {currentUser.subAccounts.map((sub, idx) => (
                    <button key={sub} onClick={() => { setActiveSubAccount(sub); setActiveTab('dashboard'); }}
                      className={`px-4 py-1.5 text-xs sm:text-sm font-bold rounded-full transition-colors whitespace-nowrap flex items-center gap-1 ${activeSubAccount === sub ? 'bg-indigo-100 text-indigo-700 border border-indigo-200 shadow-sm' : 'bg-slate-50 text-slate-500 hover:bg-slate-100 border border-transparent'}`}
                    >
                      <Icon name="account_balance_wallet" className="text-[16px]" />
                      บัญชี {sub} {idx === 0 ? '(หลัก)' : ''}
                    </button>
                  ))}
                  
                  {activeUser === 'M' && (
                    <button onClick={() => { setActiveSubAccount('PORTFOLIO'); setActiveTab('dashboard'); }}
                      className={`px-4 py-1.5 text-xs sm:text-sm font-bold rounded-full transition-colors whitespace-nowrap flex items-center gap-1 ${activeSubAccount === 'PORTFOLIO' ? 'bg-indigo-800 text-white shadow-md' : 'bg-slate-50 text-slate-500 hover:bg-slate-100 border border-transparent'}`}
                    >
                      <Icon name="monitoring" className="text-[16px]" /> พอร์ตการลงทุน
                    </button>
                  )}
                </div>
              )}
            </header>

            <main className="flex-1 w-full max-w-3xl mx-auto overflow-y-auto custom-scrollbar">
              <div className="p-4 md:p-6 pb-6">
                {activeTab === 'dashboard' && activeSubAccount !== 'PORTFOLIO' && <Dashboard balance={balance} totalIncome={totalIncome} totalExpense={totalExpense} totalSaving={totalSaving} expensesByCategory={expensesByCategory} transactions={userTransactions} onEditTransaction={setEditingTransaction} onDeleteTransaction={handleDeleteTransaction} />}
                
                {activeTab === 'dashboard' && activeSubAccount === 'PORTFOLIO' && activeUser === 'M' && (
                  <PortfolioDashboard 
                    trades={trades} 
                    setTrades={setTrades} 
                    marketPrices={marketPrices} 
                    setMarketPrices={setMarketPrices} 
                    portNames={PORT_NAMES} 
                    activeUser={activeUser}
                    mainSubAccount={currentUser.subAccounts[0]}
                    transactions={transactions}
                    setTransactions={setTransactions}
                    usdRate={usdRate}
                    showConfirm={showConfirm}
                    showAlert={showAlert}
                    sendDataToSheet={sendDataToSheet}
                  />
                )}
                
                {activeTab === 'add' && <AddTransactionForm onSave={handleAddTransaction} usdRate={usdRate} showAlert={showAlert} totalSaving={totalSaving} balance={balance} />}
                {activeTab === 'history' && <TransactionHistory transactions={userTransactions} onEdit={setEditingTransaction} onDelete={handleDeleteTransaction} />}
              </div>
            </main>

            {editingTransaction && activeSubAccount !== 'PORTFOLIO' && (
              <AddTransactionForm 
                isModal 
                initialData={editingTransaction}
                usdRate={usdRate}
                showAlert={showAlert}
                totalSaving={totalSaving}
                balance={balance}
                onClose={() => setEditingTransaction(null)}
                onSave={async (updatedData) => {
                  const updatedTrans = { ...editingTransaction, ...updatedData };
                  
                  let newBalance = balance;
                  let newSaving = totalSaving;
                  
                  // Revert old transaction
                  if (editingTransaction.type === 'income') newBalance -= editingTransaction.amount;
                  if (editingTransaction.type === 'expense') newBalance += editingTransaction.amount;
                  if (editingTransaction.type === 'saving') {
                      newBalance += editingTransaction.amount;
                      if(editingTransaction.category !== 'investment') newSaving -= editingTransaction.amount;
                  }
                  if (editingTransaction.type === 'withdraw') {
                      newBalance -= editingTransaction.amount;
                      newSaving += editingTransaction.amount;
                  }
                  
                  // Apply new transaction
                  if (updatedTrans.type === 'income') newBalance += updatedTrans.amount;
                  if (updatedTrans.type === 'expense') newBalance -= updatedTrans.amount;
                  if (updatedTrans.type === 'saving') {
                      newBalance -= updatedTrans.amount;
                      if(updatedTrans.category !== 'investment') newSaving += updatedTrans.amount;
                  }
                  if (updatedTrans.type === 'withdraw') {
                      newBalance += updatedTrans.amount;
                      newSaving -= updatedTrans.amount;
                  }
                  
                  const newTotalMoney = newBalance + newSaving;

                  updatedTrans.balance = newBalance;
                  updatedTrans.totalSaving = newSaving;
                  updatedTrans.totalMoney = newTotalMoney; 

                  setTransactions(prev => prev.map(t => t.id === editingTransaction.id ? updatedTrans : t));
                  setEditingTransaction(null);
                  
                  await sendDataToSheet(updatedTrans, 'edit');
                }}
              />
            )}

            {activeSubAccount !== 'PORTFOLIO' && (
              <nav className="bg-white border-t border-slate-200 flex-shrink-0 w-full z-20 pb-safe">
                <div className="max-w-3xl mx-auto flex justify-around">
                  <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center py-3 px-2 sm:px-6 w-full transition-colors ${activeTab === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}`}>
                    <Icon name="home" className="text-[24px] mb-1" />
                    <span className="text-[10px] sm:text-xs font-bold">หน้าแรก</span>
                  </button>
                  <button onClick={() => setActiveTab('add')} className="flex flex-col items-center justify-center py-2 px-2 sm:px-6 w-full relative">
                    <div className={`absolute -top-5 p-3 rounded-full shadow-lg text-white transition-transform ${activeTab === 'add' ? 'bg-indigo-700 scale-110' : 'bg-indigo-500'}`}>
                      <Icon name="add_circle" className="text-[24px]" />
                    </div>
                    <span className={`text-[10px] sm:text-xs font-bold mt-8 ${activeTab === 'add' ? 'text-indigo-600' : 'text-slate-400'}`}>เพิ่มรายการ</span>
                  </button>
                  <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center py-3 px-2 sm:px-6 w-full transition-colors ${activeTab === 'history' ? 'text-indigo-600' : 'text-slate-400'}`}>
                    <Icon name="format_list_bulleted" className="text-[24px] mb-1" />
                    <span className="text-[10px] sm:text-xs font-bold">ประวัติ</span>
                  </button>
                </div>
              </nav>
            )}
          </div>
        );
      };

      return (
        <>
          {renderContent()}
          <CustomDialog {...dialog} onClose={() => setDialog(prev => ({ ...prev, isOpen: false }))} />
        </>
      );
    }

    // ==========================================
    // PORTFOLIO MODULE
    // ==========================================
    
    function PortfolioDashboard({ trades, setTrades, marketPrices, setMarketPrices, portNames, activeUser, mainSubAccount, transactions, setTransactions, usdRate, showConfirm, showAlert, sendDataToSheet }) {
      const [activePort, setActivePort] = useState('all');
      const [viewTab, setViewTab] = useState('assets');
      const [showTradeModal, setShowTradeModal] = useState(false);
      const [editingTrade, setEditingTrade] = useState(null);

      const [timeFilter, setTimeFilter] = useState('all'); 
      const [typeFilter, setTypeFilter] = useState('ALL'); 
      const [sortConfig, setSortConfig] = useState({ key: 'symbol', direction: 'asc' });
      const [searchQuery, setSearchQuery] = useState(''); 
      const [historySortConfig, setHistorySortConfig] = useState({ key: 'date', direction: 'desc' }); 

      const ledger = useMemo(() => {
        let holdings = {}; 
        let realized = []; 
        let enrichedTrades = []; 
        let cash = {};
        let lastTradedPrice = {}; 

        const sortedTrades = [...trades].sort((a,b) => {
          const dateDiff = new Date(a.date) - new Date(b.date);
          if (dateDiff !== 0) return dateDiff;
          return String(a.id).localeCompare(String(b.id));
        });

        sortedTrades.forEach(t => {
          if (!holdings[t.portId]) holdings[t.portId] = {};
          if (!cash[t.portId]) cash[t.portId] = 0;

          let h = holdings[t.portId][t.symbol] || { units: 0, avgCost: 0, sheetPrice: 0 };
          let enrichedTrade = { ...t }; 

          // เก็บราคาปัจจุบันที่ส่งมาจาก Google Sheet (คอลัมน์ H: price.now)
          if (t.price_now && t.price_now > 0) {
             h.sheetPrice = Number(t.price_now);
          }

          if (t.type === 'BUY') {
            const baseCost = t.units * t.price;
            const totalCost = baseCost; // ไม่คิดค่าคอม
            const prevBaseCost = h.units * h.avgCost; 
            h.units += t.units;
            h.avgCost = (prevBaseCost + baseCost) / h.units; // ต้นทุนเฉลี่ยเพียวๆ ไม่บวกค่าคอม
            
            cash[t.portId] -= totalCost; 
            holdings[t.portId][t.symbol] = h;
            lastTradedPrice[t.symbol] = t.price;
          } else if (t.type === 'SELL') {
            const baseRevenue = t.units * t.price;
            const netRevenue = baseRevenue; // ไม่คิดค่าคอม
            const costOfSold = t.units * h.avgCost; // ต้นทุนเดิมไม่รวมค่าคอม
            const profit = netRevenue - costOfSold; // กำไรสุทธิ
            
            enrichedTrade.profit = profit;
            enrichedTrade.avgCostAtSell = h.avgCost;
            
            realized.push(enrichedTrade);
            h.units -= t.units;
            if (h.units <= 0) { h.units = 0; h.avgCost = 0; }
            cash[t.portId] += netRevenue;
            holdings[t.portId][t.symbol] = h;
            lastTradedPrice[t.symbol] = t.price;
          } else if (t.type === 'DIVIDEND') {
            const dividendUnits = t.units || h.units;
            const dividendValue = dividendUnits * t.price;
            enrichedTrade.profit = dividendValue;
            enrichedTrade.units = dividendUnits; 
            realized.push(enrichedTrade);
            cash[t.portId] += dividendValue;
          } else if (t.type === 'DEPOSIT') {
            cash[t.portId] += t.price;
          } else if (t.type === 'WITHDRAW') {
            cash[t.portId] -= t.price;
          }
          enrichedTrades.push(enrichedTrade);
        });

        return { holdings, realized, enrichedTrades, cash, lastTradedPrice };
      }, [trades]);

      const profitStats = useMemo(() => {
        const todayStr = new Date().toISOString().split('T')[0];
        const currentMonth = new Date().getMonth();
        const currentYear = new Date().getFullYear();

        let today = 0, month = 0, year = 0, dividendYear = 0;

        ledger.realized.forEach(r => {
          if (activePort !== 'all' && r.portId !== activePort) return;
          const d = new Date(r.date);
          const isCurrentYear = d.getFullYear() === currentYear;

          let profit = r.profit;
          if (activePort === 'all' && r.portId === 'lib_us') {
            profit = profit * usdRate;
          }

          if (r.type === 'SELL') {
            if (r.date === todayStr) today += profit;
            if (d.getMonth() === currentMonth && isCurrentYear) month += profit;
            if (isCurrentYear) year += profit;
          } else if (r.type === 'DIVIDEND') {
            if (isCurrentYear) dividendYear += profit;
          }
        });

        return { today, month, year, dividendYear };
      }, [ledger.realized, activePort, usdRate]);

      const portSummary = useMemo(() => {
        let totalValueTHB = 0;
        let totalCostTHB = 0;
        let totalValueUSD = 0; 
        let totalCashTHB = 0;
        let assetsList = [];

        Object.keys(ledger.holdings).forEach(portId => {
          if (activePort !== 'all' && portId !== activePort) return;
          
          Object.keys(ledger.holdings[portId]).forEach(symbol => {
            const h = ledger.holdings[portId][symbol];
            if (h.units > 0) {
              // ลำดับความสำคัญ: ราคาจาก Sheet > ราคาจาก API (ถ้ามี) > ราคาเทรดล่าสุด > ต้นทุนเฉลี่ย
              let currentPrice = h.sheetPrice > 0 ? h.sheetPrice : (marketPrices[symbol] || ledger.lastTradedPrice[symbol] || h.avgCost);

              const value = h.units * currentPrice;
              const cost = h.units * h.avgCost;
              
              if (portId === 'lib_us') {
                totalValueUSD += value;
                totalValueTHB += value * usdRate;
                totalCostTHB += cost * usdRate;
              } else {
                totalValueTHB += value;
                totalCostTHB += cost;
              }

              assetsList.push({ portId, symbol, units: h.units, avgCost: h.avgCost, currentPrice, value, cost, isCash: false });
            }
          });
        });

        Object.keys(ledger.cash).forEach(portId => {
          if (activePort !== 'all' && portId !== activePort) return;
          const portCash = ledger.cash[portId];
          if (portCash !== 0) {
            if (portId === 'lib_us') {
              totalCashTHB += portCash * usdRate;
            } else {
              totalCashTHB += portCash;
            }
          }
        });

        const unrealizedProfitTHB = totalValueTHB - totalCostTHB;
        return { totalValue: totalValueTHB, totalCost: totalCostTHB, unrealizedProfit: unrealizedProfitTHB, totalValueUSD, totalCash: totalCashTHB, assetsList };
      }, [ledger.holdings, ledger.cash, marketPrices, activePort, usdRate]);

      const sortedAssets = useMemo(() => {
        let sortableItems = [...portSummary.assetsList];
        if (sortConfig !== null) {
          sortableItems.sort((a, b) => {
            let aValue = a[sortConfig.key];
            let bValue = b[sortConfig.key];

            if (sortConfig.key === 'pl') {
              const aPL = a.value - a.cost;
              const bPL = b.value - b.cost;
              aValue = a.portId === 'lib_us' ? aPL * usdRate : aPL;
              bValue = b.portId === 'lib_us' ? bPL * usdRate : bPL;
            } else if (sortConfig.key === 'symbol') {
              return sortConfig.direction === 'asc' 
                ? a.symbol.localeCompare(b.symbol)
                : b.symbol.localeCompare(a.symbol);
            } else if (sortConfig.key === 'avgCost' || sortConfig.key === 'currentPrice') {
              aValue = a.portId === 'lib_us' ? a[sortConfig.key] * usdRate : a[sortConfig.key];
              bValue = b.portId === 'lib_us' ? b[sortConfig.key] * usdRate : b[sortConfig.key];
            }

            if (aValue < bValue) {
              return sortConfig.direction === 'asc' ? -1 : 1;
            }
            if (aValue > bValue) {
              return sortConfig.direction === 'asc' ? 1 : -1;
            }
            return 0;
          });
        }
        return sortableItems;
      }, [portSummary.assetsList, sortConfig, usdRate]);

      const filteredAssets = useMemo(() => {
        return sortedAssets.filter(a => a.symbol.toLowerCase().includes(searchQuery.toLowerCase()));
      }, [sortedAssets, searchQuery]);

      const requestSort = (key) => {
        let direction = 'asc';
        if (sortConfig && sortConfig.key === key && sortConfig.direction === 'asc') {
          direction = 'desc';
        }
        setSortConfig({ key, direction });
      };

      const requestHistorySort = (key) => {
        let direction = 'asc';
        if (historySortConfig && historySortConfig.key === key && historySortConfig.direction === 'asc') {
          direction = 'desc';
        }
        setHistorySortConfig({ key, direction });
      };

      const getSortIcon = (key) => {
        if (!sortConfig || sortConfig.key !== key) {
          return <Icon name="unfold_more" className="text-[14px] text-slate-300 ml-1" />;
        }
        return sortConfig.direction === 'asc' 
          ? <Icon name="keyboard_arrow_up" className="text-[14px] text-indigo-600 ml-1" />
          : <Icon name="keyboard_arrow_down" className="text-[14px] text-indigo-600 ml-1" />;
      };

      const getHistorySortIcon = (key) => {
        if (!historySortConfig || historySortConfig.key !== key) {
          return <Icon name="unfold_more" className="text-[14px] text-slate-300 ml-1" />;
        }
        return historySortConfig.direction === 'asc' 
          ? <Icon name="keyboard_arrow_up" className="text-[14px] text-indigo-600 ml-1" />
          : <Icon name="keyboard_arrow_down" className="text-[14px] text-indigo-600 ml-1" />;
      };

      const filteredHistory = useMemo(() => {
        let items = ledger.enrichedTrades.filter(t => {
          if (activePort !== 'all' && t.portId !== activePort) return false;
          
          if (typeFilter === 'BS' && (t.type !== 'BUY' && t.type !== 'SELL')) return false;
          if (typeFilter === 'DIVIDEND' && t.type !== 'DIVIDEND') return false;
          if (typeFilter === 'TRANSFER' && t.type !== 'DEPOSIT' && t.type !== 'WITHDRAW') return false;
          
          if (timeFilter !== 'all') {
            const d = new Date(t.date);
            const today = new Date();
            if (timeFilter === 'daily') return t.date === today.toISOString().split('T')[0];
            if (timeFilter === 'monthly') return d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
            if (timeFilter === 'yearly') return d.getFullYear() === today.getFullYear();
          }
          
          if (searchQuery && t.symbol && t.symbol.toLowerCase().indexOf(searchQuery.toLowerCase()) === -1) {
            if (t.symbol !== 'รายการฝากเงิน' && t.symbol !== 'รายการถอนเงิน') {
               return false;
            }
          }
          
          return true;
        });

        if (historySortConfig !== null) {
          items.sort((a, b) => {
            if (historySortConfig.key === 'symbol') {
              const symDiff = historySortConfig.direction === 'asc' 
                ? a.symbol.localeCompare(b.symbol)
                : b.symbol.localeCompare(a.symbol);
              if (symDiff !== 0) return symDiff;
              return String(b.id).localeCompare(String(a.id));
            } else if (historySortConfig.key === 'date') {
               const dateDiff = historySortConfig.direction === 'asc' 
                 ? new Date(a.date) - new Date(b.date)
                 : new Date(b.date) - new Date(a.date);
               if (dateDiff !== 0) return dateDiff;
               return historySortConfig.direction === 'asc'
                 ? String(a.id).localeCompare(String(b.id))
                 : String(b.id).localeCompare(String(a.id));
            } else if (historySortConfig.key === 'units') {
               const aVal = a.units || 0;
               const bVal = b.units || 0;
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            } else if (historySortConfig.key === 'price') {
               const aVal = a.portId === 'lib_us' ? a.price * usdRate : a.price;
               const bVal = b.portId === 'lib_us' ? b.price * usdRate : b.price;
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            } else if (historySortConfig.key === 'value') {
               const getVal = (t) => {
                 if (t.type === 'DIVIDEND') return t.profit || 0;
                 if (t.type === 'DEPOSIT' || t.type === 'WITHDRAW') return t.price || 0;
                 return (t.price || 0) * (t.units || 0);
               };
               const aVal = a.portId === 'lib_us' ? getVal(a) * usdRate : getVal(a);
               const bVal = b.portId === 'lib_us' ? getVal(b) * usdRate : getVal(b);
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            } else if (historySortConfig.key === 'pl') {
               const aVal = a.profit !== undefined ? (a.portId === 'lib_us' ? a.profit * usdRate : a.profit) : -Infinity;
               const bVal = b.profit !== undefined ? (b.portId === 'lib_us' ? b.profit * usdRate : b.profit) : -Infinity;
               return historySortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
            }
            return 0;
          });
        }
        return items;
      }, [ledger.enrichedTrades, activePort, timeFilter, typeFilter, searchQuery, historySortConfig]);

      const historySummaryData = useMemo(() => {
        if (typeFilter !== 'ALL') return [];
        const grouped = {};

        filteredHistory.forEach(t => {
          const d = new Date(t.date);
          let key = '';
          let label = '';
          const thaiMonthsFull = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
          const thaiYear = d.getFullYear() + 543;

          if (timeFilter === 'daily') {
            key = t.date;
            label = `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${thaiYear}`;
          } else if (timeFilter === 'monthly') {
            key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            label = `${thaiMonthsFull[d.getMonth()]} ${thaiYear}`;
          } else if (timeFilter === 'yearly') {
            key = `${d.getFullYear()}`;
            label = `ปี ${thaiYear}`;
          } else {
            key = 'all';
            label = 'รวมทุกช่วงเวลา';
          }

          if (!grouped[key]) {
            grouped[key] = { key, label, profit: 0, dividend: 0 };
          }

          let profit = t.profit || 0;
          if (activePort === 'all' && t.portId === 'lib_us') {
             profit = profit * usdRate;
          }

          if (t.type === 'SELL' && t.profit !== undefined) {
            grouped[key].profit += profit;
          } else if (t.type === 'DIVIDEND' && t.profit !== undefined) {
            grouped[key].dividend += profit;
          }
        });

        return Object.values(grouped).sort((a, b) => {
           if (a.key === 'all') return 0;
           return b.key.localeCompare(a.key); 
        });
      }, [filteredHistory, activePort, timeFilter, typeFilter, usdRate]);

      const getProfitColor = (profit) => profit > 0 ? 'text-emerald-500' : profit < 0 ? 'text-rose-500' : 'text-slate-400';

      const handleDeleteTrade = (tradeId) => {
        showConfirm('คุณแน่ใจหรือไม่ว่าต้องการลบรายการนี้?', async () => {
          setTrades(prev => prev.filter(t => t.id !== tradeId));
          await sendDataToSheet({ id: tradeId, sheetType: 'invest' }, 'delete');
        });
      };

      const handleSaveTrade = async (newTrade) => {
        const tradeId = editingTrade ? editingTrade.id : generateSequentialId(newTrade.date, trades);
        
        let remaining_units = 0;
        let realized_pl = 0;
        let status = "-";
        
        const currentAsset = ledger.holdings[newTrade.portId]?.[newTrade.symbol] || { units: 0, avgCost: 0 };
        let currentUnits = currentAsset.units;
        let avgCost = currentAsset.avgCost;

        if (editingTrade) {
            if (editingTrade.type === 'BUY') currentUnits -= editingTrade.units;
            if (editingTrade.type === 'SELL') currentUnits += editingTrade.units;
        }

        if (newTrade.type === 'BUY') {
            remaining_units = currentUnits + newTrade.units;
            status = "ยังคงเหลือ";
        } else if (newTrade.type === 'SELL') {
            remaining_units = currentUnits - newTrade.units;
            realized_pl = newTrade.units * (newTrade.price - avgCost);
            status = remaining_units > 0 ? "ยังคงเหลือ" : "ขายหมดแล้ว";
        } else if (newTrade.type === 'DIVIDEND') {
            remaining_units = currentUnits;
            realized_pl = (newTrade.units || currentUnits) * newTrade.price;
            status = remaining_units > 0 ? "ยังคงเหลือ" : "ขายหมดแล้ว";
        }

        const currentPriceNow = marketPrices[newTrade.symbol] || "";

        const payload = { 
            ...newTrade, 
            id: tradeId, 
            userId: activeUser, 
            sheetType: 'invest',
            currentPrice: currentPriceNow,    
            realized_pl: realized_pl,         
            status: status                  
        };
        
        let actionToPerform = 'add';

        if (editingTrade) {
          actionToPerform = 'edit';
          setTrades(prev => prev.map(t => t.id === editingTrade.id ? { ...newTrade, id: t.id, userId: t.userId } : t));
        } else {
          setTrades(prev => [payload, ...prev]);
        }

        if (newTrade.type === 'BUY' || newTrade.type === 'SELL') {
          setMarketPrices(prev => ({ ...prev, [newTrade.symbol]: newTrade.price }));
        }

        await sendDataToSheet(payload, actionToPerform);
        
        if (newTrade.type === 'WITHDRAW' && !editingTrade) {
          const amountTHB = newTrade.portId === 'lib_us' ? newTrade.price * usdRate : newTrade.price;
          
          const transactionId = generateSequentialId(newTrade.date, transactions);
          const newTransaction = {
            id: transactionId,
            userId: activeUser,
            subAccountId: mainSubAccount,
            type: 'income',
            amount: amountTHB,
            category: 'port_withdraw',
            date: newTrade.date,
            note: `ถอนเงินจาก ${portNames[newTrade.portId]}`
          };
          setTransactions(prev => [newTransaction, ...prev]);
          await sendDataToSheet(newTransaction, 'add');
        }
        
        setShowTradeModal(false);
        setEditingTrade(null);
      };

      return (

                                  </td>
                                </tr>
                              );
                            }
                          })}
                        </tbody>
                      </table>
                    </div>
                  )
                )}
              </div>
            </div>
          )}

          {/* Portfolio Bottom Nav */}
          <nav className="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 z-20 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div className="max-w-3xl mx-auto flex justify-around">
              <button onClick={() => setViewTab('assets')} className={`flex flex-col items-center py-3 px-2 sm:px-6 w-full transition-colors ${viewTab === 'assets' ? 'text-indigo-600' : 'text-slate-400'}`}>
                <Icon name="pie_chart" className="text-[24px] mb-1" />
                <span className="text-[10px] sm:text-xs font-bold">สินทรัพย์</span>
              </button>
              
              {activePort !== 'all' ? (
                <button onClick={() => { setEditingTrade(null); setShowTradeModal(true); }} className="flex flex-col items-center justify-center py-2 px-2 sm:px-6 w-full relative">
                  <div className={`absolute -top-5 p-3 rounded-full shadow-lg text-white transition-transform ${showTradeModal ? 'bg-indigo-700 scale-110' : 'bg-indigo-500'}`}>
                    <Icon name="add_circle" className="text-[24px]" />
                  </div>
                  <span className={`text-[10px] sm:text-xs font-bold mt-8 ${showTradeModal ? 'text-indigo-600' : 'text-slate-400'}`}>บันทึกเทรด</span>
                </button>
              ) : (
                <div className="w-full"></div>
              )}

              <button onClick={() => setViewTab('history')} className={`flex flex-col items-center py-3 px-2 sm:px-6 w-full transition-colors ${viewTab === 'history' ? 'text-indigo-600' : 'text-slate-400'}`}>
                <Icon name="format_list_bulleted" className="text-[24px] mb-1" />
                <span className="text-[10px] sm:text-xs font-bold">ประวัติ</span>
              </button>
            </div>
          </nav>

          {/* Trade Modal */}
          {showTradeModal && (activePort !== 'all' || editingTrade) && (
            <TradeModal 
              activePortId={editingTrade ? editingTrade.portId : activePort}
              portNames={portNames}
              currentPriceMap={marketPrices}
              holdings={ledger.holdings} 
              cashMap={ledger.cash}
              initialData={editingTrade}
              showAlert={showAlert}
              onClose={() => { setShowTradeModal(false); setEditingTrade(null); }}
              onSave={handleSaveTrade}
            />
          )}

        </div>
      );
    }

    function TradeModal({ activePortId, portNames, currentPriceMap, holdings, cashMap, onClose, onSave, initialData, showAlert }) {
      const [type, setType] = useState(initialData?.type || 'BUY'); 
      const portId = initialData?.portId || activePortId; 
      const [symbol, setSymbol] = useState(initialData?.symbol === 'รายการถอนเงิน' || initialData?.symbol === 'รายการฝากเงิน' ? '' : (initialData?.symbol || ''));
      const [units, setUnits] = useState(initialData != null ? initialData.units : '');
      const [price, setPrice] = useState(initialData != null ? initialData.price : '');
      const [date, setDate] = useState(initialData?.date || new Date().toISOString().split('T')[0]);

      const availableAssets = useMemo(() => {
        let assetsMap = new Map();
        if (holdings[portId]) {
          Object.entries(holdings[portId]).forEach(([sym, data]) => {
            if (data.units > 0) assetsMap.set(sym, data.units);
          });
        }
        if (initialData && initialData.type === 'SELL') {
           const sym = initialData.symbol;
           assetsMap.set(sym, (assetsMap.get(sym) || 0) + initialData.units);
        } else if (initialData && initialData.type === 'DIVIDEND') {
           const sym = initialData.symbol;
           if (!assetsMap.has(sym)) assetsMap.set(sym, 0);
        }
        return Array.from(assetsMap.entries()).map(([sym, u]) => ({ symbol: sym, units: u }));
      }, [holdings, portId, initialData]);

      const isFirstMount = useRef(true);
      useEffect(() => {
        if (isFirstMount.current) {
          isFirstMount.current = false;
          return;
        }
        if (!initialData) {
          setSymbol('');
          setUnits('');
          setPrice('');
          if ((type === 'SELL' || type === 'DIVIDEND') && availableAssets.length > 0) {
             setSymbol(availableAssets[0].symbol); 
          }
        }
      }, [type, portId, availableAssets, initialData]);

      useEffect(() => {
        if (['BUY', 'SELL'].includes(type) && symbol.trim().toUpperCase() && !price && !initialData) {
          const sym = symbol.trim().toUpperCase();
          const holding = holdings[portId]?.[sym];
          if (holding && holding.sheetPrice) {
             setPrice(holding.sheetPrice);
          } else if (currentPriceMap[sym]) {
             setPrice(currentPriceMap[sym]);
          }
        }
      }, [symbol, type, currentPriceMap, holdings, portId, price, initialData]);

      const effectiveCash = useMemo(() => {
          let cash = cashMap[portId] || 0;
          // คืนค่าเงินสดกลับมาให้คำนวณใหม่หากเป็นการแก้ไขรายการเดิม
          if (initialData && initialData.portId === portId) {
              if (initialData.type === 'BUY') cash += (initialData.units * initialData.price);
              if (initialData.type === 'SELL') cash -= (initialData.units * initialData.price);
          }
          return cash;
      }, [cashMap, portId, initialData]);

      const handleSubmit = (e) => {
        e.preventDefault();
        const parsedUnits = parseFloat(units) || 0;
        const parsedPrice = parseFloat(price);
        
        if (!parsedPrice || parsedPrice <= 0) return showAlert('กรุณากรอกจำนวนเงิน/Cost ให้มากกว่า 0');

        if (['BUY', 'SELL'].includes(type)) {
          if (!symbol || !parsedUnits || parsedUnits <= 0) return showAlert('กรุณากรอกชื่อหุ้นและจำนวนให้ถูกต้อง');
          if (type === 'SELL') {
            let assetHolding = holdings[portId]?.[symbol.toUpperCase().trim()]?.units || 0;
            if (initialData && initialData.type === 'SELL' && initialData.symbol === symbol.toUpperCase().trim()) {
               assetHolding += initialData.units;
            }
            if (parsedUnits > assetHolding) {
               return showAlert(`ไม่สามารถขายได้! คุณมีหุ้น ${symbol.toUpperCase().trim()} เพียง ${formatNumber(assetHolding)} หุ้น`);
            }
          } else if (type === 'BUY') {
            const totalCost = parsedUnits * parsedPrice;
            if (totalCost > effectiveCash) {
                const formattedCash = portId === 'lib_us' ? formatUSD(effectiveCash) : formatCurrency(effectiveCash);
                return showAlert(`เงินสดในพอร์ตไม่พอ! พอร์ตนี้มีเงินสดให้เทรดเพียง ${formattedCash}`);
            }
          }
          onSave({ type, portId, symbol: symbol.toUpperCase().trim(), units: parsedUnits, price: parsedPrice, date });
        } else if (type === 'DIVIDEND') {
          if (!symbol) return showAlert('กรุณาเลือกหุ้นที่ต้องการรับปันผล');
          onSave({ type, portId, symbol: symbol.toUpperCase().trim(), units: parsedUnits, price: parsedPrice, date });
        } else if (type === 'DEPOSIT') {
          onSave({ type, portId, symbol: 'รายการฝากเงิน', units: 0, price: parsedPrice, date });
        } else {
          onSave({ type, portId, symbol: 'รายการถอนเงิน', units: 0, price: parsedPrice, date });
        }
      };

      const selectedAssetHolding = useMemo(() => {
        if ((type !== 'SELL' && type !== 'DIVIDEND') || !symbol) return 0;
        let currentUnits = holdings[portId]?.[symbol.toUpperCase().trim()]?.units || 0;
        if (initialData && initialData.type === 'SELL' && initialData.symbol === symbol.toUpperCase().trim()) {
           currentUnits += initialData.units;
        }
        return currentUnits;
      }, [type, portId, symbol, holdings, initialData]);

      const btnLabels = {
        BUY: 'ซื้อหุ้น',
        SELL: 'ขายหุ้น',
        DIVIDEND: 'รับปันผล',
        DEPOSIT: 'ฝากเงินเข้า',
        WITHDRAW: 'ถอนเงินออก'
      };

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/50 backdrop-blur-sm animate-in fade-in">
          <div className="bg-white w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl shadow-2xl p-6 animate-in slide-in-from-bottom-8">
            <div className="flex justify-between items-center mb-6">
              <div>
                <h2 className="text-xl font-black text-slate-800">บันทึกรายการเทรด</h2>
                <p className="text-xs text-indigo-600 font-bold mt-1">พอร์ต: {portNames[portId]}</p>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full"><Icon name="close" /></button>
            </div>

            <form onSubmit={handleSubmit} className="space-y-5">
              
              <div className="grid grid-cols-5 gap-1 bg-slate-100 p-1 rounded-xl">
                <button type="button" onClick={() => setType('BUY')} className={`py-2 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'BUY' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>ซื้อ</button>
                <button type="button" onClick={() => setType('SELL')} className={`py-2 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'SELL' ? 'bg-white shadow-sm text-rose-600' : 'text-slate-500'}`}>ขาย</button>
                <button type="button" onClick={() => setType('DIVIDEND')} className={`py-2 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'DIVIDEND' ? 'bg-white shadow-sm text-amber-600' : 'text-slate-500'}`}>ปันผล</button>
                <button type="button" onClick={() => setType('DEPOSIT')} className={`py-2 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'DEPOSIT' ? 'bg-white shadow-sm text-teal-600' : 'text-slate-500'}`}>ฝาก</button>
                <button type="button" onClick={() => setType('WITHDRAW')} className={`py-2 font-bold text-[10px] sm:text-xs rounded-lg transition-all ${type === 'WITHDRAW' ? 'bg-white shadow-sm text-orange-600' : 'text-slate-500'}`}>ถอน</button>
              </div>

              {type !== 'WITHDRAW' && type !== 'DEPOSIT' && (
                <div>
                  <div className="flex justify-between items-end mb-1">
                     <label className="block text-xs font-bold text-slate-500">ชื่อหุ้น (Symbol)</label>
                     {(type === 'SELL' || type === 'DIVIDEND') && symbol && (
                        <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">
                          มีในพอร์ต: {formatNumber(selectedAssetHolding)} หุ้น
                        </span>
                     )}
                     {type === 'BUY' && (
                        <span className="text-[10px] font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded">
                          เงินสด: {portId === 'lib_us' ? formatUSD(effectiveCash) : formatCurrency(effectiveCash)}
                        </span>
                     )}
                  </div>

                  {type === 'BUY' ? (
                    <input type="text" value={symbol} onChange={e => setSymbol(e.target.value)} placeholder="เช่น PTT, AAPL" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold uppercase text-slate-800 outline-none focus:border-indigo-500" required />
                  ) : (
                    <select 
                      value={symbol} 
                      onChange={e => setSymbol(e.target.value)} 
                      className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold uppercase text-slate-800 outline-none focus:border-indigo-500" 
                      required
                    >
                      {availableAssets.length === 0 ? (
                         <option value="">-- ไม่มีหุ้นในพอร์ตนี้ --</option>
                      ) : (
                         availableAssets.map(a => (
                           <option key={a.symbol} value={a.symbol}>{a.symbol} (ลิมิต {formatNumber(a.units)} หุ้น)</option>
                         ))
                      )}
                    </select>
                  )}
                </div>
              )}

              {['BUY', 'SELL', 'DIVIDEND'].includes(type) && (
                <div className="flex gap-3">
                  <div className="flex-1">
                    <div className="flex justify-between items-end mb-1 gap-1">
                      <label className="block text-xs font-bold text-slate-500">จำนวนหุ้น</label>
                      {(type === 'SELL' || type === 'DIVIDEND') && symbol && (
                        <button 
                          type="button" 
                          onClick={() => setUnits(selectedAssetHolding)} 
                          className="text-[9px] font-bold text-indigo-700 bg-indigo-100 hover:bg-indigo-200 px-1.5 py-0.5 rounded whitespace-nowrap transition-colors"
                        >
                          ทั้งหมดในพอร์ต
                        </button>
                      )}
                    </div>
                    <input 
                      type="number" min="0" step="0.000001" 
                      max={type === 'SELL' ? selectedAssetHolding : undefined}
                      value={units} 
                      onChange={e => {
                        let val = e.target.value;
                        if (type === 'SELL' && parseFloat(val) > selectedAssetHolding) val = selectedAssetHolding;
                        setUnits(val);
                      }} 
                      className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-indigo-500" 
                      placeholder="0" required 
                    />
                  </div>
                  <div className="flex-1">
                    <label className="block text-xs font-bold text-slate-500 mb-1">{type === 'DIVIDEND' ? 'ปันผล/หุ้น' : 'Cost/หุ้น'} ({portId === 'lib_us' ? '$' : '฿'})</label>
                    <input type="number" min="0" step="0.01" value={price} onChange={e => setPrice(e.target.value)} className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-${type === 'DIVIDEND' ? 'amber' : 'indigo'}-500`} placeholder="0.00" required />
                  </div>
                </div>
              )}

              {['WITHDRAW', 'DEPOSIT'].includes(type) && (
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">
                    จำนวนเงิน ({portId === 'lib_us' ? 'USD' : 'บาท'})
                  </label>
                  <input 
                    type="number" min="0" step="0.01" value={price} onChange={e => setPrice(e.target.value)} 
                    className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-${type === 'DEPOSIT' ? 'teal' : 'orange'}-500`} 
                    placeholder="0.00" required 
                  />
                </div>
              )}

              <div>
                <label className="block text-xs font-bold text-slate-500 mb-1">วันที่ทำรายการ</label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none focus:border-indigo-500" required />
              </div>

              <div className="pt-2">
                {['BUY', 'SELL', 'DIVIDEND'].includes(type) && (
                  <div className="flex justify-between items-center mb-4 p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <span className="text-sm font-bold text-slate-500">
                      {type === 'DIVIDEND' ? 'เงินปันผลรวม' : 'มูลค่ารวม'}
                    </span>
                    <span className="text-lg font-black text-slate-800">
                      {portId === 'lib_us' 
                        ? formatUSD(parseFloat(units||0) * parseFloat(price||0)) 
                        : formatCurrency(parseFloat(units||0) * parseFloat(price||0))}
                    </span>
                  </div>
                )}
                <button 
                  type="submit" 
                  disabled={(type === 'SELL' || type === 'DIVIDEND') && availableAssets.length === 0}
                  className={`w-full py-4 rounded-xl font-black text-white shadow-lg transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100 ${
                    type === 'BUY' ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-600/30' : 
                    type === 'SELL' ? 'bg-rose-500 hover:bg-rose-600 shadow-rose-500/30' : 
                    type === 'DIVIDEND' ? 'bg-amber-500 hover:bg-amber-600 shadow-amber-500/30' : 
                    'bg-orange-500 hover:bg-orange-600 shadow-orange-500/30'
                  }`}
                >
                  ยืนยันการ{btnLabels[type]}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function AdminPanel({ accounts, setAccounts, onExit, showConfirm, showAlert }) {
      const [selectedMainAcc, setSelectedMainAcc] = useState('B');
      const [newSubAccName, setNewSubAccName] = useState('');
      
      const [editingAccId, setEditingAccId] = useState(null);
      const [editAccName, setEditAccName] = useState('');

      const handleAddSubAccount = (e) => {
        e.preventDefault();
        const trimmedName = newSubAccName.trim().toUpperCase();
        if (!trimmedName) return;

        const acc = accounts.find(a => a.id === selectedMainAcc);
        if (acc && acc.subAccounts.includes(trimmedName)) {
            showAlert(`ไม่สามารถสร้างได้: มีบัญชีย่อยชื่อ "${trimmedName}" อยู่ในบัญชีนี้แล้ว`);
            return;
        }

        setAccounts(prev => prev.map(a => {
          if (a.id === selectedMainAcc) {
            return { ...a, subAccounts: [...a.subAccounts, trimmedName] };
          }
          return a;
        }));
        setNewSubAccName('');
      };

      const handleDeleteSubAccount = (mainId, subId) => {
        const acc = accounts.find(a => a.id === mainId);
        if (acc && acc.subAccounts.length <= 1) {
          showAlert('ไม่สามารถลบได้! ต้องมีบัญชีย่อยอย่างน้อย 1 บัญชีในแต่ละบัญชีหลัก');
          return;
        }

        showConfirm(`ยืนยันการลบบัญชีย่อย "${subId}" และข้อมูลรายการทั้งหมดของบัญชีนี้?`, () => {
          setAccounts(prev => prev.map(a => {
            if (a.id === mainId) {
              return { ...a, subAccounts: a.subAccounts.filter(s => s !== subId) };
            }
            return a;
          }));
        });
      };

      const handleSaveEditName = (id) => {
        setAccounts(accounts.map(a => a.id === id ? { ...a, name: editAccName } : a));
        setEditingAccId(null);
      };

      return (
        <div className="min-h-[100dvh] bg-slate-50 p-6 flex flex-col items-center overflow-y-auto">
          <div className="w-full max-w-lg bg-white rounded-3xl shadow-xl p-6 md:p-8 animate-in slide-in-from-bottom-8 my-auto">
            <div className="flex justify-between items-center mb-8 border-b border-slate-100 pb-4">
              <div>
                <h2 className="text-2xl font-black text-slate-800">ระบบจัดการแอดมิน</h2>
                <p className="text-sm text-slate-500 font-medium mt-1">จัดการชื่อและบัญชีย่อย</p>
              </div>
              <button onClick={onExit} className="bg-slate-100 hover:bg-slate-200 text-slate-600 p-2 rounded-xl transition-colors"><Icon name="close" /></button>
            </div>
            
            <div className="mb-8">
              <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">รายชื่อบัญชีปัจจุบัน</h3>
              <div className="space-y-4">
                {accounts.map(acc => (
                  <div key={acc.id} className="bg-slate-50 rounded-2xl border border-slate-100 p-4">
                    
                    <h4 className="font-bold text-slate-800 mb-3 flex items-center justify-between gap-2">
                      <div className="flex items-center gap-2">
                        <div className="w-8 h-8 bg-indigo-100 text-indigo-700 font-black rounded-lg flex items-center justify-center text-sm">{acc.id}</div>
                        {editingAccId === acc.id ? (
                          <input 
                            type="text" value={editAccName} onChange={e => setEditAccName(e.target.value)} 
                            className="border border-indigo-300 px-2 py-1 rounded-md w-32 outline-none focus:ring-2 focus:ring-indigo-200" 
                            autoFocus
                          />
                        ) : (
                          <span>{acc.name}</span>
                        )}
                      </div>
                      {editingAccId === acc.id ? (
                        <button onClick={() => handleSaveEditName(acc.id)} className="text-emerald-600 hover:bg-emerald-100 p-1.5 rounded-lg"><Icon name="check" className="text-[18px]" /></button>
                      ) : (
                        <button onClick={() => { setEditingAccId(acc.id); setEditAccName(acc.name); }} className="text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 p-1.5 rounded-lg"><Icon name="edit" className="text-[18px]" /></button>
                      )}
                    </h4>

                    <div className="space-y-2 pl-2 border-l-2 border-slate-200 ml-4">
                      {acc.subAccounts.map(sub => (
                        <div key={sub} className="flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border border-slate-50">
                          <span className="text-sm font-bold text-slate-600 pl-2">บัญชี {sub}</span>
                          <button 
                            onClick={() => handleDeleteSubAccount(acc.id, sub)} 
                            className="text-rose-400 hover:text-rose-600 hover:bg-rose-50 p-1.5 rounded-lg transition-colors"
                            title="ลบบัญชีย่อยนี้"
                          >
                            <Icon name="delete" className="text-[18px]" />
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <form onSubmit={handleAddSubAccount} className="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100">
              <h3 className="text-sm font-bold text-indigo-800 mb-4 flex items-center gap-2"><Icon name="add_circle" className="text-[18px]" /> เพิ่มบัญชีย่อยใหม่</h3>
              <div className="grid grid-cols-2 gap-4 mb-4">
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1">เลือกบัญชีหลัก</label>
                  <select 
                    value={selectedMainAcc} 
                    onChange={e => setSelectedMainAcc(e.target.value)} 
                    className="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-400 outline-none font-bold text-slate-700"
                  >
                    {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1">ชื่อบัญชีย่อย</label>
                  <input 
                    type="text" 
                    value={newSubAccName} 
                    onChange={e => setNewSubAccName(e.target.value)} 
                    className="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-400 outline-none uppercase font-bold text-slate-700" 
                    placeholder="เช่น B4, M3" 
                    required 
                  />
                </div>
              </div>
              <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md transition-colors">+ เพิ่มบัญชีย่อย</button>
            </form>
          </div>
        </div>

        const timeFiltered = transactions.filter(t => {
          const d = new Date(t.date);
          if (transactionFilter === 'daily') return t.date === currentDay;
          if (transactionFilter === 'monthly') return d.getMonth() === currentMonth && d.getFullYear() === currentYear;

        const sums = timeFiltered.reduce((acc, curr) => {

          if (dateDiff !== 0) return dateDiff;
