    function ComparisonChart({ transactions }) {
      const [viewType, setViewType] = useState('monthly');

      const chartData = useMemo(() => {
        const grouped = {};
        transactions.forEach(t => {
          let key;
          const d = new Date(t.date);
          if (viewType === 'daily') key = t.date;
          else if (viewType === 'monthly') key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
          else if (viewType === 'yearly') key = `${d.getFullYear()}`;

          if (!grouped[key]) grouped[key] = { key, income: 0, expense: 0, saving: 0, investment: 0, label: '' };
          if (t.type === 'income') grouped[key].income += t.amount;
          if (t.type === 'expense') grouped[key].expense += t.amount;
          if (t.type === 'saving') {
             if (t.category === 'investment') {
                 grouped[key].investment += t.amount;
             } else {
                 grouped[key].saving += t.amount;
             }
          }
        });

        const sortedData = Object.values(grouped).sort((a, b) => a.key.localeCompare(b.key));
        
        return sortedData.map(item => {
          const d = new Date(item.key);
          if (viewType === 'daily') {
            const thaiYear = d.getFullYear() + 543;
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            item.label = `${day}-${month}-${thaiYear}`;
          } else if (viewType === 'monthly') {
            const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
            item.label = `${months[d.getMonth()]} ${d.getFullYear().toString().slice(-2)}`;
          } else item.label = item.key;
          return item;
        });
      }, [transactions, viewType]);

      // ใช้ข้อมูล 5 รายการล่าสุดมาแสดงผล
      const displayChartData = useMemo(() => {
        return chartData.slice(-5);
      }, [chartData]);

      const maxValue = useMemo(() => {
        let max = 0;
        displayChartData.forEach(d => {
          if (d.income > max) max = d.income;
          if (d.expense > max) max = d.expense;
          if (d.saving > max) max = d.saving;
          if (d.investment > max) max = d.investment;
        });
        return max || 1; 
      }, [displayChartData]);

      const yAxisLabels = useMemo(() => {
        if (maxValue === 1) return ['0'];
        let magnitude = Math.pow(10, Math.floor(Math.log10(maxValue)));
        let niceMax = Math.ceil(maxValue / magnitude) * magnitude;
        
        return [
          formatNumber(niceMax),
          formatNumber(niceMax * 0.75),
          formatNumber(niceMax * 0.5),
          formatNumber(niceMax * 0.25),
          '0'
        ];
      }, [maxValue]);

      const itemsCount = Math.max(1, displayChartData.length);
      const colWidthPercentage = 100 / itemsCount;

      return (
        <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 overflow-hidden">
          <div className="flex justify-between items-center mb-4">
            <h3 className="text-lg font-bold text-gray-800">เปรียบเทียบรายการ</h3>
            <div className="flex bg-gray-100 p-1 rounded-lg">
              <button onClick={() => setViewType('daily')} className={`px-3 py-1 text-xs font-medium rounded-md transition-colors ${viewType === 'daily' ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-500 hover:text-gray-700'}`}>รายวัน</button>
              <button onClick={() => setViewType('monthly')} className={`px-3 py-1 text-xs font-medium rounded-md transition-colors ${viewType === 'monthly' ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-500 hover:text-gray-700'}`}>รายเดือน</button>
              <button onClick={() => setViewType('yearly')} className={`px-3 py-1 text-xs font-medium rounded-md transition-colors ${viewType === 'yearly' ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-500 hover:text-gray-700'}`}>รายปี</button>
            </div>
          </div>

          {displayChartData.length === 0 ? (
            <p className="text-center text-gray-400 py-6 text-sm">ไม่มีข้อมูลในกราฟ</p>
          ) : (
            <div className="flex w-full mt-6 relative">
              <div className="flex flex-col justify-between pr-2 text-[10px] text-gray-400 font-medium pb-5 w-12 flex-shrink-0 text-right z-20">
                {yAxisLabels.map((label, i) => (
                  <span key={i} className="-translate-y-1/2 block">{label}</span>
                ))}
              </div>

              <div className="flex-1 relative border-l border-r border-b border-gray-300">
                <div className="relative pt-2 h-48 w-full">
                  <div className="absolute top-2 bottom-0 left-0 right-0 flex flex-col justify-between pointer-events-none z-0">
                    <div className="w-full border-t border-dashed border-gray-200"></div>
                    <div className="w-full border-t border-dashed border-gray-200"></div>
                    <div className="w-full border-t border-dashed border-gray-200"></div>
                    <div className="w-full border-t border-dashed border-gray-200"></div>
                    <div className="w-full border-t border-transparent"></div>
                  </div>

                  <div className="flex h-full items-end relative z-10 justify-around">
                    {displayChartData.map((data, idx) => {
                      let magnitude = Math.pow(10, Math.floor(Math.log10(maxValue)));
                      let niceMax = Math.ceil(maxValue / magnitude) * magnitude;
                      const displayMax = maxValue === 1 ? 1 : niceMax;

                      return (
                        <div key={idx} className="flex justify-center h-full relative" style={{ width: `${colWidthPercentage}%` }}>
                          <div className="flex items-end justify-center w-full max-w-[60px] gap-[1px] sm:gap-1 pb-[1px] px-0.5">
                            <div className="w-full min-w-[4px] max-w-[12px] bg-green-400 rounded-t-sm relative group flex justify-center transition-all duration-500 hover:brightness-110" style={{ height: `${(data.income / displayMax) * 100}%`, minHeight: data.income > 0 ? '4px' : '0' }}>
                              <div className="absolute -top-7 bg-gray-800 text-white text-[10px] py-1 px-2 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap z-50 pointer-events-none transition-opacity shadow-md">รับ: {formatCurrency(data.income)}</div>
                            </div>
                            <div className="w-full min-w-[4px] max-w-[12px] bg-red-400 rounded-t-sm relative group flex justify-center transition-all duration-500 hover:brightness-110" style={{ height: `${(data.expense / displayMax) * 100}%`, minHeight: data.expense > 0 ? '4px' : '0' }}>
                              <div className="absolute -top-7 bg-gray-800 text-white text-[10px] py-1 px-2 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap z-50 pointer-events-none transition-opacity shadow-md">จ่าย: {formatCurrency(data.expense)}</div>
                            </div>
                            <div className="w-full min-w-[4px] max-w-[12px] bg-blue-400 rounded-t-sm relative group flex justify-center transition-all duration-500 hover:brightness-110" style={{ height: `${(data.saving / displayMax) * 100}%`, minHeight: data.saving > 0 ? '4px' : '0' }}>
                              <div className="absolute -top-7 bg-gray-800 text-white text-[10px] py-1 px-2 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap z-50 pointer-events-none transition-opacity shadow-md">เก็บ: {formatCurrency(data.saving)}</div>
                            </div>
                            <div className="w-full min-w-[4px] max-w-[12px] bg-indigo-400 rounded-t-sm relative group flex justify-center transition-all duration-500 hover:brightness-110" style={{ height: `${(data.investment / displayMax) * 100}%`, minHeight: data.investment > 0 ? '4px' : '0' }}>
                              <div className="absolute -top-7 bg-gray-800 text-white text-[10px] py-1 px-2 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap z-50 pointer-events-none transition-opacity shadow-md">ลงทุน: {formatCurrency(data.investment)}</div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="flex items-start absolute -bottom-5 left-0 right-0 justify-around">
                    {displayChartData.map((data, idx) => (
                      <div key={idx} className="flex justify-center text-center px-0.5" style={{ width: `${colWidthPercentage}%` }}>
                        <span className="text-[9px] sm:text-[10px] text-gray-500 font-medium leading-tight whitespace-nowrap text-ellipsis overflow-hidden truncate px-1 rounded-md">{data.label}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              
              <div className="flex flex-col justify-between pl-2 text-[10px] text-gray-400 font-medium pb-5 w-12 flex-shrink-0 text-left z-20">
                {yAxisLabels.map((label, i) => (
                  <span key={i} className="-translate-y-1/2 block">{label}</span>
                ))}
              </div>
            </div>
          )}
          
          <div className="flex justify-center flex-wrap gap-3 sm:gap-4 mt-8 sm:mt-10 text-[10px] sm:text-xs text-gray-600 border-t border-gray-100 pt-4">
            <div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-green-400 rounded-sm"></div> รายรับ</div>
            <div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-red-400 rounded-sm"></div> รายจ่าย</div>
            <div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-blue-400 rounded-sm"></div> เงินเก็บ</div>
            <div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-indigo-400 rounded-sm"></div> การลงทุน</div>
          </div>
        </div>
      );
    }

    function AddTransactionForm({ onSave, initialData, isModal, onClose, usdRate, showAlert, totalSaving, balance }) {
      const [type, setType] = useState(initialData?.type || 'expense');
      const [amount, setAmount] = useState(initialData?.amount || '');
      const [category, setCategory] = useState(initialData?.category || 'food');
      const [date, setDate] = useState(initialData?.date || new Date().toISOString().split('T')[0]);
      const [note, setNote] = useState(initialData?.note || '');
      const [portId, setPortId] = useState(initialData?.portId || 'lib');

      const handleTypeChange = (newType) => {
        setType(newType);
        if (newType === 'expense') setCategory('food');
        else if (newType === 'income') setCategory('salary');
        else if (newType === 'saving') setCategory('general_saving');
        else if (newType === 'withdraw') setCategory('withdraw_saving');
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const parsedAmount = parseFloat(amount);
        if (!parsedAmount || isNaN(parsedAmount) || parsedAmount <= 0) return showAlert('กรุณากรอกจำนวนเงินให้มากกว่า 0');
        
        if (type === 'withdraw') {
           const currentSaved = initialData && initialData.type === 'withdraw' 
                                ? totalSaving + initialData.amount 
                                : totalSaving;
           if (parsedAmount > currentSaved) {
               return showAlert(`ยอดเงินเก็บสะสมมีไม่พอให้ถอน (สูงสุด ${formatCurrency(currentSaved)})`);
           }
        }

        if (type === 'saving') {
           let effectiveBalance = balance;
           if (initialData) {
               if (initialData.type === 'income') effectiveBalance -= initialData.amount;
               if (initialData.type === 'expense') effectiveBalance += initialData.amount;
               if (initialData.type === 'saving') effectiveBalance += initialData.amount;
               if (initialData.type === 'withdraw') effectiveBalance -= initialData.amount;
           }
           if (parsedAmount > effectiveBalance) {
               return showAlert(`ยอดเงินคงเหลือ (พร้อมใช้) มีไม่พอให้จัดเก็บ (สูงสุด ${formatCurrency(effectiveBalance)})`);
           }
        }
        
        const payload = { type, amount: parsedAmount, category, date, note };
        
        // หากเป็นการลงทุน ให้แนบข้อมูลพอร์ตที่เลือกลงไปด้วย
        if (type === 'saving' && category === 'investment') {
           payload.portId = portId;
        }

        onSave(payload);
      };

      const currentCategories = CATEGORIES[type].filter(c => c.id !== 'port_withdraw');

      const content = (
        <div className={`bg-white rounded-3xl p-6 shadow-sm border border-slate-100 animate-in fade-in duration-300 relative ${isModal ? 'max-h-[90vh] overflow-y-auto' : ''}`}>
          {isModal && <button type="button" onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full"><Icon name="close" /></button>}
          <h2 className="text-2xl font-black text-slate-800 mb-6 text-center">{initialData ? 'แก้ไขรายการ' : 'บันทึกรายการใหม่'}</h2>
          <form onSubmit={handleSubmit} className="space-y-5">
            <div className="flex p-1 bg-gray-100 rounded-xl flex-wrap">
              <button type="button" onClick={() => handleTypeChange('expense')} className={`flex-1 py-2 text-[11px] sm:text-sm font-semibold rounded-lg transition-colors ${type === 'expense' ? 'bg-white text-red-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>รายจ่าย</button>
              <button type="button" onClick={() => handleTypeChange('income')} className={`flex-1 py-2 text-[11px] sm:text-sm font-semibold rounded-lg transition-colors ${type === 'income' ? 'bg-white text-green-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>รายรับ</button>
              <button type="button" onClick={() => handleTypeChange('saving')} className={`flex-1 py-2 text-[11px] sm:text-sm font-semibold rounded-lg transition-colors ${type === 'saving' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>เงินเก็บ</button>
              <button type="button" onClick={() => handleTypeChange('withdraw')} className={`flex-1 py-2 text-[11px] sm:text-sm font-semibold rounded-lg transition-colors ${type === 'withdraw' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>ถอนเงิน</button>
            </div>

            <div>
              <label className="block text-sm font-medium text-gray-700 mb-2">หมวดหมู่</label>
              <div className="grid grid-cols-4 gap-3">
                {currentCategories.map((c) => {
                  const isSelected = category === c.id;
                  return (
                    <button key={c.id} type="button" onClick={() => setCategory(c.id)} className={`flex flex-col items-center justify-center p-3 rounded-xl border-2 transition-all ${isSelected ? `border-transparent ${c.color} text-white shadow-md scale-105` : 'border-gray-100 bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>
                      <Icon name={c.icon} className="text-[24px] mb-1" />
                      <span className="text-sm font-bold text-center leading-tight mt-1">{c.name}</span>
                    </button>
                  );
                })}
              </div>
            </div>

            {type === 'saving' && category === 'investment' && (
               <div className="animate-in fade-in slide-in-from-top-2">
                  <label className="block text-sm font-medium text-gray-700 mb-1">เลือกพอร์ตลงทุน</label>
                  <select 
                    value={portId} 
                    onChange={e => setPortId(e.target.value)} 
                    className="block w-full px-4 py-3 bg-indigo-50 border border-indigo-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-indigo-800 font-bold outline-none" 
                  >
                    {Object.entries(PORT_NAMES).map(([id, name]) => (
                       <option key={id} value={id}>{name}</option>
                    ))}
                  </select>
               </div>
            )}

            <div>
              <div className="flex justify-between items-end mb-1">
                <label className="block text-sm font-medium text-gray-700">จำนวนเงิน (บาท)</label>
                {type === 'saving' && category === 'investment' && portId === 'lib_us' && amount && (
                  <span className="text-[10px] font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded">แปลงเป็นพอร์ต US: {formatUSD(amount / usdRate)}</span>
                )}
              </div>
              <div className="relative">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span className="text-gray-500 font-semibold">฿</span></div>
                <input type="number" min="0" value={amount} onChange={(e) => setAmount(e.target.value)} className="block w-full pl-8 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-lg font-semibold transition-all outline-none" placeholder="0.00" step="0.01" required />
              </div>
            </div>

            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">วันที่</label>
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="block w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-gray-700 outline-none" required />
            </div>

            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">บันทึกเพิ่มเติม (ถ้ามี)</label>
              <input type="text" value={note} onChange={(e) => setNote(e.target.value)} className="block w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-gray-700 outline-none" placeholder="เช่น ซื้อกาแฟ, ค่ารถเมล์..." />
            </div>

            <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-200 transition-all shadow-md active:scale-95 mt-4">
              {initialData ? 'บันทึกการแก้ไข' : `บันทึกรายการ ${type === 'saving' && category === 'investment' ? 'และฝากเงินเข้าพอร์ต' : ''}`}
            </button>
          </form>
        </div>
      );

      if (isModal) {
        return (
          <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/50 backdrop-blur-sm animate-in fade-in">
            <div className="w-full sm:w-[460px] p-4 sm:p-0">
              {content}
            </div>
          </div>
        );
      }
      return content;
    }

    function TransactionHistory({ transactions, onEdit, onDelete }) {
      const groupedTransactions = useMemo(() => {
        const groups = {};
        transactions.forEach(t => {
          if (!groups[t.date]) groups[t.date] = [];
          groups[t.date].push(t);
        });
        return Object.keys(groups).sort((a, b) => new Date(b) - new Date(a)).map(date => {
           const sortedItems = groups[date].sort((a, b) => String(b.id).localeCompare(String(a.id)));
           return { date, items: sortedItems };
        });
      }, [transactions]);

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <h2 className="text-2xl font-bold text-gray-800 mb-4 px-1">ประวัติรายการ</h2>
          {groupedTransactions.length === 0 ? (
            <div className="text-center py-10 bg-white rounded-2xl border border-gray-100">
              <Icon name="format_list_bulleted" className="text-[48px] text-gray-300 mx-auto mb-3" />
              <p className="text-gray-500 font-medium">ยังไม่มีประวัติการบันทึก</p>
            </div>
          ) : (
            <div className="space-y-6">
              {groupedTransactions.map(group => (
                <div key={group.date} className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                  <h3 className="text-sm font-bold text-gray-500 mb-4 border-b pb-2 flex items-center justify-between">
                    <span>{formatDate(group.date)}</span>
                    <span className="text-xs font-normal text-gray-400">{group.items.length} รายการ</span>
                  </h3>
                  <div className="space-y-4">
                    {group.items.map(t => <TransactionItem key={t.id} transaction={t} showActions onEdit={onEdit} onDelete={onDelete} />)}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function TransactionItem({ transaction, showActions = false, onEdit, onDelete }) {
      const categoryList = CATEGORIES[transaction.type] || CATEGORIES.expense;
      const categoryDef = categoryList.find(c => c.id === transaction.category) || categoryList[categoryList.length - 1];

      let amountColor = 'text-gray-800';
      let amountPrefix = '-';
      if (transaction.type === 'income') { amountColor = 'text-green-600'; amountPrefix = '+'; } 
      else if (transaction.type === 'saving') { amountColor = 'text-blue-600'; amountPrefix = '🏦 '; }
      else if (transaction.type === 'withdraw') { amountColor = 'text-indigo-600'; amountPrefix = '💸 +'; }

      return (
        <div className="flex items-center justify-between group">
          <div className="flex items-center gap-3">
            <div className={`p-2.5 rounded-xl ${categoryDef.color} text-white shadow-sm`}><Icon name={categoryDef.icon} className="text-[20px]" /></div>
            <div>
              <p className="font-semibold text-gray-800 leading-tight">{transaction.note || categoryDef.name}</p>
              <p className="text-xs text-gray-500 mt-0.5">
                {categoryDef.name} {transaction.type === 'saving' && transaction.category === 'investment' && transaction.portId ? `(${PORT_NAMES[transaction.portId] || transaction.portId})` : ''}
              </p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <span className={`font-bold ${amountColor}`}>{amountPrefix}{formatCurrency(transaction.amount)}</span>
            {showActions && (
              <div className="flex items-center gap-1">
                <button onClick={() => onEdit && onEdit(transaction)} className="text-gray-300 hover:text-indigo-500 p-1 transition-colors" title="แก้ไขรายการ"><Icon name="edit" className="text-[16px]" /></button>
                <button onClick={() => onDelete && onDelete(transaction.id)} className="text-gray-300 hover:text-red-500 p-1 transition-colors" title="ลบรายการ"><Icon name="delete" className="text-[16px]" /></button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
